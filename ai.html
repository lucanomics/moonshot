<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshot AI — 민원 안내 도우미</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%22100%22 fill=%22white%22>☾</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --ff: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
            --ff-logo: 'Jua', sans-serif;
            
            --bg0: #0f172a; --bg1: #1e293b; --bg2: #334155;
            --bd: #334155; 
            --t1: #cbd5e1; --t2: #94a3b8; --t3: #64748b;
            --ac: #6366f1; --cy: #38bdf8;
            --shD: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        html, body { height: 100dvh; overflow: hidden; margin: 0; padding: 0; }
        body { font-family: var(--ff) !important; background: var(--bg0); color: var(--t1); display: flex; flex-direction: column; }

        header { background: var(--bg1); padding: 1rem 1.5rem; border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shD); z-index: 10; flex-shrink: 0; }
        .back-btn { background: none; border: none; color: var(--t2); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; font-weight: 600; text-decoration: none; font-family: var(--ff) !important; }
        .back-btn:hover { color: var(--t1); }
        h1 { font-family: var(--ff-logo) !important; font-size: 1.5rem; font-weight: 400; background: linear-gradient(135deg, var(--ac), var(--cy)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0; }

        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; position: relative; min-height: 0; }
        
        .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; }
        .msg { padding: 1rem 1.2rem; border-radius: 12px; max-width: 85%; line-height: 1.6; font-size: 0.95rem; word-break: keep-all; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .msg.ai { background: var(--bg1); color: var(--t1); border: 1px solid var(--bd); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.user { background: var(--ac); color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-disc { display: block; margin-top: 0.8rem; padding-top: 0.6rem; border-top: 1px dashed var(--bd); font-size: 0.75rem; color: var(--t3); }

        .input-area { padding: 1.5rem; background: var(--bg1); border-top: 1px solid var(--bd); display: flex; gap: 0.5rem; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 1rem 1.2rem; border: 1px solid var(--bd); border-radius: 8px; background: var(--bg0); color: var(--t1); font-size: 1rem; font-family: var(--ff) !important; outline: none; transition: border-color 0.2s; }
        .input-area input:focus { border-color: var(--ac); }
        .input-area button { background: var(--ac); color: #fff; border: none; padding: 0 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1rem; font-family: var(--ff) !important; transition: background 0.2s; white-space: nowrap; }
        .input-area button:hover { background: #4f46e5; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 600px) {
            .msg { max-width: 95%; font-size: 0.9rem; padding: 0.8rem 1rem; }
            .input-area { padding: 1rem; }
            .input-area input { padding: 0.8rem 1rem; font-size: 0.9rem; }
            .input-area button { padding: 0 1rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← 검색으로 돌아가기</a>
        <h1>Moonshot AI</h1>
    </header>

    <div class="chat-container">
        <div class="messages" id="aiMsgs">
            <div class="msg ai">
                출입국 민원 안내 도우미 Moonshot AI입니다. 자연어로 질문해 주세요.<br>
                예시: "베트남 사람인데 제주도 갈 수 있어요?"
                <span class="msg-disc">⚠ AI 응답은 Moonshot 데이터 기준이며, 실무 교차검증이 필요합니다.</span>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="aiQ" placeholder="질문을 입력하세요..." autocomplete="off">
            <button id="aiSend" onclick="sendAi()">전송</button>
        </div>
    </div>

    <style>
        .consent-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .consent-box { background: var(--bg1); border: 1px solid var(--bd); border-radius: 16px; padding: 2rem; max-width: 420px; width: 90%; box-shadow: var(--shD); }
        .consent-box h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--t1); }
        .consent-box p { font-size: 0.9rem; color: var(--t2); line-height: 1.7; margin-bottom: 1.5rem; }
        .consent-box .btns { display: flex; gap: 0.75rem; }
        .consent-box .btn-agree { flex: 1; background: var(--ac); color: #fff; border: none; padding: 0.75rem; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: var(--ff) !important; font-size: 0.95rem; }
        .consent-box .btn-agree:hover { background: #4f46e5; }
        .consent-box .btn-deny { flex: 1; background: none; color: var(--t2); border: 1px solid var(--bd); padding: 0.75rem; border-radius: 8px; cursor: pointer; font-family: var(--ff) !important; font-size: 0.95rem; }
        .consent-box .btn-deny:hover { color: var(--t1); border-color: var(--t2); }
    </style>

    <div class="consent-overlay" id="consentOverlay">
        <div class="consent-box">
            <h2>서비스 이용 전 안내</h2>
            <p>Moonshot AI는 서비스 개선을 위해 <strong>익명화된 질문 카테고리</strong>를 수집합니다.<br>
            개인 식별 정보(질문 원문, IP 등)는 저장하지 않습니다.</p>
            <div class="btns">
                <button class="btn-agree" onclick="handleConsent(true)">동의하고 시작하기</button>
                <button class="btn-deny" onclick="handleConsent(false)">거부</button>
            </div>
        </div>
    </div>

    <script>
        const DISCLAIMER = "이 답변은 AI가 작성한 참고용 정보입니다. 법적 효력이 없으며, 최종 결정 전 반드시 관할 출입국관서(1345)에 확인하시기 바랍니다.";
        const API_BASE = "https://web-production-14f9a.up.railway.app";
        const API_URL = `${API_BASE}/api/ask`;
        let userConsent = null;

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str ?? '';
            return div.innerHTML;
        }

        window.handleConsent = function(agreed) {
            userConsent = agreed;
            const overlay = document.getElementById('consentOverlay');
            if(overlay) overlay.style.display = 'none';
            
            const msgs = document.getElementById('aiMsgs');
            if(!msgs) return;

            if(agreed) {
                msgs.insertAdjacentHTML('beforeend', `<div class="msg ai">동의가 완료되었습니다. 무엇을 도와드릴까요?</div>`);
                document.getElementById('aiQ').disabled = false;
                document.getElementById('aiSend').disabled = false;
                document.getElementById('aiQ').focus();
            } else {
                msgs.insertAdjacentHTML('beforeend', `<div class="msg ai" style="border-color:#ef4444; color:#ef4444;">동의하지 않으시면 AI 상담을 이용할 수 없습니다. 화면을 새로고침하여 다시 선택해주세요.</div>`);
            }
            setTimeout(() => { msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' }); }, 100);
        };

        async function sendAi() {
            const inp = document.getElementById('aiQ');
            const q = inp.value.trim();
            if(!q) return;
            
            const msgs = document.getElementById('aiMsgs');
            const btn = document.getElementById('aiSend');

            msgs.insertAdjacentHTML('beforeend', `<div class="msg user">${escapeHtml(q)}</div>`);
            inp.value = '';
            btn.disabled = true;
            btn.textContent = '...';

            const lid = 'ld-' + Date.now();
            msgs.insertAdjacentHTML('beforeend', `<div class="msg ai" id="${lid}">답변을 생성 중입니다... (최대 10~15초 소요)</div>`);
            setTimeout(() => { msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' }); }, 100);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q, consent: userConsent, context: "" })
                });
                
                if(!res.ok) throw new Error(`서버 응답 오류 (${res.status})`);
                
                const data = await res.json();
                const answer = data.answer || data.detail || "응답을 처리할 수 없습니다.";

                const loader = document.getElementById(lid);
                if(loader) loader.remove();
                msgs.insertAdjacentHTML('beforeend', `<div class="msg ai">${escapeHtml(answer).replace(/\n/g, '<br>')}<span class="msg-disc">${DISCLAIMER}</span></div>`);
            } catch(err) {
                const loader = document.getElementById(lid);
                if(loader) loader.remove();
                msgs.insertAdjacentHTML('beforeend', `<div class="msg ai" style="border-color:#ef4444; color:#ef4444;">오류: ${escapeHtml(err.message)}<span class="msg-disc">${DISCLAIMER}</span></div>`);
            }
            
            btn.disabled = false;
            btn.textContent = '전송';
            inp.focus();
            setTimeout(() => { msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' }); }, 100);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const qEl = document.getElementById('aiQ');
            if(qEl) {
                qEl.addEventListener('keydown', (e) => {
                    if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAi(); }
                });
            }
        });
    </script>
</body>
</html>
