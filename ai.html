<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonshot AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌕</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ff: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
      --ff-logo: 'Jua', sans-serif;
      --bg0: #fafaf8; --bg1: #ffffff; --bg2: #f3f1ed;
      --bd: #d8d5cf;
      --t1: #0d0d0c; --t2: #3a3835; --t3: #7a7772;
      --ac: #0a5c47; --ac2: #084d3b;
      --sh1: 0 1px 3px rgba(13,13,12,0.06);
      --sh2: 0 4px 16px rgba(13,13,12,0.10);
    }
    [data-theme="dark"] {
      --bg0: #111110; --bg1: #1a1917; --bg2: #222120;
      --bd: #2e2d2b;
      --t1: #e8e6e1; --t2: #9a9895; --t3: #5a5855;
      --ac: #34d399; --ac2: #10b981;
      --sh1: 0 1px 4px rgba(0,0,0,0.3);
      --sh2: 0 8px 24px rgba(0,0,0,0.4);
    }

    html, body { height: 100%; }
    body {
      font-family: var(--ff) !important;
      background: var(--bg0); color: var(--t1);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    header {
      flex-shrink: 0;
      background: var(--bg1);
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--bd);
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: var(--sh1); z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-divider { width: 1px; height: 18px; background: var(--bd); }

    .back-btn {
      background: none; border: none;
      color: var(--t3); font-size: 0.85rem; cursor: pointer;
      display: flex; align-items: center; gap: 0.4rem;
      font-weight: 500; text-decoration: none;
      font-family: var(--ff) !important;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--t1); }

    h1 {
      font-family: var(--ff-logo) !important;
      font-size: 1.3rem; font-weight: 400;
      color: var(--t1); margin: 0;
      letter-spacing: -0.01em;
    }

    .theme-btn {
      background: none; border: 1px solid var(--bd);
      color: var(--t3); cursor: pointer;
      border-radius: 6px; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, border-color 0.2s;
    }
    .theme-btn:hover { color: var(--t1); border-color: var(--t2); }

    .chat-container {
      flex: 1; display: flex; flex-direction: column;
      max-width: 760px; margin: 0 auto;
      width: 100%; min-height: 0;
    }

    .messages {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex; flex-direction: column; gap: 0.8rem;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px; }

    .msg {
      padding: 0.9rem 1.1rem; border-radius: 10px;
      max-width: 82%; line-height: 1.65;
      font-size: 0.92rem; word-break: keep-all;
    }
    .msg.ai {
      background: var(--bg1); color: var(--t1);
      border: 1px solid var(--bd);
      align-self: flex-start; border-bottom-left-radius: 3px;
    }
    .msg.user {
      background: var(--ac); color: #fff;
      align-self: flex-end; border-bottom-right-radius: 3px;
    }
    .msg-disc {
      display: block; margin-top: 0.75rem;
      padding-top: 0.6rem; border-top: 1px solid var(--bd);
      font-size: 0.72rem; color: var(--t3); line-height: 1.5;
    }
    .msg.user .msg-disc {
      border-top-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.65);
    }

    .typing-dot {
      display: inline-block; width: 6px; height: 6px;
      background: var(--t3); border-radius: 50%; margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1.1); }
    }

    .input-area {
      flex-shrink: 0; padding: 1rem 1rem 1.2rem;
      background: var(--bg1); border-top: 1px solid var(--bd);
      display: flex; gap: 0.5rem;
    }
    .input-area input {
      flex: 1; padding: 0.85rem 1rem;
      border: 1.5px solid var(--bd); border-radius: 8px;
      background: var(--bg0); color: var(--t1);
      font-size: 0.95rem; font-family: var(--ff) !important;
      outline: none; transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: var(--ac); }
    .input-area input::placeholder { color: var(--t3); }
    .input-area input:disabled { opacity: 0.6; cursor: not-allowed; }

    .input-area button {
      background: var(--ac); color: #fff; border: none;
      padding: 0 1.3rem; border-radius: 8px;
      cursor: pointer; font-weight: 700; font-size: 0.92rem;
      font-family: var(--ff) !important; transition: background 0.2s;
      white-space: nowrap;
    }
    .input-area button:hover { background: var(--ac2); }
    .input-area button:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 600px) {
      .msg { max-width: 92%; font-size: 0.88rem; padding: 0.75rem 0.9rem; }
      .input-area { padding: 0.8rem; }
      .input-area input { padding: 0.75rem 0.9rem; font-size: 0.9rem; }
      .input-area button { padding: 0 1rem; font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        검색으로
      </a>
      <div class="header-divider"></div>
      <h1>Moonshot AI</h1>
    </div>
    <button class="theme-btn" data-theme-toggle aria-label="테마 전환">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <div class="chat-container">
    <div class="messages" id="aiMsgs">
      <div class="msg ai">
        출입국 민원 안내 도우미 Moonshot AI입니다. 자연어로 질문해 주세요.<br>
        예시: &quot;베트남 사람인데 제주도 갈 수 있어요?&quot;
        <span class="msg-disc">⚠ AI 응답은 Moonshot 데이터 기준이며, 실무 교차검증이 필요합니다.</span>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="aiQ" placeholder="질문을 입력하세요…"
        onkeydown="if(event.key==='Enter') sendAi()" autocomplete="off">
      <button id="aiSend" onclick="sendAi()">전송</button>
    </div>
  </div>

  <script>
    (function(){
      const t = document.querySelector('[data-theme-toggle]');
      const r = document.documentElement;
      let d = r.getAttribute('data-theme') || 'dark';
      if(t) t.addEventListener('click', () => {
        d = d === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', d);
      });
    })();

    const API_URL = (function(){
      const h = window.location.hostname;
      if(h === 'localhost' || h === '127.0.0.1') return 'http://localhost:8000/api/ask';
      return window.location.origin + '/api/ask';
    })();

    const DISCLAIMER = 'AI 응답은 Moonshot 데이터 기준이며, 실무 교차검증이 필요합니다.';

    function escapeHtml(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }
    function stripThink(s) {
      return s.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
    }

    async function sendAi() {
      const inp = document.getElementById('aiQ');
      const q = inp.value.trim();
      if (!q) return;
      const msgs = document.getElementById('aiMsgs');
      const btn = document.getElementById('aiSend');

      msgs.innerHTML += `<div class="msg user">${escapeHtml(q)}</div>`;
      inp.value = '';
      btn.disabled = true; btn.textContent = '…';

      const lid = 'ld-' + Date.now();
      msgs.innerHTML += `<div class="msg ai" id="${lid}">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>`;
      msgs.scrollTop = msgs.scrollHeight;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q })
        });
        if (!res.ok) throw new Error('서버 오류 ' + res.status);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        const raw = data.choices?.[0]?.message?.content || data.answer || '';
        const answer = stripThink(raw);
        document.getElementById(lid)?.remove();
        msgs.innerHTML += `<div class="msg ai">${escapeHtml(answer).replace(/\n/g, '<br>')}<span class="msg-disc">${DISCLAIMER}</span></div>`;
      } catch(err) {
        document.getElementById(lid)?.remove();
        msgs.innerHTML += `<div class="msg ai" style="border-color:#dc2626;color:#dc2626;">${escapeHtml(err.message)}<span class="msg-disc">${DISCLAIMER}</span></div>`;
      }

      btn.disabled = false; btn.textContent = '전송';
      msgs.scrollTop = msgs.scrollHeight;
      document.getElementById('aiQ').focus();
    }
  </script>
</body>
</html>
