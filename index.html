<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출입국 민원·비자 통합 검색 플랫폼 v5.1</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Design System Tokens: Spacing */
            --space-xs: 0.5rem;
            --space-sm: 0.75rem;
            --space-md: 1rem;
            --space-lg: 1.25rem;
            --space-xl: 1.5rem;
            --space-2xl: 2rem;

            /* Design System Tokens: Typography */
            --font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
            --font-family-mono: 'JetBrains Mono', 'Fira Code', 'Noto Sans Mono', monospace;
            --font-size-base: clamp(13px, 1.4vw, 15px);
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.8125rem;
            --font-size-md: 0.875rem;
            --font-size-lg: 0.95rem;
            --font-size-xl: 1.1rem;

            /* Color System: Light Mode */
            --bg-primary: #f4f3f0;
            --bg-secondary: #fff;
            --bg-card: #fff;
            --bg-card-subtle: #f9f8f6;
            --bg-input: #fff;
            --bg-subtle: #f5f4f1;
            --bg-subtle-2: #faf9f7;

            --border-primary: #d6d3cd;
            --border-card: #e0ddd7;
            --border-subtle: #d0cdc6;

            --text-primary: #1a1a1a;
            --text-secondary: #4a4740;
            --text-tertiary: #7a7770;

            --accent: #2c5aa0;
            --accent-light: #e8eef6;
            --accent-hover: #1e4080;

            --highlight-bg: #fff3b0;
            --highlight-text: #1a1a1a;

            /* Tag Colors */
            --tag-new-bg: #dceefb; --tag-new-text: #1a4a7a;
            --tag-extension-bg: #e0f0e0; --tag-extension-text: #1a5a2a;
            --tag-faq-bg: #f5e6d8; --tag-faq-text: #6a3a1a;
            --tag-sub-bg: #ece8f4; --tag-sub-text: #4a3a6a;
            --tag-period-bg: #e8e6f0; --tag-period-text: #3a3060;

            /* Category Colors */
            --category-short: #9ca3af;
            --category-study: #3b82f6;
            --category-work: #f59e0b;
            --category-invest: #10b981;
            --category-family: #ec4899;
            --category-other: #8b5cf6;
            --category-diplo: #64748b;
            --category-nhis: #0d9488;
            --category-faq: #ef4444;

            /* Shadows & Radius */
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, .08);
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 6px;
        }

        [data-theme="dark"] {
            /* Color System: Dark Mode */
            --bg-primary: #131316;
            --bg-secondary: #1a1a1e;
            --bg-card: #1e1e24;
            --bg-card-subtle: #252530;
            --bg-input: #252530;
            --bg-subtle: #1c1c22;
            --bg-subtle-2: #222228;

            --border-primary: #333340;
            --border-card: #333340;
            --border-subtle: #2e2e3a;

            --text-primary: #e0ded8;
            --text-secondary: #a8a5a0;
            --text-tertiary: #706d68;

            --accent: #6ba3e8;
            --accent-light: #1a2538;
            --accent-hover: #8ab8f0;

            --highlight-bg: #5a4b15;
            --highlight-text: #f4ebd0;

            /* Tag Colors Dark */
            --tag-new-bg: #152535; --tag-new-text: #70b0e0;
            --tag-extension-bg: #152818; --tag-extension-text: #60b070;
            --tag-faq-bg: #352518; --tag-faq-text: #c89868;
            --tag-sub-bg: #252035; --tag-sub-text: #a090c8;
            --tag-period-bg: #1e1a2e; --tag-period-text: #9088c0;

            --category-nhis: #14b8a6;
            --category-faq: #f87171;

            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .4);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, .5);
        }

        html {
            font-size: var(--font-size-base);
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.65;
            min-height: 100vh;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== Header ===== */
        .platform-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            padding: var(--space-sm) var(--space-md);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-sm);
            transition: background-color 0.2s ease;
        }

        .platform-header__inner {
            max-width: 1140px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        .platform-logo {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-weight: 700;
            font-size: var(--font-size-lg);
            color: var(--text-primary);
            white-space: nowrap;
            letter-spacing: -0.02em;
        }

        .platform-logo__icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: var(--font-size-sm);
            font-weight: 800;
        }

        .platform-header__controls {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin-left: auto;
            flex-wrap: wrap;
        }

        .control-button {
            background: var(--bg-card-subtle);
            border: 1px solid var(--border-primary);
            border-radius: 999px;
            padding: var(--space-xs) var(--space-md);
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-family);
            font-weight: 600;
            white-space: nowrap;
        }

        .control-button:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .control-button.is-active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ===== Search Area ===== */
        .search-area {
            max-width: 1140px;
            margin: var(--space-xl) auto 0;
            padding: 0 var(--space-md);
        }

        .search-bar {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 2px solid var(--border-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(44, 90, 160, 0.15);
        }

        .search-bar__icon {
            position: absolute;
            left: var(--space-md);
            color: var(--text-tertiary);
            font-size: 1.25rem;
            pointer-events: none;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: var(--space-md) var(--space-md) var(--space-md) 2.75rem;
            font-size: var(--font-size-md);
            color: var(--text-primary);
            font-family: var(--font-family);
        }

        .search-input::placeholder { color: var(--text-tertiary); }

        .clear-button {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: var(--space-sm) var(--space-md);
            font-size: 1.25rem;
            display: none;
        }

        .clear-button:hover { color: var(--text-primary); }
        .clear-button.is-visible { display: block; }

        .search-meta {
            display: flex;
            justify-content: space-between;
            margin-top: var(--space-sm);
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            padding: 0 var(--space-xs);
        }

        /* ===== Quick Filters ===== */
        .quick-filters {
            max-width: 1140px;
            margin: var(--space-md) auto 0;
            padding: 0 var(--space-md);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
        }

        .filter-chip {
            background: var(--bg-card-subtle);
            border: 1px solid var(--border-primary);
            border-radius: 999px;
            padding: var(--space-xs) var(--space-sm);
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .filter-chip:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        /* ===== Results Container ===== */
        .results-container {
            max-width: 1140px;
            margin: var(--space-lg) auto var(--space-2xl);
            padding: 0 var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        /* ===== Visa Card (Accordion with CSS Grid) ===== */
        .visa-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--card-border-color, var(--border-card));
            transition: box-shadow 0.3s ease, transform 0.2s ease;
            animation: fadeInUp 0.3s ease both;
        }

        .visa-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .visa-card__header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-md);
            background: var(--bg-card-subtle);
            cursor: pointer;
            user-select: none;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }

        .visa-card__header:hover { background: var(--accent-light); }

        .badge-code {
            font-family: var(--font-family-mono);
            font-weight: 700;
            font-size: var(--font-size-lg);
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            letter-spacing: -0.02em;
        }

        .visa-card__title {
            font-weight: 700;
            font-size: var(--font-size-md);
            color: var(--text-primary);
        }

        .badge-period {
            font-size: var(--font-size-xs);
            color: var(--tag-period-text);
            background: var(--tag-period-bg);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
        }

        .badge-count {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            background: var(--bg-subtle);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }

        .toggle-icon {
            margin-left: auto;
            color: var(--text-tertiary);
            font-size: var(--font-size-xs);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Grid Accordion Technique */
        .visa-card__content-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .visa-card.is-expanded .visa-card__content-wrapper {
            grid-template-rows: 1fr;
        }

        .visa-card.is-expanded .toggle-icon {
            transform: rotate(180deg);
        }

        .visa-card__content {
            overflow: hidden;
        }

        .visa-section {
            padding: var(--space-md);
            border-top: 1px solid var(--border-subtle);
        }

        .tag-label {
            display: inline-flex;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: var(--space-xs);
        }

        .tag-label--new { background: var(--tag-new-bg); color: var(--tag-new-text); }
        .tag-label--ext { background: var(--tag-extension-bg); color: var(--tag-extension-text); }
        .tag-label--faq { background: var(--tag-faq-bg); color: var(--tag-faq-text); }
        .tag-label--sub { background: var(--tag-sub-bg); color: var(--tag-sub-text); }

        .content-text {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-line;
            word-break: keep-all;
        }

        /* ===== Subcategories ===== */
        .subcategories {
            background: var(--bg-subtle);
            border-top: 1px solid var(--border-subtle);
        }

        .subcategories__title {
            padding: var(--space-sm) var(--space-md);
            font-size: var(--font-size-xs);
            font-weight: 700;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .sub-card { border-top: 1px solid var(--border-subtle); }
        .sub-card__header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md) var(--space-sm) var(--space-lg);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .sub-card__header:hover { background: var(--bg-subtle-2); }
        
        .sub-card__code {
            font-family: var(--font-family-mono);
            font-size: var(--font-size-sm);
            font-weight: 700;
            color: var(--accent);
            min-width: 4rem;
        }
        .sub-card__name {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-primary);
        }

        .sub-card__content-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-subtle-2);
        }

        .sub-card.is-expanded .sub-card__content-wrapper { grid-template-rows: 1fr; }
        .sub-card.is-expanded .toggle-icon { transform: rotate(180deg); }

        .sub-card__content {
            overflow: hidden;
            border-left: 3px solid var(--accent);
            margin-left: var(--space-xl);
        }
        
        .sub-card__inner-section {
            padding: var(--space-sm) var(--space-md);
        }
        .sub-card__inner-section + .sub-card__inner-section {
            border-top: 1px dashed var(--border-subtle);
        }

        /* ===== Utilities ===== */
        mark.highlight {
            background: var(--highlight-bg);
            color: var(--highlight-text);
            padding: 0.1em 0.3em;
            border-radius: 3px;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: var(--space-2xl) var(--space-md);
            color: var(--text-tertiary);
        }
        .empty-state__icon { font-size: 3rem; margin-bottom: var(--space-md); opacity: 0.3; }
        .empty-state__title { font-weight: 700; font-size: var(--font-size-lg); color: var(--text-secondary); margin-bottom: var(--space-xs); }
        .empty-state__desc { font-size: var(--font-size-sm); line-height: 1.6; }

        .platform-footer {
            text-align: center;
            padding: var(--space-xl) var(--space-md);
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            border-top: 1px solid var(--border-primary);
            max-width: 1140px;
            margin: 0 auto;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dark mode scrollbar */
        [data-theme="dark"]::-webkit-scrollbar { width: 8px; }
        [data-theme="dark"]::-webkit-scrollbar-track { background: var(--bg-primary); }
        [data-theme="dark"]::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>

<body data-theme="dark">

    <header class="platform-header">
        <div class="platform-header__inner">
            <div class="platform-logo">
                <div class="platform-logo__icon">출</div>
                <span>출입국 민원·비자 통합 검색</span>
            </div>
            <div class="platform-header__controls">
                <button class="control-button is-active" id="btn-and" onclick="setSearchMode('and')">AND</button>
                <button class="control-button" id="btn-or" onclick="setSearchMode('or')">OR</button>
                <button class="control-button" onclick="toggleAccordions(true)">전체 접기</button>
                <button class="control-button" onclick="toggleAccordions(false)">전체 펼치기</button>
                <button class="control-button" id="btn-theme" onclick="toggleTheme()">☀️ 라이트</button>
            </div>
        </div>
    </header>

    <main>
        <section class="search-area">
            <div class="search-bar">
                <span class="search-bar__icon">⌕</span>
                <input type="text" id="search-input" class="search-input" placeholder="비자코드, 체류민원, 건강보험 등 키워드 검색 (예: F-6-3, 건강보험, 하이코리아)" autocomplete="off" spellcheck="false">
                <button class="clear-button" id="btn-clear" onclick="clearSearch()">✕</button>
            </div>
            <div class="search-meta">
                <span id="result-count"></span>
                <span id="search-hint" style="opacity: 0.7;">띄어쓰기 다중키워드 · AND/OR · 체류민원 및 소분류 직접검색</span>
            </div>
        </section>

        <section class="quick-filters" id="quick-filters-container"></section>
        <section class="results-container" id="results-container"></section>
    </main>

    <footer class="platform-footer">

    </footer>

        // DATA v5.1 — visa.go.kr 비자 + 건강보험/출입국 민원 완전 통합본

        const VISA_DATA = [
        // --- 건강보험 및 출입국 민원 FAQ ---
        {code:"NHIS-1",name:"국외 체류자 건강보험 면제·감면",cat:"nhis",period:"해외 체류 기간",

        {code:"H-2",name:"방문취업",cat:"other",period:"3년, 연장가능",newReq:"동포 입증(호구부 등), 한국어능력 입증, 해외 범죄경력, 건강상태 확인서, 여권.",extReq:"재외동포 통합신청서, 여권, 등록증, 수수료 6만원. 3년 초과 시 취업기간만료자 연장확인서.",faq:"Q: F-4 전환?\nA: TOPIK 등 요건 충족 시 가능.",subCodes:[{code:"H-2-1",name:"연고방문취업",addReq:"국내 연고(가족) 관계 입증.",note:"중국·CIS 등 동포 중 국내 연고 보유자."},{code:"H-2-2",name:"유학방문취업",addReq:"과거 유학·연수 경력 입증.",note:"과거 유학·연수 경력 동포."},{code:"H-2-5",name:"추첨방문취업",addReq:"추첨제 선발 확인.",note:"점수제·추첨제 선발 동포."},{code:"H-2-7",name:"만기방문취업",addReq:"다른 체류자격 만료 입증.",note:"타 체류자격 만료 후 전환."}]},
        {code:"A-1",name:"외교",cat:"diplo",period:"재임기간",newReq:"외국정부 외교사절단·영사기관 파견장.",extReq:"재임 중 자동 연장.",faq:"Q: 가족 체류?\nA: 동반 가족도 A-1 부여."},
        {code:"A-2",name:"공무",cat:"diplo",period:"공무수행기간",newReq:"외국정부·국제기구 파견 공문.",extReq:"공무 수행 기간 내 자동.",faq:"Q: 가족?\nA: 동반 가족도 A-2 부여."},
        {code:"A-3",name:"협정",cat:"diplo",period:"SOFA 등 신분 존속기간",newReq:"외국정부 파견 공문, 한미행정협정(SOFA) 등 신분 증명서.",extReq:"해당 신분 유지 시 자동 적용.",faq:"Q: 적용 대상?\nA: 주한미군, 군속 및 그 동반 가족 등 조약·협정 적용 대상자.",subCodes:[]},
        {code:"C-1",name:"일시취재",cat:"other",period:"90일, 연장불가",newReq:"외신보도증, 취재 계획서, 소속 언론사 재직증명, 여권.",extReq:"연장 불가.",faq:"Q: 장기 취재?\nA: D-5(취재) 자격으로 별도 발급."},
        {code:"D-5",name:"취재",cat:"other",period:"2년, 연장가능",newReq:"소속 보도기관 파견 확인서, 재직증명서, 여권.",extReq:"통합신청서, 여권, 등록증, 수수료 6만원. 재직증명서, 체류지.",faq:"Q: C-1과 차이?\nA: C-1은 90일 이하 단기, D-5는 상주 기자."},
        {code:"D-6",name:"종교",cat:"other",period:"2년, 연장가능",newReq:"종교단체 파견 확인서, 소속 단체 등록증, 여권.",extReq:"통합신청서, 여권, 등록증, 수수료 6만원. 소속단체 확인서, 체류지.",faq:"Q: 선교 활동?\nA: 종교단체·사회복지단체 파견 종교인 대상."}
        ];

        // ═══════════════════════════════════════════════════════════
        // LOGIC
        // ═══════════════════════════════════════════════════════════
        let currentSearchMode = 'and';
        let currentTheme = 'dark';

        const categoryColors = {
            short: 'var(--category-short)', study: 'var(--category-study)',
            work: 'var(--category-work)', invest: 'var(--category-invest)',
            family: 'var(--category-family)', other: 'var(--category-other)',
            diplo: 'var(--category-diplo)', nhis: 'var(--category-nhis)', faq: 'var(--category-faq)'
        };

        function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        
        function highlightKeyword(text, keywords) {
            if (!keywords.length) return escapeHtml(text);
            const safeText = escapeHtml(text);
            const regex = new RegExp(`(${keywords.map(escapeRegExp).join('|')})`, 'gi');
            return safeText.replace(regex, '<mark class="highlight">$1</mark>');
        }

        function getSearchableString(item) {
            let str = `${item.code} ${item.name} ${item.newReq} ${item.extReq} ${item.faq} ${item.period || ''}`;
            if (item.subCodes) item.subCodes.forEach(s => str += ` ${s.code} ${s.name} ${s.addReq || ''} ${s.note || ''}`);
            return str.toLowerCase();
        }

        function isSubCodeMatch(subItem, keywords) {
            const str = `${subItem.code} ${subItem.name} ${subItem.addReq || ''} ${subItem.note || ''}`.toLowerCase();
            return currentSearchMode === 'and' ? keywords.every(kw => str.includes(kw)) : keywords.some(kw => str.includes(kw));
        }

        function isVisaMatch(item, keywords) {
            const str = getSearchableString(item);
            return currentSearchMode === 'and' ? keywords.every(kw => str.includes(kw)) : keywords.some(kw => str.includes(kw));
        }

        function renderResults(query) {
            const container = document.getElementById('results-container');
            const countEl = document.getElementById('result-count');
            const hintEl = document.getElementById('search-hint');
            
            const keywords = query.trim().split(/\s+/).filter(Boolean);
            const lowerKeywords = keywords.map(kw => kw.toLowerCase());
            
            const filteredVisas = keywords.length ? VISA_DATA.filter(v => isVisaMatch(v, lowerKeywords)) : VISA_DATA;
            
            let totalSubCodesCount = 0;
            filteredVisas.forEach(v => { if (v.subCodes) totalSubCodesCount += v.subCodes.length; });

            if (!filteredVisas.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon">🔍</div>
                        <div class="empty-state__title">검색 결과 없음</div>
                        <div class="empty-state__desc">'${escapeHtml(query)}'에 해당하는 정보가 없습니다.<br>키워드를 줄이거나 OR 모드로 전환해보세요.</div>
                    </div>`;
                countEl.textContent = '0건';
                hintEl.textContent = keywords.length > 1 ? `${currentSearchMode.toUpperCase()} · ${keywords.length}개 키워드` : '';
                return;
            }

            const fragment = document.createDocumentFragment();

            filteredVisas.forEach(visa => {
                const card = document.createElement('article');
                card.className = 'visa-card'; 
                card.style.setProperty('--card-border-color', categoryColors[visa.cat] || categoryColors.other);
                
                const hasSubCodes = visa.subCodes && visa.subCodes.length > 0;
                let matchedSubCodes = hasSubCodes && keywords.length ? visa.subCodes.filter(s => isSubCodeMatch(s, lowerKeywords)) : [];

                if (keywords.length > 0 && matchedSubCodes.length > 0) card.classList.add('is-expanded');

                let subCodesHTML = '';
                if (hasSubCodes) {
                    subCodesHTML = `<div class="subcategories"><div class="subcategories__title"><span class="tag-label tag-label--sub">세부항목</span> ${visa.subCodes.length}개 분류코드</div>`;
                    visa.subCodes.forEach(sub => {
                        const isMatched = !keywords.length || matchedSubCodes.includes(sub);
                        const expandClass = keywords.length && isMatched ? ' is-expanded' : '';
                        
                        subCodesHTML += `
                        <div class="sub-card${expandClass}">
                            <div class="sub-card__header" onclick="this.parentElement.classList.toggle('is-expanded')">
                                <span class="sub-card__code">${highlightKeyword(sub.code, keywords)}</span>
                                <span class="sub-card__name">${highlightKeyword(sub.name, keywords)}</span>
                                <span class="toggle-icon">▼</span>
                            </div>
                            <div class="sub-card__content-wrapper">
                                <div class="sub-card__content">
                                    ${sub.addReq ? `<div class="sub-card__inner-section"><div class="tag-label tag-label--new">안내사항/추가요건</div><div class="content-text">${highlightKeyword(sub.addReq, keywords)}</div></div>` : ''}
                                    ${sub.note ? `<div class="sub-card__inner-section"><div class="tag-label tag-label--faq">실무참고</div><div class="content-text">${highlightKeyword(sub.note, keywords)}</div></div>` : ''}
                                </div>
                            </div>
                        </div>`;
                    });
                    subCodesHTML += `</div>`;
                }

                card.innerHTML = `
                    <div class="visa-card__header" onclick="this.parentElement.classList.toggle('is-expanded')">
                        <span class="badge-code">${highlightKeyword(visa.code, keywords)}</span>
                        <span class="visa-card__title">${highlightKeyword(visa.name, keywords)}</span>
                        ${visa.period ? `<span class="badge-period">${highlightKeyword(visa.period, keywords)}</span>` : ''}
                        ${hasSubCodes ? `<span class="badge-count">+${visa.subCodes.length}</span>` : ''}
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="visa-card__content-wrapper">
                        <div class="visa-card__content">
                            <div class="visa-section"><div class="tag-label tag-label--new">개요/신규발급</div><div class="content-text">${highlightKeyword(visa.newReq, keywords)}</div></div>
                            <div class="visa-section"><div class="tag-label tag-label--ext">절차/체류연장</div><div class="content-text">${highlightKeyword(visa.extReq, keywords)}</div></div>
                            <div class="visa-section"><div class="tag-label tag-label--faq">FAQ/주의사항</div><div class="content-text">${highlightKeyword(visa.faq, keywords)}</div></div>
                            ${subCodesHTML}
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(fragment);
            countEl.textContent = `${filteredVisas.length}건${keywords.length ? ' 검색' : ''}${totalSubCodesCount ? ` (세부항목 ${totalSubCodesCount}건)` : ''} · 총 ${VISA_DATA.length}개 카테고리`;
            hintEl.textContent = keywords.length > 1 ? `${currentSearchMode.toUpperCase()} · ${keywords.length}개 키워드` : '띄어쓰기 다중키워드 · AND/OR · 체류민원 직접검색';
        }

        let debounceTimer;
        function handleInput() {
            const query = document.getElementById('search-input').value;
            document.getElementById('btn-clear').classList.toggle('is-visible', query.length > 0);
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => renderResults(query), 150);
        }

        function clearSearch() {
            const input = document.getElementById('search-input');
            input.value = '';
            input.focus();
            document.getElementById('btn-clear').classList.remove('is-visible');
            renderResults('');
        }

        function setSearchMode(mode) {
            currentSearchMode = mode;
            document.getElementById('btn-and').classList.toggle('is-active', mode === 'and');
            document.getElementById('btn-or').classList.toggle('is-active', mode === 'or');
            renderResults(document.getElementById('search-input').value);
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', currentTheme);
            document.getElementById('btn-theme').textContent = currentTheme === 'dark' ? '☀️ 라이트' : '🌙 다크';
        }

        function toggleAccordions(collapse) {
            document.querySelectorAll('.visa-card, .sub-card').forEach(el => {
                if (collapse) el.classList.remove('is-expanded');
                else el.classList.add('is-expanded');
            });
        }

        (function initQuickFilters() {
            const filters = [
                { l: '건강보험/감면', q: '건강보험' }, { l: '하이코리아', q: '하이코리아' }, { l: '공통 구비서류', q: 'COM-1' },
                { l: '체류지/주소변경', q: '변경' }, { l: 'B-2-2 제주무비자', q: 'B-2-2 제주' }, { l: 'E-7 특정활동', q: 'E-7' },
                { l: 'E-9 비전문', q: 'E-9' }, { l: '결혼이민 F-6', q: 'F-6' }, { l: '영주 F-5', q: 'F-5' },
                { l: '난민 G-1', q: 'G-1' }, { l: '재외동포 F-4', q: 'F-4' }, { l: '방문취업 H-2', q: 'H-2' },
                { l: '점수제', q: '점수' }, { l: '가정폭력', q: '가정폭력' }, { l: '결핵진단서', q: '결핵' },
                { l: '아포스티유', q: '아포스티유' }, { l: '4대보험', q: '4대보험' }, { l: '이직/변경', q: '이직 변경' }
            ];
            const container = document.getElementById('quick-filters-container');
            filters.forEach(f => {
                const btn = document.createElement('button');
                btn.className = 'filter-chip';
                btn.textContent = f.l;
                btn.onclick = () => {
                    const input = document.getElementById('search-input');
                    input.value = f.q;
                    input.focus();
                    document.getElementById('btn-clear').classList.add('is-visible');
                    renderResults(f.q);
                };
                container.appendChild(btn);
            });
        })();

        document.getElementById('search-input').addEventListener('input', handleInput);
        document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Escape') clearSearch(); });

        renderResults('');
    </script>
</body>
</html>
