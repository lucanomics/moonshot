<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonshot — 출입국 민원·비자 통합 검색</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══════════════════════════════════
   DESIGN TOKENS — MOONSHOT THEME
   ═══════════════════════════════════ */
:root{
  /* Spacing */
  --sp-2xs:.25rem;--sp-xs:.5rem;--sp-sm:.75rem;--sp-md:1rem;--sp-lg:1.25rem;--sp-xl:1.5rem;--sp-2xl:2rem;--sp-3xl:3rem;
  /* Typography */
  --ff:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Noto Sans KR',system-ui,sans-serif;
  --fm:'JetBrains Mono','Fira Code','Noto Sans Mono',monospace;
  --fs-base:clamp(13px,1.35vw,15px);
  /* Radius */
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--r-full:999px;

  /* ── Light Mode: Lunar White ── */
  --bg-0:#f0f1f5;--bg-1:#ffffff;--bg-2:#f7f8fb;--bg-3:#eef0f6;--bg-input:#fff;
  --bdr:#d4d7e0;--bdr-card:#dfe2ea;--bdr-sub:#d0d4de;
  --tx-1:#0f1729;--tx-2:#3d4663;--tx-3:#6b7394;
  --ac:#4f46e5;--ac2:#6366f1;--ac-glow:rgba(99,102,241,.12);--ac-lt:#eef2ff;
  --cyan:#0891b2;--cyan-lt:#ecfeff;
  --hl-bg:#fef3c7;--hl-tx:#92400e;
  /* Tags */
  --t-new-bg:#dbeafe;--t-new:#1e40af;--t-ext-bg:#d1fae5;--t-ext:#065f46;
  --t-faq-bg:#fef3c7;--t-faq:#92400e;--t-sub-bg:#ede9fe;--t-sub:#5b21b6;
  --t-per-bg:#e0e7ff;--t-per:#3730a3;
  /* Categories */
  --c-short:#94a3b8;--c-study:#3b82f6;--c-work:#f59e0b;--c-inv:#10b981;
  --c-fam:#ec4899;--c-other:#8b5cf6;--c-diplo:#64748b;
  --c-nhis:#0d9488;--c-faq:#ef4444;--c-scn:#d946ef;
  /* Shadows */
  --sh-sm:0 1px 3px rgba(15,23,41,.06);--sh-md:0 4px 16px rgba(15,23,41,.1);
  --sh-glow:0 0 20px rgba(99,102,241,.15);
  /* Score bar */
  --score-track:#e2e8f0;--score-fill:linear-gradient(90deg,#6366f1,#22d3ee);
}

[data-theme="dark"]{
  /* ── Dark Mode: Deep Space ── */
  --bg-0:#080c18;--bg-1:#0e1225;--bg-2:#141832;--bg-3:#1a1f3a;--bg-input:#141832;
  --bdr:#1e2548;--bdr-card:#232a50;--bdr-sub:#1c2345;
  --tx-1:#e2e8f0;--tx-2:#94a3b8;--tx-3:#5a6380;
  --ac:#818cf8;--ac2:#6366f1;--ac-glow:rgba(129,140,248,.15);--ac-lt:#1e1b4b;
  --cyan:#22d3ee;--cyan-lt:#0c2a3a;
  --hl-bg:#422006;--hl-tx:#fbbf24;
  --t-new-bg:#1e1b4b;--t-new:#a5b4fc;--t-ext-bg:#052e16;--t-ext:#6ee7b7;
  --t-faq-bg:#422006;--t-faq:#fcd34d;--t-sub-bg:#2e1065;--t-sub:#c4b5fd;
  --t-per-bg:#1e1b4b;--t-per:#a5b4fc;
  --c-nhis:#2dd4bf;--c-faq:#fca5a5;--c-scn:#e879f9;
  --sh-sm:0 1px 4px rgba(0,0,0,.5);--sh-md:0 4px 20px rgba(0,0,0,.6);
  --sh-glow:0 0 30px rgba(99,102,241,.2);
  --score-track:#1e2548;
}

html{font-size:var(--fs-base);scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg-0);color:var(--tx-1);line-height:1.65;min-height:100vh;transition:background .3s,color .3s}

/* ═══════════════════════════════════
   HEADER — MOONSHOT BRANDING
   ═══════════════════════════════════ */
.hd{position:sticky;top:0;z-index:100;background:var(--bg-1);border-bottom:1px solid var(--bdr);padding:.6rem 1rem;backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);transition:background .3s}
.hd-in{max-width:1160px;margin:0 auto;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}

/* Logo */
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;flex-shrink:0}
.logo-mark{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--ac2),var(--cyan));display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 12px rgba(99,102,241,.3)}
.logo-mark::after{content:'';position:absolute;width:10px;height:10px;background:var(--bg-1);border-radius:50%;top:4px;right:4px;opacity:.85}
.logo-txt{display:flex;flex-direction:column;line-height:1.1}
.logo-brand{font-size:1.1rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:.55rem;font-weight:500;color:var(--tx-3);letter-spacing:.04em}

.hd-ct{display:flex;align-items:center;gap:.3rem;margin-left:auto;flex-wrap:wrap}
.cb{background:var(--bg-3);border:1px solid var(--bdr);border-radius:var(--r-full);padding:.22rem .6rem;font-size:.68rem;color:var(--tx-2);cursor:pointer;transition:all .2s;font-family:var(--ff);font-weight:600;white-space:nowrap}
.cb:hover{background:var(--ac-lt);color:var(--ac);border-color:var(--ac);transform:translateY(-1px)}
.cb.on{background:var(--ac2);color:#fff;border-color:var(--ac2);box-shadow:0 2px 8px rgba(99,102,241,.3)}

/* ═══════════════════════════════════
   SEARCH — GLOW INTERFACE
   ═══════════════════════════════════ */
.sa{max-width:1160px;margin:var(--sp-xl) auto 0;padding:0 var(--sp-md)}
.sb{position:relative;display:flex;align-items:center;background:var(--bg-input);border:2px solid var(--bdr);border-radius:var(--r-lg);box-shadow:var(--sh-sm);transition:all .3s cubic-bezier(.4,0,.2,1)}
.sb:focus-within{border-color:var(--ac);box-shadow:var(--sh-glow),0 0 0 4px var(--ac-glow)}
.sb-icon{position:absolute;left:var(--sp-md);color:var(--tx-3);font-size:1.15rem;pointer-events:none;transition:color .2s,transform .2s}
.sb:focus-within .sb-icon{color:var(--ac);transform:scale(1.1)}
#q{flex:1;border:none;outline:none;background:0;padding:.7rem .8rem .7rem 2.6rem;font-size:.88rem;color:var(--tx-1);font-family:var(--ff)}
#q::placeholder{color:var(--tx-3)}
.xb{background:0;border:0;color:var(--tx-3);cursor:pointer;padding:.4rem .7rem;font-size:1.1rem;display:none;transition:color .15s,transform .15s}
.xb:hover{color:var(--tx-1);transform:scale(1.15)}.xb.v{display:flex;align-items:center}
.sm{display:flex;justify-content:space-between;margin-top:.45rem;font-size:.68rem;color:var(--tx-3);padding:0 .3rem}

/* ═══════════════════════════════════
   QUICK FILTERS — PILL CHIPS
   ═══════════════════════════════════ */
.qf{max-width:1160px;margin:.55rem auto 0;padding:0 var(--sp-md);display:flex;flex-wrap:wrap;gap:.3rem}
.qb{background:var(--bg-3);border:1px solid var(--bdr);border-radius:var(--r-full);padding:.18rem .55rem;font-size:.63rem;color:var(--tx-3);cursor:pointer;transition:all .2s;font-weight:500}
.qb:hover{background:var(--ac-lt);color:var(--ac);border-color:var(--ac);transform:translateY(-1px)}

/* ═══════════════════════════════════
   RESULTS CONTAINER
   ═══════════════════════════════════ */
.rs{max-width:1160px;margin:var(--sp-md) auto var(--sp-2xl);padding:0 var(--sp-md);display:flex;flex-direction:column;gap:.55rem}

/* ═══════════════════════════════════
   VISA CARD — LAYERED GLASS
   ═══════════════════════════════════ */
.vc{background:var(--bg-1);border:1px solid var(--bdr-card);border-radius:var(--r-md);box-shadow:var(--sh-sm);border-left:4px solid var(--cb-c,var(--bdr-card));transition:box-shadow .3s,transform .2s;animation:fi .25s ease both}
.vc:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.vc-h{display:flex;align-items:center;gap:.5rem;padding:.6rem .85rem;background:var(--bg-2);cursor:pointer;user-select:none;border-radius:0 var(--r-md) var(--r-md) 0;transition:background .15s}
.vc-h:hover{background:var(--ac-lt)}
.bc{font-family:var(--fm);font-weight:700;font-size:.85rem;color:var(--ac);background:var(--ac-lt);padding:2px 7px;border-radius:var(--r-sm);letter-spacing:-.01em}
.vt{font-weight:700;font-size:.82rem;color:var(--tx-1)}
.bp{font-size:.6rem;color:var(--t-per);background:var(--t-per-bg);padding:2px 7px;border-radius:var(--r-sm);white-space:nowrap;font-weight:600}
.bn{font-size:.58rem;color:var(--tx-3);background:var(--bg-3);padding:2px 7px;border-radius:var(--r-sm);font-weight:700}
/* Relevance bar */
.rel-bar{margin-left:auto;display:flex;align-items:center;gap:.35rem;flex-shrink:0}
.rel-track{width:40px;height:4px;background:var(--score-track);border-radius:2px;overflow:hidden}
.rel-fill{height:100%;background:var(--score-fill);border-radius:2px;transition:width .4s ease}
.rel-pct{font-size:.55rem;color:var(--tx-3);font-variant-numeric:tabular-nums;min-width:1.8rem;text-align:right}
.tgl{color:var(--tx-3);font-size:.6rem;transition:transform .3s cubic-bezier(.4,0,.2,1);flex-shrink:0;margin-left:.2rem}

/* Accordion body */
.vc-cw{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1)}
.vc.open .vc-cw{grid-template-rows:1fr}
.vc.open .tgl{transform:rotate(180deg)}
.vc-c{overflow:hidden}

/* Sections */
.vs{padding:.55rem .85rem;border-top:1px solid var(--bdr-sub)}
.tl{display:inline-flex;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:4px;margin-bottom:.3rem}
.tl-n{background:var(--t-new-bg);color:var(--t-new)}
.tl-e{background:var(--t-ext-bg);color:var(--t-ext)}
.tl-f{background:var(--t-faq-bg);color:var(--t-faq)}
.tl-s{background:var(--t-sub-bg);color:var(--t-sub)}
.ct{font-size:.78rem;color:var(--tx-2);line-height:1.65;white-space:pre-line;word-break:keep-all}

/* ═══════════════════════════════════
   SUB-CODES — NESTED ACCORDION
   ═══════════════════════════════════ */
.ss{background:var(--bg-3);border-top:1px solid var(--bdr-sub)}
.ss-t{padding:.4rem .85rem;font-size:.62rem;font-weight:700;color:var(--tx-3);display:flex;align-items:center;gap:.35rem}
.ss-t b{background:var(--t-sub-bg);color:var(--t-sub);padding:2px 6px;border-radius:4px;font-size:.56rem}
.su{border-top:1px solid var(--bdr-sub)}
.su-h{display:flex;align-items:center;gap:.45rem;padding:.4rem .85rem .4rem 1.3rem;cursor:pointer;transition:background .15s}
.su-h:hover{background:var(--bg-2)}
.s-c{font-family:var(--fm);font-size:.73rem;font-weight:700;color:var(--ac);min-width:3.5rem}
.s-n{font-size:.75rem;font-weight:600;color:var(--tx-1)}
.su-cw{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1);background:var(--bg-2)}
.su.open .su-cw{grid-template-rows:1fr}
.su.open .tgl{transform:rotate(180deg)}
.su-c{overflow:hidden;border-left:3px solid var(--ac);margin-left:var(--sp-xl)}
.su-s{padding:.35rem .85rem}
.su-s+.su-s{border-top:1px dashed var(--bdr-sub)}

/* ═══════════════════════════════════
   HIGHLIGHT
   ═══════════════════════════════════ */
mark.h{background:var(--hl-bg);color:var(--hl-tx);padding:.05em .2em;border-radius:3px;font-weight:700}

/* ═══════════════════════════════════
   EMPTY STATE — COSMIC
   ═══════════════════════════════════ */
.es{text-align:center;padding:var(--sp-3xl) var(--sp-md)}
.es-orbit{width:80px;height:80px;margin:0 auto var(--sp-md);position:relative}
.es-planet{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--ac2),var(--cyan));position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(99,102,241,.3)}
.es-ring{width:70px;height:70px;border:2px solid var(--bdr);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(30deg);opacity:.4}
.es-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);position:absolute;top:-3px;left:50%;transform:translateX(-50%);animation:orbit 3s linear infinite}
@keyframes orbit{from{transform:translateX(-50%) rotate(0deg) translateY(-35px)}to{transform:translateX(-50%) rotate(360deg) translateY(-35px)}}
.es-t{font-weight:700;font-size:.95rem;color:var(--tx-2);margin-bottom:.3rem}
.es-d{font-size:.78rem;color:var(--tx-3);line-height:1.6}

/* ═══════════════════════════════════
   FOOTER
   ═══════════════════════════════════ */
.ft{text-align:center;padding:var(--sp-xl) var(--sp-md);font-size:.6rem;color:var(--tx-3);border-top:1px solid var(--bdr);max-width:1160px;margin:0 auto;line-height:1.7}

/* ═══════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════ */
@media(max-width:640px){
  .hd{padding:.45rem .6rem}
  .sa,.rs,.qf{padding:0 .6rem}
  .vs{padding:.45rem .6rem}
  .vc-h{padding:.45rem .6rem}
  .su-h{padding:.35rem .6rem .35rem .9rem}
  .su-c{margin-left:.6rem}
  .logo-brand{font-size:.95rem}
  .rel-track{width:28px}
}
@media(max-width:420px){
  .rel-bar{display:none}
  .hd-ct{gap:.2rem}
  .cb{padding:.18rem .4rem;font-size:.62rem}
}

/* Dark scrollbar */
[data-theme="dark"]::-webkit-scrollbar{width:7px}
[data-theme="dark"]::-webkit-scrollbar-track{background:var(--bg-0)}
[data-theme="dark"]::-webkit-scrollbar-thumb{background:#2a3060;border-radius:4px}
</style>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
</head>
<body data-theme="dark">

<header class="hd"><div class="hd-in">
  <a class="logo" href="#">
    <div class="logo-mark"></div>
    <div class="logo-txt">
      <span class="logo-brand">Moonshot</span>
      <span class="logo-sub">출입국 민원·비자 통합 검색</span>
    </div>
  </a>
  <div class="hd-ct">
    <button class="cb on" id="ma" onclick="setSearchMode('and')">AND</button>
    <button class="cb" id="mo" onclick="setSearchMode('or')">OR</button>
    <button class="cb" onclick="toggleAccordions(true)">전체접기</button>
    <button class="cb" onclick="toggleAccordions(false)">전체펼치기</button>
    <button class="cb" id="tb" onclick="toggleTheme()">☀️ 라이트</button>
  </div>
</div></header>

<main>
<section class="sa">
  <div class="sb">
    <span class="sb-icon">⌕</span>
    <input type="text" id="q" placeholder="비자코드, 시나리오, 체류민원 등 키워드 검색 (예: 자격변경 불가, 오버스테이)" autocomplete="off" spellcheck="false">
    <button class="xb" id="xb" onclick="clearSearch()">✕</button>
  </div>
  <div class="sm"><span id="rc"></span><span id="rh" style="opacity:.7">관련도 순 자동 정렬 · AND/OR · 실무 시나리오(SCN) 직접검색</span></div>
</section>

<section class="qf" id="qf"></section>
<section class="rs" id="rs"></section>
</main>

<footer class="ft">
  <strong style="background:linear-gradient(90deg,var(--ac),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Moonshot</strong> — 출입국외국인청 내부 민원 검색 도구 v10.0<br>
  ⚠ 법령·고시 변경 시 데이터 갱신 필요 · 내부 예규 및 부서별 지침 교차검증 필수
</footer>

<script>

{code:"C-1",name:"일시취재",cat:"other",period:"90일, 연장불가",newReq:"언론기관 재직증명서 및 기자증 사본, 취재계획서(일정/장소), 정부 추천서(필요시).",extReq:"연장 불가.",faq:"Q: 장기 취재?\nA: D-5(취재) 자격으로 별도 발급."},
{code:"D-5",name:"취재",cat:"other",period:"2년, 연장가능",newReq:"언론사 재직증명서, 고용/파견명령서, 취재/보도 계획서.",extReq:"통합신청서, 여권, 등록증, 수수료 6만원. 재직증명서, 체류지.",faq:"Q: C-1과 차이?\nA: C-1은 90일 이하 단기, D-5는 상주 기자."},
{code:"D-6",name:"종교",cat:"other",period:"2년, 연장가능",newReq:"종교/사회복지법인 설립허가증/정관/사업자등록증, 파견명령서/사역계획서, 안수/경력증명.",extReq:"통합신청서, 여권, 등록증, 수수료 6만원. 소속단체 확인서, 체류지.",faq:"Q: 선교 활동?\nA: 종교단체·사회복지단체 파견 종교인 대상."}

// ═══════════════════════════════════════════════════════════
// SCORING & SEARCH LOGIC — 100% PRESERVED
// ═══════════════════════════════════════════════════════════
let currentSearchMode='and',currentTheme='dark';
const CC={short:'var(--c-short)',study:'var(--c-study)',work:'var(--c-work)',invest:'var(--c-inv)',family:'var(--c-fam)',other:'var(--c-other)',diplo:'var(--c-diplo)',nhis:'var(--c-nhis)',faq:'var(--c-faq)',scn:'var(--c-scn)'};

function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hl(text,keywords){
  if(!keywords.length)return escapeHtml(text);
  return escapeHtml(text).replace(new RegExp(`(${keywords.map(escapeRegExp).join('|')})`,'gi'),'<mark class="h">$1</mark>');
}

function calculateScore(item,keywords){
  if(!keywords.length)return 1;
  let score=0;const cL=item.code.toLowerCase(),nL=item.name.toLowerCase(),content=`${item.newReq} ${item.extReq} ${item.faq} ${item.period||''}`.toLowerCase();
  let isAndMatch=true;
  for(const kw of keywords){
    let kwMatch=false;
    if(cL.includes(kw)||nL.includes(kw)){score+=100;kwMatch=true}
    if(item.subCodes){for(const sub of item.subCodes){
      if(sub.code.toLowerCase().includes(kw)||sub.name.toLowerCase().includes(kw)){score+=50;kwMatch=true}
      const sc=`${sub.addReq||''} ${sub.note||''}`.toLowerCase();
      const m=(sc.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
      if(m>0){score+=m*10;kwMatch=true}
    }}
    const cm=(content.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
    if(cm>0){score+=cm*10;kwMatch=true}
    if(!kwMatch)isAndMatch=false;
  }
  return currentSearchMode==='and'?(isAndMatch?score:0):score;
}

function renderResults(query){
  const box=document.getElementById('rs'),rc=document.getElementById('rc'),rh=document.getElementById('rh');
  const kw=query.trim().split(/\s+/).filter(Boolean),kwL=kw.map(k=>k.toLowerCase());
  let scored=VISA_DATA.map(v=>({...v,_score:calculateScore(v,kwL)}));
  let filtered=scored.filter(v=>v._score>0).sort((a,b)=>b._score-a._score);
  const maxScore=filtered.length?filtered[0]._score:1;
  let subTot=0;filtered.forEach(v=>{if(v.subCodes)subTot+=v.subCodes.length});

  if(!filtered.length){
    box.innerHTML=`<div class="es"><div class="es-orbit"><div class="es-planet"></div><div class="es-ring"><div class="es-dot"></div></div></div><div class="es-t">궤도에서 이탈했습니다</div><div class="es-d">'${escapeHtml(query)}'에 해당하는 정보를 찾지 못했습니다.<br>키워드를 줄이거나 OR 모드로 전환해 보세요.</div></div>`;
    rc.textContent='0건';rh.textContent=kw.length>1?`${currentSearchMode.toUpperCase()} · ${kw.length}개 키워드`:'';return;
  }

  const fg=document.createDocumentFragment();
  filtered.forEach(v=>{
    const card=document.createElement('article');card.className='vc';
    card.style.setProperty('--cb-c',CC[v.cat]||CC.other);
    const hasSub=v.subCodes&&v.subCodes.length>0;
    let matchedSubs=[];
    if(hasSub&&kw.length){matchedSubs=v.subCodes.filter(s=>{const str=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase();return currentSearchMode==='and'?true:kwL.some(k=>str.includes(k))})}
    if(kw.length&&(v._score>=50||matchedSubs.length))card.classList.add('open');

    // Relevance percentage
    const pct=kw.length?Math.min(Math.round((v._score/maxScore)*100),100):0;

    let subHTML='';
    if(hasSub){
      subHTML=`<div class="ss"><div class="ss-t"><b>세부항목</b>${v.subCodes.length}개 분류코드</div>`;
      v.subCodes.forEach(s=>{
        const sStr=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase();
        const isM=!kw.length||kwL.some(k=>sStr.includes(k));
        subHTML+=`<div class="su${kw.length&&isM?' open':''}"><div class="su-h" onclick="this.parentElement.classList.toggle('open')"><span class="s-c">${hl(s.code,kw)}</span><span class="s-n">${hl(s.name,kw)}</span><span class="tgl">▼</span></div><div class="su-cw"><div class="su-c">`;
        if(s.addReq)subHTML+=`<div class="su-s"><div class="tl tl-n">안내사항/추가요건</div><div class="ct">${hl(s.addReq,kw)}</div></div>`;
        if(s.note)subHTML+=`<div class="su-s"><div class="tl tl-f">실무참고</div><div class="ct">${hl(s.note,kw)}</div></div>`;
        subHTML+=`</div></div></div>`;
      });
      subHTML+=`</div>`;
    }

    card.innerHTML=`
      <div class="vc-h" onclick="this.parentElement.classList.toggle('open')">
        <span class="bc">${hl(v.code,kw)}</span>
        <span class="vt">${hl(v.name,kw)}</span>
        ${v.period?`<span class="bp">${hl(v.period,kw)}</span>`:''}
        ${hasSub?`<span class="bn">+${v.subCodes.length}</span>`:''}
        ${kw.length?`<div class="rel-bar"><div class="rel-track"><div class="rel-fill" style="width:${pct}%"></div></div><span class="rel-pct">${pct}%</span></div>`:''}
        <span class="tgl">▼</span>
      </div>
      <div class="vc-cw"><div class="vc-c">
        <div class="vs"><div class="tl tl-n">개요/신규발급</div><div class="ct">${hl(v.newReq,kw)}</div></div>
        <div class="vs"><div class="tl tl-e">절차/체류연장</div><div class="ct">${hl(v.extReq,kw)}</div></div>
        <div class="vs"><div class="tl tl-f">FAQ/주의사항</div><div class="ct">${hl(v.faq,kw)}</div></div>
        ${subHTML}
      </div></div>`;
    fg.appendChild(card);
  });
  box.innerHTML='';box.appendChild(fg);
  rc.textContent=`${filtered.length}건${kw.length?' 검색':''}${subTot?` (세부항목 ${subTot}건)`:''} · 총 ${VISA_DATA.length}개 카테고리`;
  rh.textContent=kw.length>1?`${currentSearchMode.toUpperCase()} · ${kw.length}개 키워드`:'관련도 순 자동 정렬 · AND/OR · 실무 시나리오(SCN) 직접검색';
}

let dt;
function handleInput(){const v=document.getElementById('q').value;document.getElementById('xb').classList.toggle('v',v.length>0);clearTimeout(dt);dt=setTimeout(()=>renderResults(v),150)}
function clearSearch(){const i=document.getElementById('q');i.value='';i.focus();document.getElementById('xb').classList.remove('v');renderResults('')}
function setSearchMode(m){currentSearchMode=m;document.getElementById('ma').classList.toggle('on',m==='and');document.getElementById('mo').classList.toggle('on',m==='or');renderResults(document.getElementById('q').value)}
function toggleTheme(){currentTheme=currentTheme==='dark'?'light':'dark';document.body.setAttribute('data-theme',currentTheme);document.getElementById('tb').textContent=currentTheme==='dark'?'☀️ 라이트':'🌙 다크'}
function toggleAccordions(c){document.querySelectorAll('.vc,.su').forEach(el=>{if(c)el.classList.remove('open');else el.classList.add('open')})}

(function initQF(){
  const f=[
    {l:'자격변경 원칙',q:'SCN-1'},{l:'오버스테이 조치',q:'SCN-6'},{l:'F-1-6 타이밍',q:'SCN-4'},
    {l:'F-4/H-2 제한',q:'SCN-5'},{l:'건강보험/감면',q:'건강보험 면제'},{l:'하이코리아',q:'하이코리아'},
    {l:'체류지/주소변경',q:'체류지 변경'},{l:'B-2-2 제주무비자',q:'B-2-2 제주'},{l:'E-7 특정활동',q:'E-7'},
    {l:'E-9 비전문',q:'E-9'},{l:'결혼이민 F-6',q:'F-6'},{l:'영주 F-5',q:'F-5'},
    {l:'난민 G-1',q:'G-1'},{l:'재외동포 F-4',q:'F-4'},{l:'점수제',q:'점수'},
    {l:'가정폭력',q:'가정폭력'},{l:'결핵진단서',q:'결핵'},{l:'아포스티유',q:'아포스티유'}
  ];
  const c=document.getElementById('qf');
  f.forEach(x=>{const b=document.createElement('button');b.className='qb';b.textContent=x.l;b.onclick=()=>{const i=document.getElementById('q');i.value=x.q;i.focus();document.getElementById('xb').classList.add('v');renderResults(x.q)};c.appendChild(b)});
})();

document.getElementById('q').addEventListener('input',handleInput);
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Escape')clearSearch()});
renderResults('');
</script>
