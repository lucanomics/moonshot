<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshot — 출입국 민원·비자 통합 검색</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --ff: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
            --ff-logo: 'Jua', sans-serif;
            --fs: clamp(14px, 1.35vw, 16px);
            
            --bg0: #f8fafc; --bg1: #ffffff; --bg2: #f1f5f9; --bg3: #e2e8f0; --bgI: #ffffff;
            --bd: #cbd5e1; --bd2: #e2e8f0; --bd3: #cbd5e1;
            --t1: #1e293b; --t2: #334155; --t3: #64748b;
            --ac: #4f46e5; --ac2: #6366f1; --acG: rgba(79, 70, 229, 0.15); --acL: #e0e7ff;
            --cy: #0ea5e9; --cyL: #e0f2fe;
            --hlB: #fef3c7; --hlT: #92400e;
            
            --cSh: #94a3b8; --cSt: #3b82f6; --cWk: #f59e0b; --cIn: #10b981;
            --cFm: #ec4899; --cOt: #8b5cf6; --cDp: #64748b; --cNh: #0d9488; 
            --cFq: #ef4444; --cSc: #d946ef;
            
            --sh1: 0 2px 6px rgba(15, 23, 41, 0.04); 
            --sh2: 0 8px 24px rgba(15, 23, 41, 0.08);
            --shG: 0 0 24px rgba(59, 130, 246, 0.15);
            --shD: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        [data-theme="dark"] {
            --bg0: #0f172a; --bg1: #1e293b; --bg2: #334155; --bg3: #1e293b; --bgI: #0f172a;
            --bd: #334155; --bd2: #475569; --bd3: #334155;
            --t1: #cbd5e1; --t2: #94a3b8; --t3: #64748b;
            --ac: #6366f1; --ac2: #818cf8; --acG: rgba(99, 102, 241, 0.15); --acL: #312e81;
            --cy: #38bdf8; --cyL: #0c4a6e;
            --hlB: #451a03; --hlT: #fbbf24;
            
            --cNh: #2dd4bf; --cFq: #fca5a5; --cSc: #e879f9;
            
            --sh1: 0 2px 8px rgba(0, 0, 0, 0.3); 
            --sh2: 0 12px 32px rgba(0, 0, 0, 0.4);
            --shG: 0 0 32px rgba(30, 58, 138, 0.5);
            --shD: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        html { font-size: var(--fs); scroll-behavior: smooth; }
        body, input, button { font-family: var(--ff) !important; }
        body { background: var(--bg0); color: var(--t1); line-height: 1.65; min-height: 100vh; overflow-x: hidden; transition: background 0.4s ease, color 0.4s ease; }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: opacity 0.8s ease; }
        .star { position: absolute; background: #cbd5e1; border-radius: 50%; animation: twk var(--d, 4s) infinite alternate; }
        @keyframes twk { 0% { opacity: 0.1; } 100% { opacity: 0.4; } }
        body.searched .stars { opacity: 0.05; }

        .hero-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; position: relative; z-index: 10; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .hero-container { min-height: 70px; padding: 0; position: sticky; top: 0; background: color-mix(in srgb, var(--bg1) 85%, transparent); border-bottom: 1px solid var(--bd); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: var(--sh1); }

        .header-inner { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; max-width: 700px; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .header-inner { flex-direction: row; justify-content: space-between; max-width: 1200px; gap: 1rem; padding: 0.6rem 1.2rem; }

        .logo-area { display: flex; flex-direction: column; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .logo-area { flex-direction: row; gap: 0.6rem; flex-shrink: 0; }

        .logo-svg { width: 130px; height: 130px; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .logo-svg { width: 44px; height: 44px; }

        .logo-text { display: flex; flex-direction: column; align-items: center; transition: all 0.7s ease; }
        body.searched .logo-text { align-items: flex-start; }
        
        .logo-brand { 
            font-family: var(--ff-logo) !important; 
            font-size: 4.16rem; 
            font-weight: 400; 
            letter-spacing: -0.02em; 
            line-height: 1.1; 
            background: linear-gradient(135deg, var(--ac), var(--cy)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        body.searched .logo-brand { font-size: 1.82rem; }
        
        .logo-sub { font-size: 0.85rem; font-weight: 500; color: var(--t3); letter-spacing: 0.02em; transition: all 0.4s ease; }
        body.searched .logo-sub { font-size: 0; opacity: 0; height: 0; margin: 0; overflow: hidden; }

        .rocket-flyer { transition: transform 0.1s; transform-origin: center; }
        .exhaust { opacity: 0; transition: opacity 0.2s ease-in-out; }
        body.launching .rocket-flyer { animation: moonshotLaunch 0.7s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        body.launching .exhaust { opacity: 1; animation: flicker 0.1s infinite alternate; }
        
        @keyframes moonshotLaunch { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(150px, -150px) scale(0.5); opacity: 0; } }
        @keyframes flicker { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }

        .search-wrap { width: 100%; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        body.searched .search-wrap { max-width: 500px; flex: 1; min-width: 200px; }

        .sbar { position: relative; display: flex; align-items: center; background: var(--bgI); border: 2px solid var(--bd); border-radius: 999px; box-shadow: var(--sh1); transition: all 0.3s ease-in-out; z-index: 20; }
        .sbar:focus-within { border-color: var(--ac); box-shadow: var(--shG), 0 0 0 4px var(--acG); }

        .sbar-icon { position: absolute; left: 1.2rem; color: var(--t3); width: 22px; height: 22px; transition: all 0.3s ease-in-out; }
        .sbar:focus-within .sbar-icon { color: var(--ac); transform: scale(1.1); }

        #q { flex: 1; border: 0; outline: 0; background: 0; padding: 1.1rem 1rem 1.1rem 3.2rem; font-size: 1.1rem; color: var(--t1); transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched #q { padding: 0.75rem 0.8rem 0.75rem 2.8rem; font-size: 0.95rem; }
        #q::placeholder { color: var(--t3); font-weight: 400; }

        .xb { background: 0; border: 0; color: var(--t3); cursor: pointer; padding: 0.5rem; font-size: 1.2rem; display: none; transition: color 0.3s ease-in-out; }
        .xb:hover { color: var(--t1); } .xb.v { display: block; }

        .sbar-go { background: 0; border: 0; cursor: pointer; color: var(--t3); padding: 0 1.2rem 0 0.5rem; display: flex; align-items: center; transition: all 0.3s ease-in-out; }
        .sbar-go:hover { color: var(--ac); transform: scale(1.1); }
        .sbar-go svg { width: 22px; height: 22px; }

        .auto-list { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--bg1); border: 1px solid var(--bd); border-radius: 12px; box-shadow: var(--shD); max-height: 300px; overflow-y: auto; z-index: 999; display: none; opacity: 0; transform: translateY(-10px); transition: all 0.3s ease-in-out; }
        .auto-list.active { display: block; opacity: 1; transform: translateY(0); }
        .auto-item { padding: 0.75rem 1.2rem; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem; color: var(--t1); border-bottom: 1px solid var(--bd2); transition: background 0.3s ease-in-out; }
        .auto-item:last-child { border-bottom: none; }
        .auto-item:hover { background: var(--bg2); }
        .auto-item svg { color: var(--t3); width: 16px; height: 16px; flex-shrink: 0; }

        .smeta { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.75rem; color: var(--t3); padding: 0 1rem; opacity: 0; height: 0; overflow: hidden; transition: opacity 0.3s ease; }
        body.searched .smeta { opacity: 1; height: auto; overflow: visible; }

        .ctrls { display: flex; align-items: center; gap: 0.4rem; opacity: 0; pointer-events: none; max-width: 0; overflow: hidden; transition: all 0.4s ease-in-out; }
        body.searched .ctrls { opacity: 1; pointer-events: auto; max-width: 300px; overflow: visible; flex-shrink: 0; }

        .cb { background: var(--bg3); border: 1px solid var(--bd); border-radius: 999px; padding: 0.3rem 0.7rem; font-size: 0.75rem; color: var(--t2); cursor: pointer; font-weight: 600; white-space: nowrap; transition: all 0.3s ease-in-out; }
        .cb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
        .cb.on { background: var(--ac2); color: #fff; border-color: var(--ac2); box-shadow: 0 2px 8px rgba(99,102,241,.3); }

        .landing-hints { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 2rem; max-width: 650px; transition: opacity 0.4s, max-height 0.4s; overflow: hidden; }
        body.searched .landing-hints { opacity: 0; max-height: 0; margin: 0; pointer-events: none; }
        .lh { background: var(--bg2); border: 1px solid var(--bd); border-radius: 999px; padding: 0.4rem 0.9rem; font-size: 0.8rem; color: var(--t3); cursor: pointer; transition: all 0.3s ease-in-out; font-weight: 500; }
        .lh:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); transform: translateY(-2px); }

        .results-area { 
            max-width: 1160px; margin: 0 auto; padding: 0 1rem; 
            opacity: 0; transform: translateY(40px); pointer-events: none; 
            transition: opacity 0.6s ease 0.1s, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s; 
        }
        body.searched .results-area { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .qf { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1.2rem 0 1rem; }
        .qb { background: var(--bg3); border: 1px solid var(--bd); border-radius: 999px; padding: 0.25rem 0.7rem; font-size: 0.7rem; color: var(--t3); cursor: pointer; transition: all 0.3s ease-in-out; font-weight: 500; }
        .qb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }

        .rlist { display: flex; flex-direction: column; gap: 0.7rem; padding-bottom: 3rem; }

        .vc { background: var(--bg1); border: 1px solid var(--bd2); border-radius: 12px; box-shadow: var(--sh1); border-left: 5px solid var(--cbc, var(--bd2)); transition: box-shadow 0.3s, transform 0.2s; animation: cIn 0.3s ease both; }
        .vc:hover { box-shadow: var(--sh2); transform: translateY(-2px); }
        @keyframes cIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .vc-h { display: flex; align-items: center; gap: 0.6rem; padding: 0.8rem 1rem; background: var(--bg2); cursor: pointer; user-select: none; border-radius: 0 10px 10px 0; transition: background 0.3s ease-in-out; flex-wrap: wrap; }
        .vc-h:hover { background: var(--acL); }
        
        .bc { font-weight: 700; font-size: 0.9rem; color: var(--ac); background: var(--acL); padding: 3px 8px; border-radius: 6px; }
        .vt { font-weight: 700; font-size: 0.9rem; color: var(--t1); }
        .bp { font-size: 0.65rem; color: var(--tPt); background: var(--tPb); padding: 3px 8px; border-radius: 5px; white-space: nowrap; font-weight: 600; }
        .bn { font-size: 0.65rem; color: var(--t3); background: var(--bg3); padding: 3px 8px; border-radius: 5px; font-weight: 700; }
        /* v22: 데이터 배지 */
        .bd { font-size: 0.6rem; color: #065f46; background: #d1fae5; padding: 3px 8px; border-radius: 5px; font-weight: 700; white-space: nowrap; }
        [data-theme="dark"] .bd { color: #6ee7b7; background: #064e3b; }
        .tgl { margin-left: auto; color: var(--t3); font-size: 0.7rem; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .vc-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .vc.open .vc-cw { grid-template-rows: 1fr; }
        .vc.open .tgl { transform: rotate(180deg); }
        .vc-c { overflow: hidden; }

        .vs { padding: 0.7rem 1rem; border-top: 1px solid var(--bd3); }
        .tl { display: inline-flex; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 5px; margin-bottom: 0.4rem; }
        .tl-n { background: var(--tNb); color: var(--tNt); } .tl-e { background: var(--tEb); color: var(--tEt); } .tl-f { background: var(--tFb); color: var(--tFt); } .tl-s { background: var(--tSb); color: var(--tSt); }
        .ct { font-size: 0.85rem; color: var(--t2); line-height: 1.65; white-space: pre-line; word-break: keep-all; }

        /* v22: 데이터 기준일 */
        .data-date { font-size: 0.65rem; color: var(--t3); padding: 0.4rem 1rem; border-top: 1px dashed var(--bd3); text-align: right; }

        .ss { background: var(--bg3); border-top: 1px solid var(--bd3); }
        .ss-t { padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 700; color: var(--t3); display: flex; align-items: center; gap: 0.4rem; }
        .ss-t b { background: var(--tSb); color: var(--tSt); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; }
        .su { border-top: 1px solid var(--bd3); }
        .su-h { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem 0.5rem 1.5rem; cursor: pointer; transition: background 0.3s ease-in-out; }
        .su-h:hover { background: var(--bg2); }
        .s-c { font-size: 0.8rem; font-weight: 700; color: var(--ac); min-width: 3.5rem; }
        .s-n { font-size: 0.8rem; font-weight: 600; color: var(--t1); }
        .su-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: var(--bg2); }
        .su.open .su-cw { grid-template-rows: 1fr; }
        .su.open .tgl { transform: rotate(180deg); }
        .su-c { overflow: hidden; border-left: 3px solid var(--ac); margin-left: 1.5rem; }
        .su-s { padding: 0.4rem 1rem; } .su-s + .su-s { border-top: 1px dashed var(--bd3); }

        mark.h { background: var(--hlB); color: var(--hlT); padding: 0.05em 0.2em; border-radius: 4px; font-weight: 700; }

        .es { text-align: center; padding: 4rem 1rem; }
        .es-t { font-weight: 800; font-size: 1.1rem; color: var(--t2); margin-bottom: 0.4rem; }
        .es-d { font-size: 0.9rem; color: var(--t3); line-height: 1.6; }

        .ft { 
            text-align: center; padding: 2rem 1rem; font-size: 0.7rem; color: var(--t3); 
            border-top: 1px solid var(--bd); max-width: 1160px; margin: 0 auto; 
            opacity: 0; 
            transition: opacity 0.5s ease 0.3s; 
        }
        body.searched .ft { opacity: 1; }
        
        .ft-logo { 
            font-family: var(--ff-logo) !important; 
            font-size: 0.8rem; 
            font-weight: 400; 
            background: linear-gradient(90deg, var(--ac), var(--cy)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
        }

        @media (max-width: 640px) {
            .logo-brand { font-size: 2.86rem; }
            body:not(.searched) #q { font-size: 1rem; padding: 1rem 0.5rem 1rem 2.8rem; }
            body.searched .logo-brand { font-size: 1.43rem; }
            body.searched .header-inner { padding: 0.6rem; gap: 0.5rem; }
            .ctrls { display: none; }
        }
    </style>
</head>
<body class="landing" data-theme="dark">

<div class="stars" id="stars"></div>

<div class="hero-container" id="hero">
    <div class="header-inner">
        <div class="logo-area" onclick="if(document.body.classList.contains('searched')) resetToLanding()">
            <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="85" cy="25" r="1.5" fill="#cbd5e1" opacity=".5"><animate attributeName="opacity" values=".2;.6;.2" dur="3s" repeatCount="indefinite"/></circle>
                <circle cx="95" cy="50" r="1.2" fill="#94a3b8" opacity=".4"/>
                <circle cx="25" cy="40" r="2" fill="#cbd5e1" opacity=".3"/>
                <path d="M 30,90 A 45,45 0 1,0 90,30 A 55,55 0 1,1 30,90 Z" fill="url(#gMoon)" opacity=".95"/>
                <g class="rocket-flyer">
                    <g transform="translate(48, 72) rotate(45)">
                        <rect x="-8" y="-18" width="16" height="34" rx="8" fill="url(#gRocket)"/>
                        <path d="M -8,-10 L 0,-28 L 8,-10 Z" fill="#3b82f6"/>
                        <path d="M -8,5 L -16,20 L -8,12 Z" fill="#6366f1"/>
                        <path d="M 8,5 L 16,20 L 8,12 Z" fill="#6366f1"/>
                        <circle cx="0" cy="-2" r="3.5" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
                        <g class="exhaust">
                            <path d="M -5,16 L 0,35 L 5,16 Z" fill="#f59e0b"/>
                            <path d="M -2.5,16 L 0,26 L 2.5,16 Z" fill="#fef08a"/>
                        </g>
                    </g>
                </g>
                <defs>
                    <linearGradient id="gMoon" x1="20" y1="20" x2="100" y2="100">
                        <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1e3a8a"/>
                    </linearGradient>
                    <linearGradient id="gRocket" x1="0" y1="-20" x2="0" y2="20">
                        <stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#94a3b8"/>
                    </linearGradient>
                </defs>
            </svg>
            <div class="logo-text">
                <span class="logo-brand">Moonshot</span>
                <span class="logo-sub">출입국 민원·비자 통합 검색 플랫폼</span>
            </div>
        </div>

        <div class="search-wrap" id="search-wrap">
            <div class="sbar">
                <svg class="sbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
                <input type="text" id="q" placeholder="제주 무사증, 사증면제협정국, B-2-2, K-ETA, D-2 서류 등 검색" autocomplete="off" spellcheck="false">
                <button class="xb" id="xb" onclick="clearSearch()">✕</button>
                <button class="sbar-go" onclick="executeSearch()" title="검색">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
            
            <div class="auto-list" id="auto-list"></div>

            <div class="smeta"><span id="rc"></span><span id="rh">관련도 순 자동 정렬 · 제주 무사증/사증면제협정국 연관검색 강화</span></div>
        </div>

        <div class="ctrls">
            <button class="cb on" id="ma" onclick="setSearchMode('and')">AND</button>
            <button class="cb" id="mo" onclick="setSearchMode('or')">OR</button>
            <button class="cb" onclick="toggleAccordions(true)">접기</button>
            <button class="cb" onclick="toggleAccordions(false)">펼치기</button>
            <button class="cb" onclick="toggleTheme()" title="테마 변경">🌗</button>
        </div>
    </div>
    <div class="landing-hints" id="landingHints"></div>
</div>

<div class="results-area" id="resultsArea">
    <div class="qf" id="qf"></div>
    <div class="rlist" id="rlist"></div>
</div>

<footer class="ft">
    <span class="ft-logo">Moonshot</span> v22.2 · K-ETA 116개국 + B-1 67개국 + B-2 45개국 + RF-1 난민서류 반영 · placeholder 무작위 순환 · 폰트(주아/Pretendard) 일관성 강제 · 실무 교차검증 필수
</footer>

<script>
// ═══════════════════════════════════════════════════════════
// DATA v22.2 — K-ETA 크롤링 데이터 반영, 데이터 기준일 배지 추가

{code:"B-1",name:"사증면제협정",cat:"short",period:"3개월, 연장불가",dataBadge:"67개국 협정 (일시정지 3개국 제외)",dataDate:"2026-04-14 (immigration.go.kr 공식 수치)",newReq:"사증면제협정국, 상호주의, 일방면제 대상 여부를 먼저 확인하고 유효 여권 및 K-ETA 적용 여부를 점검. B-1 대상은 총 67개국(사증면제협정 체결국 기준).",extReq:"원칙적으로 연장 불가. 체류 목적·국적별 예외는 별도 확인.",faq:"Q: 사증면제협정국이면 취업이나 영리활동도 가능한가?\nA: 아니오. 단기 비영리 방문 중심으로 보며, 취업·영리활동은 별도 체류자격 또는 사증 필요 여부를 심사해야 함.\nQ: B-1과 B-2의 차이?\nA: B-1은 국가 간 협정에 의한 사증면제, B-2는 상호주의·일방면제·제주 특례 등에 의한 관광통과(45개국·지역).",aliases:["사증면제협정국","사증면제협정","비자면제협정","무사증협정","협정국","상호주의","일방면제","비자면제국"],subCodes:[{code:"B-1-1",name:"B-1 일반여권 유효 67개국",addReq:"말레이시아(3개월), 싱가포르(90일), 아랍에미리트(90일), 이스라엘(90일), 카자흐스탄(30일/180일 내 60일), 태국(90일), 튀르키예(90일), 카타르(90일), 과테말라(90일), 그레나다(90일), 니카라과(90일), 도미니카공화국(90일), 도미니카연방(90일), 멕시코(3개월), 바베이도스(90일), 바하마(90일), 베네수엘라(90일), 브라질(90일), 세인트루시아(90일), 세인트빈센트그레나딘(90일), 세인트키츠네비스(90일), 수리남(3개월), 아이티(90일), 앤티가바부다(90일), 엘살바도르(90일), 우루과이(90일), 자메이카(90일), 칠레(90일), 코스타리카(90일), 콜롬비아(90일), 트리니다드토바고(90일), 파나마(90일), 페루(90일), 그리스(3개월), 네덜란드(3개월), 노르웨이(90일), 덴마크(90일), 독일(90일), 라트비아(90일), 러시아(60일/180일 내 90일), 루마니아(90일), 룩셈부르크(3개월), 리투아니아(90일), 리히텐슈타인(3개월), 몰타(90일), 벨기에(3개월), 불가리아(90일), 스웨덴(90일), 스위스(3개월), 스페인(90일), 슬로바키아(90일), 아이슬란드(90일), 아일랜드(90일), 에스토니아(90일), 영국(90일), 오스트리아(90일), 이탈리아(90일), 체코(90일), 포르투갈(90일), 폴란드(90일), 프랑스(90일), 핀란드(90일), 헝가리(90일), 레소토(60일), 모로코(90일), 튀니지(30일), 뉴질랜드(3개월).",note:"PDF 기준일 2024.12.04. 일시정지 3개국(방글라데시, 파키스탄, 라이베리아) 제외."},{code:"B-1-2",name:"B-1 일시정지 3개국",addReq:"방글라데시(90일, 불체 급증 사유), 파키스탄(3개월, 2001.10.1~ 일시정지), 라이베리아(90일).",note:"협정은 유효하나 일반여권 대상 일시정지 상태."}]},

// ═══ SCORING ALGORITHM ═══
let currentSearchMode='and', currentTheme='dark';
const CC={short:'var(--cSh)',study:'var(--cSt)',work:'var(--cWk)',invest:'var(--cIn)',family:'var(--cFm)',other:'var(--cOt)',diplo:'var(--cDp)',nhis:'var(--cNh)',faq:'var(--cFq)',scn:'var(--cSc)'};

function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hl(t,k){if(!k.length)return escapeHtml(t);return escapeHtml(t).replace(new RegExp(`(${k.map(escapeRegExp).join('|')})`,'gi'),'<mark class="h">$1</mark>')}

function calculateScore(item,keywords){
    if(!keywords.length) return 1;
    let score=0;
    const cL=(item.code||'').toLowerCase(), nL=(item.name||'').toLowerCase();
    const aliasL=(item.aliases||[]).map(x=>String(x).toLowerCase());
    const content=`${item.newReq||''} ${item.extReq||''} ${item.faq||''} ${item.period||''}`.toLowerCase();
    let isAnd=true;
    for(const kw of keywords){
        let m=false;
        if(cL===kw||nL===kw){score+=220; m=true;}
        else if(cL.includes(kw)||nL.includes(kw)){score+=120; m=true;}
        aliasL.forEach(a=>{ if(a===kw){score+=180; m=true;} else if(a.includes(kw)||kw.includes(a)){score+=90; m=true;} });
        if(item.subCodes){
            for(const s of item.subCodes){
                const sCode=(s.code||'').toLowerCase(), sName=(s.name||'').toLowerCase();
                const sAliases=(s.aliases||[]).join(' ').toLowerCase();
                if(sCode===kw||sName===kw){score+=90; m=true;}
                else if(sCode.includes(kw)||sName.includes(kw)){score+=60; m=true;}
                const sc=`${s.addReq||''} ${s.note||''} ${sAliases}`.toLowerCase();
                const n=(sc.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
                if(n>0){score+=n*16; m=true;}
            }
        }
        const cn=(content.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
        if(cn>0){score+=cn*12; m=true;}
        if(!m) isAnd=false;
    }
    return currentSearchMode==='and' ? (isAnd?score:0) : score;
}

function expandKeywords(keywords){
    const expanded = new Set(keywords.map(k=>k.toLowerCase()));
    const joined = keywords.join('').toLowerCase();
    const joinedNoSpace = joined.replace(/\s+/g,'');
    if(ALIAS_MAP[joined]) expanded.add(ALIAS_MAP[joined].toLowerCase());
    if(ALIAS_MAP[joinedNoSpace]) expanded.add(ALIAS_MAP[joinedNoSpace].toLowerCase());
    keywords.forEach(k=>{
        const nk = k.replace(/\s+/g,'').toLowerCase();
        if(ALIAS_MAP[nk]) expanded.add(ALIAS_MAP[nk].toLowerCase());
        if(nk==='제주') expanded.add('b-2-2');
        if(nk==='협정') expanded.add('b-1');
    });
    return [...expanded];
}

    "제주 무사증 제외국","난민신청 필요서류"
];

function showSuggestions(val) {
    const list = document.getElementById('auto-list');
    list.innerHTML = '';
    if(!val) { list.classList.remove('active'); return; }
    const lowerVal = val.toLowerCase();
    const matches = PREDEF_KEYWORDS.filter(k => k.toLowerCase().includes(lowerVal));
    VISA_DATA.forEach(v => {
        if(v.code.toLowerCase().includes(lowerVal) || v.name.toLowerCase().includes(lowerVal)) {
            const str = `${v.code} ${v.name}`;
            if(!matches.includes(str)) matches.push(str);
        }
    });
    if(matches.length > 0) {
        matches.slice(0, 7).forEach(m => {
            const div = document.createElement('div');
            div.className = 'auto-item';
            div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg> <span>${hl(m, [val])}</span>`;
            div.onclick = () => {
                document.getElementById('q').value = m;
                list.classList.remove('active');
                executeSearch();
            };
            list.appendChild(div);
        });
        list.classList.add('active');
    } else {
        list.classList.remove('active');
    }
}
document.addEventListener('click', function(e) {
    if(!document.getElementById('search-wrap').contains(e.target)){
        document.getElementById('auto-list').classList.remove('active');
    }
});

// ═══ STATE MACHINE ═══
function executeSearch(){
    document.getElementById('auto-list').classList.remove('active');
    const q=document.getElementById('q').value.trim();
    if(!q) return;
    if(document.body.classList.contains('landing')){
        document.body.classList.add('launching');
        setTimeout(()=>{
            document.body.classList.remove('landing', 'launching');
            document.body.classList.add('searched');
            renderResults(q);
            window.scrollTo({top:0, behavior:'smooth'});
        }, 600);
    } else {
        renderResults(q);
    }
}

function resetToLanding(){
    document.body.classList.remove('searched');
    document.body.classList.add('landing');
    document.getElementById('q').value='';
    document.getElementById('xb').classList.remove('v');
    document.getElementById('rlist').innerHTML='';
    document.getElementById('rc').textContent='';
}

function renderResults(query){
    const box=document.getElementById('rlist'), rc=document.getElementById('rc');
    const kw=query.trim().split(/\s+/).filter(Boolean), kwL=expandKeywords(kw.map(k=>k.toLowerCase()));
    
    let scored=VISA_DATA.map(v=>({...v,_score:calculateScore(v,kwL)}));
    let filtered=scored.filter(v=>v._score>0).sort((a,b)=>b._score-a._score);
    
    let st=0; filtered.forEach(v=>{if(v.subCodes) st+=v.subCodes.length;});
    
    if(!filtered.length){
        box.innerHTML=`<div class="es"><div class="es-t">궤도에서 이탈했습니다</div><div class="es-d">'${escapeHtml(query)}'에 해당하는 정보가 없습니다.<br>키워드를 줄이거나 OR 모드로 전환해 보세요.</div></div>`;
        rc.textContent='0건'; return;
    }
    
    const fg=document.createDocumentFragment();
    filtered.forEach((v)=>{
        const c=document.createElement('article'); c.className='vc';
        c.style.setProperty('--cbc', CC[v.cat]||CC.other);
        
        const hs=v.subCodes&&v.subCodes.length>0;
        let ms=[];
        if(hs&&kw.length) ms=v.subCodes.filter(s=>{const x=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase(); return kwL.some(k=>x.includes(k));});
        if(kw.length&&(v._score>=50||ms.length)) c.classList.add('open');
        
        let sh='';
        if(hs){
            sh=`<div class="ss"><div class="ss-t"><b>세부항목</b>${v.subCodes.length}개</div>`;
            v.subCodes.forEach(s=>{
                const x=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase();
                const im=!kw.length||kwL.some(k=>x.includes(k));
                sh+=`<div class="su${kw.length&&im?' open':''}"><div class="su-h" onclick="this.parentElement.classList.toggle('open')"><span class="s-c">${hl(s.code,kw)}</span><span class="s-n">${hl(s.name,kw)}</span><span class="tgl">▼</span></div><div class="su-cw"><div class="su-c">`;
                if(s.addReq) sh+=`<div class="su-s"><div class="tl tl-n">안내/추가</div><div class="ct">${hl(s.addReq,kw)}</div></div>`;
                if(s.note) sh+=`<div class="su-s"><div class="tl tl-f">실무참고</div><div class="ct">${hl(s.note,kw)}</div></div>`;
                sh+=`</div></div></div>`;
            });
            sh+=`</div>`;
        }
        
        // v22: dataBadge 렌더링
        const dbHtml = v.dataBadge ? `<span class="bd">${escapeHtml(v.dataBadge)}</span>` : '';
        // v22: dataDate 렌더링
        const ddHtml = v.dataDate ? `<div class="data-date">데이터 기준: ${escapeHtml(v.dataDate)}</div>` : '';
        
        c.innerHTML=`<div class="vc-h" onclick="this.parentElement.classList.toggle('open')"><span class="bc">${hl(v.code,kw)}</span><span class="vt">${hl(v.name,kw)}</span>${v.period?`<span class="bp">${hl(v.period,kw)}</span>`:''}${dbHtml}${hs?`<span class="bn">+${v.subCodes.length}</span>`:''}<span class="tgl">▼</span></div><div class="vc-cw"><div class="vc-c"><div class="vs"><div class="tl tl-n">개요/신규</div><div class="ct">${hl(v.newReq,kw)}</div></div><div class="vs"><div class="tl tl-e">절차/연장</div><div class="ct">${hl(v.extReq,kw)}</div></div><div class="vs"><div class="tl tl-f">FAQ/주의</div><div class="ct">${hl(v.faq,kw)}</div></div>${sh}${ddHtml}</div></div>`;
        fg.appendChild(c);
    });
    
    box.innerHTML=''; box.appendChild(fg);
    rc.textContent=`${filtered.length}건${st?` (세부 ${st}건)`:''} · 총 ${VISA_DATA.length}개`;
}

// ═══ CONTROLS ═══
let dt;
function handleInput(){
    const v=document.getElementById('q').value;
    document.getElementById('xb').classList.toggle('v',v.length>0);
    showSuggestions(v);
    if(document.body.classList.contains('searched')){
        clearTimeout(dt);
        dt=setTimeout(()=>renderResults(v),150);
    }
}
function clearSearch(){
    const i=document.getElementById('q');
    i.value='';
    i.focus();
    document.getElementById('xb').classList.remove('v');
    document.getElementById('auto-list').classList.remove('active');
    if(document.body.classList.contains('searched'))renderResults('');
}
function setSearchMode(m){currentSearchMode=m;document.getElementById('ma').classList.toggle('on',m==='and');document.getElementById('mo').classList.toggle('on',m==='or');if(document.body.classList.contains('searched'))renderResults(document.getElementById('q').value);}
function toggleTheme(){currentTheme=currentTheme==='dark'?'light':'dark';document.body.setAttribute('data-theme',currentTheme);}
function toggleAccordions(c){document.querySelectorAll('.vc,.su').forEach(el=>{if(c)el.classList.remove('open');else el.classList.add('open');});}
