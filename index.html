<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonshot — 출입국 민원·비자 통합 검색</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ff: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
      --fm: 'JetBrains Mono', 'Fira Code', 'Noto Sans Mono', monospace;
      --fs: clamp(14px, 1.35vw, 16px);

      --bg0: #f8fafc; --bg1: #ffffff; --bg2: #f1f5f9; --bg3: #e2e8f0; --bgI: #ffffff;
      --bd: #cbd5e1; --bd2: #e2e8f0; --bd3: #cbd5e1;
      --t1: #1e293b; --t2: #334155; --t3: #64748b;
      --ac: #4f46e5; --ac2: #6366f1; --acG: rgba(79, 70, 229, 0.15); --acL: #e0e7ff;
      --cy: #0ea5e9; --cyL: #e0f2fe;
      --hlB: #fef3c7; --hlT: #92400e;

      --cSh: #94a3b8; --cSt: #3b82f6; --cWk: #f59e0b; --cIn: #10b981;
      --cFm: #ec4899; --cOt: #8b5cf6; --cDp: #64748b; --cNh: #0d9488;
      --cFq: #ef4444; --cSc: #d946ef;

      --sh1: 0 2px 6px rgba(15, 23, 41, 0.04);
      --sh2: 0 8px 24px rgba(15, 23, 41, 0.08);
      --shG: 0 0 24px rgba(59, 130, 246, 0.15);
      --shD: 0 10px 25px rgba(0, 0, 0, 0.10);

      --tNb:#eff6ff; --tNt:#1d4ed8;
      --tEb:#ecfdf5; --tEt:#047857;
      --tFb:#fff7ed; --tFt:#c2410c;
      --tSb:#f5f3ff; --tSt:#7c3aed;
      --tPb:#e0f2fe; --tPt:#0369a1;
    }

    [data-theme="dark"] {
      --bg0:#0f172a; --bg1:#111827; --bg2:#1f2937; --bg3:#111827; --bgI:#0b1220;
      --bd:#334155; --bd2:#334155; --bd3:#334155;
      --t1:#e5e7eb; --t2:#cbd5e1; --t3:#94a3b8;
      --ac:#818cf8; --ac2:#6366f1; --acG:rgba(129,140,248,.18); --acL:#312e81;
      --cy:#38bdf8; --cyL:#082f49;
      --hlB:#451a03; --hlT:#fcd34d;
      --sh1:0 2px 8px rgba(0,0,0,.35);
      --sh2:0 14px 36px rgba(0,0,0,.45);
      --shG:0 0 0 4px rgba(99,102,241,.18);
      --shD:0 18px 44px rgba(0,0,0,.45);
      --tNb:#172554; --tNt:#93c5fd;
      --tEb:#052e16; --tEt:#6ee7b7;
      --tFb:#431407; --tFt:#fdba74;
      --tSb:#2e1065; --tSt:#d8b4fe;
      --tPb:#082f49; --tPt:#7dd3fc;
    }

    html { font-size: var(--fs); scroll-behavior: smooth; }
    body {
      font-family: var(--ff);
      background: var(--bg0);
      color: var(--t1);
      line-height: 1.65;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .35s ease, color .35s ease;
    }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: opacity .8s ease; }
    .star { position: absolute; background: #cbd5e1; border-radius: 50%; animation: twk var(--d,4s) infinite alternate; }
    @keyframes twk { from { opacity:.08; } to { opacity:.45; } }

    .hero-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      position: relative;
      z-index: 10;
      transition: all .7s cubic-bezier(.4,0,.2,1);
    }
    body.searched .hero-container {
      min-height: 70px;
      padding: 0;
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--bg1) 85%, transparent);
      border-bottom: 1px solid var(--bd);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--sh1);
    }

    .header-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 780px;
      transition: all .7s cubic-bezier(.4,0,.2,1);
    }
    body.searched .header-inner {
      flex-direction: row;
      justify-content: space-between;
      max-width: 1200px;
      gap: 1rem;
      padding: .6rem 1.2rem;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all .7s cubic-bezier(.4,0,.2,1);
    }
    body.searched .logo-area { flex-direction: row; gap: .6rem; flex-shrink: 0; }

    .logo-svg { width: 100px; height: 100px; transition: all .7s cubic-bezier(.4,0,.2,1); }
    body.searched .logo-svg { width: 34px; height: 34px; }

    .logo-text { display: flex; flex-direction: column; align-items: center; transition: all .7s ease; }
    body.searched .logo-text { align-items: flex-start; }

    .logo-brand {
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
      font-family: 'Jua', sans-serif;
      background: linear-gradient(135deg, var(--ac), var(--cy));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: font-size .7s ease;
    }
    body.searched .logo-brand { font-size: 1.2rem; }

    .logo-sub {
      font-size: .88rem;
      font-weight: 600;
      color: var(--t3);
      letter-spacing: .01em;
      transition: all .4s;
    }
    body.searched .logo-sub { font-size: 0; opacity: 0; height: 0; margin: 0; overflow: hidden; }

    .search-wrap { width: 100%; transition: all .7s cubic-bezier(.4,0,.2,1); position: relative; }
    body.searched .search-wrap { max-width: 520px; flex: 1; min-width: 220px; }

    .sbar {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bgI);
      border: 2px solid var(--bd);
      border-radius: 999px;
      box-shadow: var(--sh1);
      transition: all .3s cubic-bezier(.4,0,.2,1);
      z-index: 20;
    }
    .sbar:focus-within { border-color: var(--ac); box-shadow: var(--shG), 0 0 0 4px var(--acG); }

    .sbar-icon { position: absolute; left: 1.2rem; color: var(--t3); width: 22px; height: 22px; transition: all .2s; }
    .sbar:focus-within .sbar-icon { color: var(--ac); transform: scale(1.08); }

    #q {
      flex: 1;
      border: 0;
      outline: 0;
      background: 0;
      padding: 1.1rem 1rem 1.1rem 3.2rem;
      font-size: 1.08rem;
      color: var(--t1);
      font-family: var(--ff);
      transition: all .7s ease;
    }
    body.searched #q { padding: .78rem .85rem .78rem 2.9rem; font-size: .97rem; }
    #q::placeholder { color: var(--t3); font-weight: 500; }

    .xb {
      background: 0;
      border: 0;
      color: var(--t3);
      cursor: pointer;
      padding: .5rem;
      font-size: 1.2rem;
      display: none;
    }
    .xb.v { display: block; }

    .sbar-go {
      background: 0;
      border: 0;
      cursor: pointer;
      color: var(--t3);
      padding: 0 1.2rem 0 .55rem;
      display: flex;
      align-items: center;
      transition: color .2s, transform .2s;
    }
    .sbar-go:hover { color: var(--ac); transform: scale(1.06); }
    .sbar-go svg { width: 22px; height: 22px; }

    .auto-list {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--bg1);
      border: 1px solid var(--bd);
      border-radius: 12px;
      box-shadow: var(--shD);
      max-height: 320px;
      overflow-y: auto;
      z-index: 999;
      display: none;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity .2s, transform .2s;
    }
    .auto-list.active { display: block; opacity: 1; transform: translateY(0); }
    .auto-item {
      padding: .8rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .92rem;
      color: var(--t1);
      border-bottom: 1px solid var(--bd2);
      transition: background .2s;
    }
    .auto-item:last-child { border-bottom: 0; }
    .auto-item:hover { background: var(--bg2); }
    .auto-item svg { color: var(--t3); width: 16px; height: 16px; flex-shrink: 0; }

    .smeta {
      display: flex;
      justify-content: space-between;
      margin-top: .55rem;
      font-size: .78rem;
      color: var(--t3);
      padding: 0 .8rem;
      opacity: 0;
      height: 0;
      overflow: hidden;
      transition: opacity .3s;
    }
    body.searched .smeta { opacity: 1; height: auto; overflow: visible; }

    .ctrls {
      display: flex;
      align-items: center;
      gap: .4rem;
      opacity: 0;
      pointer-events: none;
      max-width: 0;
      overflow: hidden;
      transition: opacity .4s ease;
    }
    body.searched .ctrls {
      opacity: 1;
      pointer-events: auto;
      max-width: 420px;
      overflow: visible;
      flex-shrink: 0;
    }
    .cb {
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: 999px;
      padding: .35rem .75rem;
      font-size: .76rem;
      color: var(--t2);
      cursor: pointer;
      font-family: var(--ff);
      font-weight: 700;
      white-space: nowrap;
      transition: all .2s;
    }
    .cb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
    .cb.on { background: var(--ac2); color: #fff; border-color: var(--ac2); box-shadow: 0 2px 8px rgba(99,102,241,.3); }

    .landing-hints {
      display: flex;
      flex-wrap: wrap;
      gap: .55rem;
      justify-content: center;
      margin-top: 2rem;
      max-width: 760px;
      transition: opacity .4s, max-height .4s;
      overflow: hidden;
    }
    body.searched .landing-hints { opacity: 0; max-height: 0; margin: 0; pointer-events: none; }
    .lh {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 999px;
      padding: .45rem .95rem;
      font-size: .82rem;
      color: var(--t3);
      cursor: pointer;
      transition: all .2s;
      font-weight: 700;
    }
    .lh:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); transform: translateY(-2px); }

    .results-area {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 1rem;
      opacity: 0;
      transform: translateY(40px);
      pointer-events: none;
      transition: opacity .6s ease .1s, transform .6s cubic-bezier(.4,0,.2,1) .1s;
    }
    body.searched .results-area {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .qf { display: flex; flex-wrap: wrap; gap: .4rem; margin: 1.2rem 0 1rem; }
    .qb {
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: 999px;
      padding: .3rem .72rem;
      font-size: .74rem;
      color: var(--t3);
      cursor: pointer;
      transition: all .2s;
      font-weight: 700;
    }
    .qb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }

    .db-wrap {
      margin: .2rem 0 .9rem;
      padding: .7rem .9rem;
      border: 1px solid var(--bd);
      border-radius: 1rem;
      background: linear-gradient(180deg,var(--bg2),transparent);
      color: var(--t2);
      font-size: .82rem;
      display: flex;
      flex-wrap: wrap;
      gap: .5rem .8rem;
    }
    .db-chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .25rem .55rem;
      border-radius: 999px;
      background: var(--bg1);
      border: 1px solid var(--bd);
      font-weight: 800;
    }

    .fc-wrap { display:flex; flex-wrap:wrap; gap:.45rem; margin:.2rem 0 1rem; }
    .fc {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 999px;
      padding: .38rem .82rem;
      font-size: .77rem;
      color: var(--t2);
      cursor: pointer;
      font-weight: 800;
    }
    .fc:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
    .fc.on { background: var(--ac2); color: #fff; border-color: var(--ac2); }

    .af-wrap { display:flex; flex-wrap:wrap; gap:.45rem; margin:0 0 1rem; }
    .af-btn {
      background:var(--bg2);
      border:1px solid var(--bd);
      border-radius:999px;
      padding:.45rem .85rem;
      font-size:.78rem;
      color:var(--t2);
      cursor:pointer;
      font-weight:800;
    }
    .af-btn:hover { background:var(--acL); color:var(--ac); border-color:var(--ac); }
    .af-btn.on { background:var(--ac2); color:#fff; border-color:var(--ac2); }

    .rlist { display: flex; flex-direction: column; gap: .7rem; padding-bottom: 3rem; }

    .vc {
      background: var(--bg1);
      border: 1px solid var(--bd2);
      border-radius: 12px;
      box-shadow: var(--sh1);
      border-left: 5px solid var(--cbc, var(--bd2));
      transition: box-shadow .3s, transform .2s;
      animation: cIn .3s ease both;
    }
    .vc:hover { box-shadow: var(--sh2); transform: translateY(-2px); }
    @keyframes cIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

    .vc-h {
      display:flex;
      align-items:center;
      gap:.6rem;
      padding:.85rem 1rem;
      background:var(--bg2);
      cursor:pointer;
      user-select:none;
      border-radius:0 10px 10px 0;
      transition:background .2s;
      flex-wrap: wrap;
    }
    .vc-h:hover { background: var(--acL); }

    .bc {
      font-family: var(--fm);
      font-weight: 700;
      font-size: .9rem;
      color: var(--ac);
      background: var(--acL);
      padding: 3px 8px;
      border-radius: 6px;
    }
    .vt { font-weight: 800; font-size: .95rem; color: var(--t1); }
    .bp {
      font-size: .68rem;
      color: var(--tPt);
      background: var(--tPb);
      padding: 3px 8px;
      border-radius: 5px;
      white-space: nowrap;
      font-weight: 700;
    }
    .bn {
      font-size: .65rem;
      color: var(--t3);
      background: var(--bg3);
      padding: 3px 8px;
      border-radius: 5px;
      font-weight: 800;
      white-space: nowrap;
    }
    .bn.meta-eff { color:#0f766e; background:#ccfbf1; }
    .bn.meta-ver { color:#1d4ed8; background:#dbeafe; }
    .bn.meta-trust-off { color:#065f46; background:#d1fae5; }
    .bn.meta-trust-int { color:#92400e; background:#fef3c7; }
    .bn.meta-trust-rev { color:#991b1b; background:#fee2e2; }
    .bn.meta-stale { color:#7c2d12; background:#ffedd5; }
    .bn.meta-exp { color:#7f1d1d; background:#fecaca; }

    [data-theme="dark"] .bn.meta-eff { color:#99f6e4; background:#134e4a; }
    [data-theme="dark"] .bn.meta-ver { color:#93c5fd; background:#1e3a8a; }
    [data-theme="dark"] .bn.meta-trust-off { color:#a7f3d0; background:#064e3b; }
    [data-theme="dark"] .bn.meta-trust-int { color:#fde68a; background:#78350f; }
    [data-theme="dark"] .bn.meta-trust-rev { color:#fecaca; background:#7f1d1d; }
    [data-theme="dark"] .bn.meta-stale { color:#fdba74; background:#7c2d12; }
    [data-theme="dark"] .bn.meta-exp { color:#fecaca; background:#7f1d1d; }

    .tgl { margin-left: auto; color: var(--t3); font-size: .7rem; transition: transform .3s cubic-bezier(.4,0,.2,1); }

    .vc-cw { display:grid; grid-template-rows:0fr; transition:grid-template-rows .35s cubic-bezier(.4,0,.2,1); }
    .vc.open .vc-cw { grid-template-rows:1fr; }
    .vc.open .tgl { transform:rotate(180deg); }
    .vc-c { overflow:hidden; }

    .vs { padding:.8rem 1rem; border-top:1px solid var(--bd3); }
    .tl {
      display:inline-flex;
      font-size:.65rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.05em;
      padding:3px 8px;
      border-radius:5px;
      margin-bottom:.45rem;
    }
    .tl-n { background:var(--tNb); color:var(--tNt); }
    .tl-e { background:var(--tEb); color:var(--tEt); }
    .tl-f { background:var(--tFb); color:var(--tFt); }
    .tl-s { background:var(--tSb); color:var(--tSt); }

    .ct {
      font-size:.88rem;
      color:var(--t2);
      line-height:1.72;
      white-space:pre-line;
      word-break:keep-all;
    }
    .ct a { color: var(--cy); text-decoration: none; }
    .ct a:hover { text-decoration: underline; }

    .mini-guide {
      margin:.4rem 0 1rem;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:.6rem;
    }
    .mg-card {
      border:1px solid var(--bd);
      background:var(--bg1);
      border-radius:14px;
      padding:.8rem .9rem;
      box-shadow:var(--sh1);
    }
    .mg-k {
      font-size:.72rem;
      color:var(--t3);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .mg-v {
      margin-top:.2rem;
      font-size:.88rem;
      color:var(--t1);
      font-weight:700;
      line-height:1.45;
    }

    .checklist { display:grid; gap:.45rem; }
    .checkline {
      display:flex;
      gap:.55rem;
      align-items:flex-start;
      padding:.48rem .55rem;
      border:1px solid var(--bd3);
      border-radius:10px;
      background:var(--bg1);
    }
    .checkicon {
      width:1.1rem;
      flex:0 0 1.1rem;
      color:var(--ac);
      font-weight:900;
    }

    .ss { background: var(--bg3); border-top: 1px solid var(--bd3); }
    .ss-t {
      padding: .55rem 1rem;
      font-size: .72rem;
      font-weight: 700;
      color: var(--t3);
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .ss-t b {
      background: var(--tSb);
      color: var(--tSt);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: .65rem;
    }

    .su { border-top: 1px solid var(--bd3); }
    .su-h {
      display:flex;
      align-items:center;
      gap:.5rem;
      padding:.55rem 1rem .55rem 1.5rem;
      cursor:pointer;
      transition:background .2s;
    }
    .su-h:hover { background: var(--bg2); }

    .s-c {
      font-family: var(--fm);
      font-size: .8rem;
      font-weight: 700;
      color: var(--ac);
      min-width: 3.5rem;
    }
    .s-n { font-size: .82rem; font-weight: 700; color: var(--t1); }

    .su-cw { display:grid; grid-template-rows:0fr; transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1); background:var(--bg2); }
    .su.open .su-cw { grid-template-rows:1fr; }
    .su.open .tgl { transform: rotate(180deg); }
    .su-c { overflow:hidden; border-left:3px solid var(--ac); margin-left:1.5rem; }
    .su-s { padding:.45rem 1rem; }
    .su-s + .su-s { border-top:1px dashed var(--bd3); }

    mark.h {
      background: var(--hlB);
      color: var(--hlT);
      padding: .04em .2em;
      border-radius: 4px;
      font-weight: 700;
    }

    .es { text-align:center; padding:4rem 1rem; }
    .es-t { font-weight:800; font-size:1.1rem; color:var(--t2); margin-bottom:.4rem; }
    .es-d { font-size:.9rem; color:var(--t3); line-height:1.6; }

    .ft {
      text-align:center;
      padding:2rem 1rem;
      font-size:.72rem;
      color:var(--t3);
      border-top:1px solid var(--bd);
      max-width:1160px;
      margin:0 auto;
      opacity:0;
      transition:opacity .5s .3s;
    }
    body.searched .ft { opacity:1; }

    body.focus-mode .stars,
    body.focus-mode .exhaust { opacity:0 !important; animation:none !important; }
    body.focus-mode * { scroll-behavior:auto; }
    body.focus-mode .vc,
    body.focus-mode .sbar,
    body.focus-mode .db-wrap { box-shadow:none !important; }
    body.focus-mode .vc-h,
    body.focus-mode .su-h { background:var(--bg1) !important; }
    body.focus-mode .ct { font-size:.96rem; line-height:1.9; }
    body.focus-mode .landing-hints { display:none !important; }

    body.plain-mode .ct { font-size:.96rem; line-height:1.85; }
    body.plain-mode .vt { letter-spacing:-.01em; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation:none !important; transition:none !important; scroll-behavior:auto !important; }
    }

    @media (max-width: 640px) {
      .logo-brand { font-size: 2.2rem; }
      body:not(.searched) #q { font-size: 1rem; padding: 1rem .55rem 1rem 2.9rem; }

    function normalizeForSearch(item){
      const extras = [
        item.summary || '',
        ...(item.eligibility || []),
        ...(item.exemptions || []),
        ...(item.key_rules || []),
        ...(item.quick_steps || []),

        ...(item.warnings || []),
        ...(item.sources || []).flatMap(x => [x.org || '', x.title || '', x.url || ''])
      ].join(' ');
      return `${item.newReq || ''} ${item.extReq || ''} ${item.faq || ''} ${item.period || ''} ${extras}`.toLowerCase();
    }

    function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
    function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function hl(t,k){
      if(t == null) return '';
      if(!k.length) return escapeHtml(String(t));
      return escapeHtml(String(t)).replace(new RegExp(`(${k.map(escapeRegExp).join('|')})`,'gi'), '<mark class="h">$1</mark>');
    }

    function calculateScore(item,keywords){
      if(!keywords.length) return 1;
      let score=0;
      const cL=(item.code||'').toLowerCase();
      const nL=(item.name||'').toLowerCase();
      const content=normalizeForSearch(item);
      let isAnd=true;

      for(const kw of keywords){
        let m=false;
        if(cL.includes(kw) || nL.includes(kw)){ score+=100; m=true; }
        if(item.subCodes){
          for(const s of item.subCodes){
            if((s.code||'').toLowerCase().includes(kw) || (s.name||'').toLowerCase().includes(kw)){ score+=50; m=true; }
            const sc=`${s.addReq||''} ${s.note||''}`.toLowerCase();
            const n=(sc.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
            if(n>0){ score+=n*10; m=true; }
          }
        }
        const cn=(content.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
        if(cn>0){ score+=cn*10; m=true; }
        if(!m) isAnd=false;
      }
      return currentSearchMode==='and' ? (isAnd?score:0) : score;
    }

    function showSuggestions(val) {
      const list = document.getElementById('auto-list');
      list.innerHTML = '';
      if(!val) { list.classList.remove('active'); return; }

      const lowerVal = val.toLowerCase();
      const matches = PREDEF_KEYWORDS.filter(k => k.toLowerCase().includes(lowerVal));

      ACTIVE_DATA.forEach(v => {
        if(v.code.toLowerCase().includes(lowerVal) || v.name.toLowerCase().includes(lowerVal)) {
          const str = `${v.code} ${v.name}`;
          if(!matches.includes(str)) matches.push(str);
        }
      });

      if(matches.length > 0) {
        matches.slice(0, 8).forEach(m => {
          const div = document.createElement('div');
          div.className = 'auto-item';
          div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg> <span>${hl(m, [val])}</span>`;
          div.onclick = () => {

      if(!items || !items.length) return '';
      const rows = items.map(x => `<div class="checkline"><span class="checkicon">✓</span><div>${hl(x,kw)}</div></div>`).join('');
      return `<div class="vs"><div class="tl ${labelClass}">${label}</div><div class="checklist">${rows}</div></div>`;
    }

    function renderMiniGuide(v, kw){
      const blocks = [];
      if(v.period) blocks.push(['시기', v.period]);
      if(v.last_verified_at) blocks.push(['검증일', v.last_verified_at]);
      if(v.trust_level==='official') blocks.push(['출처수준', '공식']);
      else if(v.trust_level==='internal') blocks.push(['출처수준', '내부정리+공식대조 필요']);
      if(!blocks.length) return '';
      return `<div class="mini-guide">${blocks.map(([k,val])=>`<div class="mg-card"><div class="mg-k">${escapeHtml(k)}</div><div class="mg-v">${hl(val,kw)}</div></div>`).join('')}</div>`;
    }

    function renderSourceBlock(v){
      if(!v.sources?.length) return '';
      const rows = v.sources.map(s => `<div class="su-s"><div class="ct">${escapeHtml(s.org || '')}${s.title ? ` · ${s.url ? `<a href="${escapeHtml(s.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(s.title)}</a>` : escapeHtml(s.title)}` : ''}${s.last_verified_at ? `<br>검증일: ${escapeHtml(s.last_verified_at)}` : ''}</div></div>`).join('');
      return `<div class="ss"><div class="ss-t"><b>${v.sources.length}</b> 출처</div>${rows}</div>`;
    }

    function renderV2Blocks(v, kw){
      return [
        renderMiniGuide(v, kw),
        renderInfoBlock('tl-s','요약',v.summary||'',kw),
        renderChecklistBlock('tl-s','빠른 순서',v.quick_steps,kw),
        renderChecklistBlock('tl-s','필수서류',v.key_rules,kw),
        renderChecklistBlock('tl-e','실무 보완서류',v.practical_docs,kw),
        renderChecklistBlock('tl-s','대상',v.eligibility,kw),
        renderChecklistBlock('tl-n','진행 흐름',v.office_flow,kw),
        renderChecklistBlock('tl-e','소득요건',v.income_rules,kw),
        renderChecklistBlock('tl-e','재신청',v.reapply_triggers,kw),
        renderChecklistBlock('tl-e','업데이트 가능',v.updatable_fields,kw),
        renderChecklistBlock('tl-f','사진 규정',v.photo_rules,kw),
        renderChecklistBlock('tl-f','ADHD 준비 팁',v.adhd_tips,kw),
        renderChecklistBlock('tl-f','주의',v.warnings,kw),
        renderSourceBlock(v)
      ].join('');
    }

    function renderSubCodes(v, kw, kwL){
      const hs=v.subCodes&&v.subCodes.length>0;
      if(!hs) return '';
      let sh=`<div class="ss"><div class="ss-t"><b>세부항목</b>${v.subCodes.length}개</div>`;
      v.subCodes.forEach(s=>{
        const x=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase();
        const im=!kw.length||kwL.some(k=>x.includes(k));
        sh+=`<div class="su${kw.length&&im?' open':''}"><div class="su-h" onclick="this.parentElement.classList.toggle('open')"><span class="s-c">${hl(s.code,kw)}</span><span class="s-n">${hl(s.name,kw)}</span><span class="tgl">▼</span></div><div class="su-cw"><div class="su-c">`;
        if(s.addReq) sh+=`<div class="su-s"><div class="tl tl-n">안내/추가</div><div class="ct">${hl(s.addReq,kw)}</div></div>`;
        if(s.note) sh+=`<div class="su-s"><div class="tl tl-f">실무참고</div><div class="ct">${hl(s.note,kw)}</div></div>`;
        sh+=`</div></div></div>`;
      });
      sh+=`</div>`;
      return sh;
    }

    function renderCard(v, kw, kwL){
      const hs=v.subCodes&&v.subCodes.length>0;
      return `<article class="vc${kw.length&&hs?' open':''}" style="--cbc:${CC[v.cat]||CC.other}">
        <div class="vc-h" onclick="this.parentElement.classList.toggle('open')">
          <span class="bc">${hl(v.code,kw)}</span>
          <span class="vt">${hl(v.name,kw)}</span>
          ${v.period?`<span class="bp">${hl(v.period,kw)}</span>`:''}
          ${renderMetaBadges(v)}
          ${hs?`<span class="bn">+${v.subCodes.length}</span>`:''}
          <span class="tgl">▼</span>
        </div>
        <div class="vc-cw">
          <div class="vc-c">
            ${renderInfoBlock('tl-n','개요/신규',v.newReq||'',kw)}
            ${renderInfoBlock('tl-e','절차/연장',v.extReq||'',kw)}
            ${renderInfoBlock('tl-f','FAQ/주의',v.faq||'',kw)}
            ${renderV2Blocks(v,kw)}
            ${renderSubCodes(v,kw,kwL)}
          </div>
        </div>
      </article>`;
    }

    function renderDataBanner(){
      const el = document.getElementById('dbWrap');
      if(!el) return;
      el.innerHTML = `
        <span class="db-chip">데이터 ${escapeHtml(DATA_META.version)}</span>
        <span class="db-chip">검증일 ${escapeHtml(DATA_META.lastAudit)}</span>
        <span class="db-chip">공식 우선 · 내부정리 병행</span>
        <span class="db-chip">팁: 집중모드와 쉬운설명을 켜면 읽기 쉬워집니다</span>
      `;
    }

    function renderCategoryFilters(){
      const el = document.getElementById('fcWrap');
      if(!el) return;
      const filters = [
        ['all','전체'],['faq','FAQ'],['short','단기'],['study','유학'],['work','취업'],['family','가족'],['scn','시나리오']
      ];
      el.innerHTML = '';
      filters.forEach(([key,label]) => {
        const b = document.createElement('button');
        b.className = `fc${activeCategory===key?' on':''}`;
        b.textContent = label;
        b.onclick = () => setCategoryFilter(key);
        el.appendChild(b);
      });
    }

    function setCategoryFilter(cat){
      activeCategory = cat;
      renderCategoryFilters();
      if(document.body.classList.contains('searched')) renderResults(document.getElementById('q').value || '');
    }

    function renderResults(query){
      const box=document.getElementById('rlist');
      const rc=document.getElementById('rc');
      const kw=query.trim().split(/\s+/).filter(Boolean);
      const kwL=expandKeywords(kw.map(k=>k.toLowerCase()));

      let scored=ACTIVE_DATA
        .filter(v => activeCategory==='all' ? true : v.cat===activeCategory)
        .map(v=>({...v,_score:calculateScore(v,kwL)}));

      let filtered=scored.filter(v=>v._score>0).sort((a,b)=>b._score-a._score);
      let st=0;
      filtered.forEach(v=>{ if(v.subCodes) st+=v.subCodes.length; });

      if(!filtered.length){
        box.innerHTML=`<div class="es"><div class="es-t">검색 결과가 없습니다</div><div class="es-d">'${escapeHtml(query)}'에 해당하는 정보가 없습니다.<br>키워드를 줄이거나 OR 모드로 전환해 보세요.</div></div>`;
        rc.textContent='0건';
        return;
      }

      box.innerHTML = filtered.map(v=>renderCard(v,kw,kwL)).join('');
      const scopeLabel = activeCategory==='all' ? '전체' : activeCategory;
      rc.textContent=`결과 ${filtered.length}건${st?` · 세부 ${st}건`:''} · 범주 ${scopeLabel} · 데이터 ${DATA_META.version}`;
    }

    function executeSearch(){
      document.getElementById('auto-list').classList.remove('active');
      const q=document.getElementById('q').value.trim();
      if(!q) return;
      if(document.body.classList.contains('landing')){
        document.body.classList.add('launching');
        setTimeout(()=>{
          document.body.classList.remove('landing', 'launching');
          document.body.classList.add('searched');
          renderResults(q);
          window.scrollTo({top:0, behavior:'smooth'});
        }, 300);
      } else {
        renderResults(q);
      }
    }

    function resetToLanding(){
      document.body.classList.remove('searched');
      document.body.classList.add('landing');
      document.getElementById('q').value='';
      document.getElementById('xb').classList.remove('v');
      document.getElementById('rlist').innerHTML='';
      document.getElementById('rc').textContent='';
    }

    let dt;
    function handleInput(){
      const v=document.getElementById('q').value;
      document.getElementById('xb').classList.toggle('v',v.length>0);
      showSuggestions(v);
      if(document.body.classList.contains('searched')){
        clearTimeout(dt);
        dt=setTimeout(()=>renderResults(v),150);
      }
    }

    function clearSearch(){
      const i=document.getElementById('q');
      i.value='';
      i.focus();
      document.getElementById('xb').classList.remove('v');
      document.getElementById('auto-list').classList.remove('active');
      if(document.body.classList.contains('searched')) renderResults('');
    }

    function setSearchMode(m){
      currentSearchMode=m;
      document.getElementById('ma').classList.toggle('on',m==='and');
      document.getElementById('mo').classList.toggle('on',m==='or');
      if(document.body.classList.contains('searched')) renderResults(document.getElementById('q').value);
    }

    function toggleTheme(){
      currentTheme=currentTheme==='dark'?'light':'dark';
      document.body.setAttribute('data-theme',currentTheme);
    }

    function toggleAccordions(c){
      document.querySelectorAll('.vc,.su').forEach(el=>{
        if(c) el.classList.remove('open');
        else el.classList.add('open');
      });
    }

    function syncAccessibilityButtons(){
      const fb = document.getElementById('focusModeBtn');
      const pb = document.getElementById('plainModeBtn');
      if(fb) fb.classList.toggle('on', focusMode);
      if(pb) pb.classList.toggle('on', plainMode);
    }

    function toggleFocusMode(){
      focusMode = !focusMode;
      document.body.classList.toggle('focus-mode', focusMode);
      syncAccessibilityButtons();
    }

    function togglePlainLanguage(){
      plainMode = !plainMode;
      document.body.classList.toggle('plain-mode', plainMode);
      syncAccessibilityButtons();
    }

    (function(){
      const stars = document.getElementById('stars');
      for(let i=0;i<30;i++){
        const s = document.createElement('span');
        s.className='star';
        s.style.left = `${Math.random()*100}%`;
        s.style.top = `${Math.random()*100}%`;
        const size = Math.random()*3 + 1;
        s.style.width = `${size}px`;
        s.style.height = `${size}px`;
        s.style.setProperty('--d', `${Math.random()*3+2}s`);
        stars.appendChild(s);
      }

      renderDataBanner();
      renderCategoryFilters();
      syncAccessibilityButtons();

      const lf = [
        {l:'F-3 소득요건(25년)',q:'F-3 소득요건'},
        {l:'K-ETA 가이드',q:'K-ETA'},
        {l:'난민신청 서류',q:'RF-1 난민신청'},
        {l:'난민 거주지증명',q:'RF-1 거주지증명'},
        {l:'제주무비자',q:'B-2-2 제주'},
        {l:'외국인등록',q:'FAQ-1'}
      ];
      const lc=document.getElementById('landingHints');
      lf.forEach(x=>{
        const b=document.createElement('button');
        b.className='lh';
        b.textContent=x.l;
        b.onclick=()=>{ document.getElementById('q').value=x.q; executeSearch(); };
        lc.appendChild(b);
      });

      const rf = [
        {l:'난민서류',q:'RF-1'},
        {l:'통합신청서',q:'RF-1 통합신청서'},
        {l:'거주지증명',q:'RF-1 거주지증명'},
        {l:'외국인등록',q:'FAQ-1'},
        {l:'체류연장',q:'FAQ-2'},
        {l:'K-ETA',q:'K-ETA'},
        {l:'F-3',q:'F-3'},
        {l:'D-2',q:'D-2'}
      ];
      const qc=document.getElementById('qf');
      rf.forEach(x=>{
        const b=document.createElement('button');
        b.className='qb';
        b.textContent=x.l;
        b.onclick=()=>{
          const i=document.getElementById('q');
          i.value=x.q;
          i.focus();
          document.getElementById('xb').classList.add('v');
          renderResults(x.q);
        };
        qc.appendChild(b);
      });

      document.getElementById('q').addEventListener('input', handleInput);
      document.getElementById('q').addEventListener('keydown', e=>{
        if(e.key==='Enter'){ e.preventDefault(); executeSearch(); }
        if(e.key==='Escape') clearSearch();
      });
    })();
  </script>
</body>
</html>
