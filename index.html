<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshot — 출입국 민원·비자 통합 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --ff: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
            --fm: 'JetBrains Mono', 'Fira Code', 'Noto Sans Mono', monospace;
            --fs: clamp(14px, 1.35vw, 16px);
            
            --bg0: #f8fafc; --bg1: #ffffff; --bg2: #f1f5f9; --bg3: #e2e8f0; --bgI: #ffffff;
            --bd: #cbd5e1; --bd2: #e2e8f0; --bd3: #cbd5e1;
            --t1: #1e293b; --t2: #334155; --t3: #64748b;
            --ac: #4f46e5; --ac2: #6366f1; --acG: rgba(79, 70, 229, 0.15); --acL: #e0e7ff;
            --cy: #0ea5e9; --cyL: #e0f2fe;
            --hlB: #fef3c7; --hlT: #92400e;
            
            --cSh: #94a3b8; --cSt: #3b82f6; --cWk: #f59e0b; --cIn: #10b981;
            --cFm: #ec4899; --cOt: #8b5cf6; --cDp: #64748b; --cNh: #0d9488; 
            --cFq: #ef4444; --cSc: #d946ef;
            
            --sh1: 0 2px 6px rgba(15, 23, 41, 0.04); 
            --sh2: 0 8px 24px rgba(15, 23, 41, 0.08);
            --shG: 0 0 24px rgba(59, 130, 246, 0.15);
            --shD: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        [data-theme="dark"] {
            --bg0: #0f172a; --bg1: #1e293b; --bg2: #334155; --bg3: #1e293b; --bgI: #0f172a;
            --bd: #334155; --bd2: #475569; --bd3: #334155;
            --t1: #cbd5e1; --t2: #94a3b8; --t3: #64748b;
            --ac: #6366f1; --ac2: #818cf8; --acG: rgba(99, 102, 241, 0.15); --acL: #312e81;
            --cy: #38bdf8; --cyL: #0c4a6e;
            --hlB: #451a03; --hlT: #fbbf24;
            
            --cNh: #2dd4bf; --cFq: #fca5a5; --cSc: #e879f9;
            
            --sh1: 0 2px 8px rgba(0, 0, 0, 0.3); 
            --sh2: 0 12px 32px rgba(0, 0, 0, 0.4);
            --shG: 0 0 32px rgba(30, 58, 138, 0.5);
            --shD: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        html { font-size: var(--fs); scroll-behavior: smooth; }
        body { font-family: var(--ff); background: var(--bg0); color: var(--t1); line-height: 1.65; min-height: 100vh; overflow-x: hidden; transition: background 0.4s ease, color 0.4s ease; }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: opacity 0.8s ease; }
        .star { position: absolute; background: #cbd5e1; border-radius: 50%; animation: twk var(--d, 4s) infinite alternate; }
        @keyframes twk { 0% { opacity: 0.1; } 100% { opacity: 0.4; } }
        body.searched .stars { opacity: 0.05; }

        .hero-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; position: relative; z-index: 10; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .hero-container { min-height: 70px; padding: 0; position: sticky; top: 0; background: color-mix(in srgb, var(--bg1) 85%, transparent); border-bottom: 1px solid var(--bd); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: var(--sh1); }

        .header-inner { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; max-width: 700px; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .header-inner { flex-direction: row; justify-content: space-between; max-width: 1200px; gap: 1rem; padding: 0.6rem 1.2rem; }

        .logo-area { display: flex; flex-direction: column; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .logo-area { flex-direction: row; gap: 0.6rem; flex-shrink: 0; }

        .logo-svg { width: 100px; height: 100px; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .logo-svg { width: 34px; height: 34px; }

        .logo-text { display: flex; flex-direction: column; align-items: center; transition: all 0.7s ease; }
        body.searched .logo-text { align-items: flex-start; }
        
        .logo-brand { font-size: 2.8rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; font-family: 'Jua', sans-serif; background: linear-gradient(135deg, var(--ac), var(--cy)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: font-size 0.7s ease; }
        body.searched .logo-brand { font-size: 1.2rem; }
        
        .logo-sub { font-size: 0.85rem; font-weight: 500; color: var(--t3); letter-spacing: 0.02em; transition: all 0.4s; }
        body.searched .logo-sub { font-size: 0; opacity: 0; height: 0; margin: 0; overflow: hidden; }

        .rocket-flyer { transition: transform 0.1s; transform-origin: center; }
        .exhaust { opacity: 0; transition: opacity 0.2s; }
        body.launching .rocket-flyer { animation: moonshotLaunch 0.7s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        body.launching .exhaust { opacity: 1; animation: flicker 0.1s infinite alternate; }
        
        @keyframes moonshotLaunch { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(150px, -150px) scale(0.5); opacity: 0; } }
        @keyframes flicker { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }

        .search-wrap { width: 100%; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        body.searched .search-wrap { max-width: 500px; flex: 1; min-width: 200px; }

        .sbar { position: relative; display: flex; align-items: center; background: var(--bgI); border: 2px solid var(--bd); border-radius: 999px; box-shadow: var(--sh1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20; }
        .sbar:focus-within { border-color: var(--ac); box-shadow: var(--shG), 0 0 0 4px var(--acG); }

        .sbar-icon { position: absolute; left: 1.2rem; color: var(--t3); width: 22px; height: 22px; transition: all 0.2s; }
        .sbar:focus-within .sbar-icon { color: var(--ac); transform: scale(1.1); }

        #q { flex: 1; border: 0; outline: 0; background: 0; padding: 1.1rem 1rem 1.1rem 3.2rem; font-size: 1.1rem; color: var(--t1); font-family: var(--ff); transition: all 0.7s ease; }
        body.searched #q { padding: 0.75rem 0.8rem 0.75rem 2.8rem; font-size: 0.95rem; }
        #q::placeholder { color: var(--t3); font-weight: 400; }

        .xb { background: 0; border: 0; color: var(--t3); cursor: pointer; padding: 0.5rem; font-size: 1.2rem; display: none; }
        .xb:hover { color: var(--t1); } .xb.v { display: block; }

        .sbar-go { background: 0; border: 0; cursor: pointer; color: var(--t3); padding: 0 1.2rem 0 0.5rem; display: flex; align-items: center; transition: color 0.2s, transform 0.2s; }
        .sbar-go:hover { color: var(--ac); transform: scale(1.1); }
        .sbar-go svg { width: 22px; height: 22px; }

        /* ══ AUTO SUGGEST ══ */
        .auto-list { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--bg1); border: 1px solid var(--bd); border-radius: 12px; box-shadow: var(--shD); max-height: 300px; overflow-y: auto; z-index: 999; display: none; opacity: 0; transform: translateY(-10px); transition: opacity 0.2s, transform 0.2s; }
        .auto-list.active { display: block; opacity: 1; transform: translateY(0); }
        .auto-item { padding: 0.75rem 1.2rem; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem; color: var(--t1); border-bottom: 1px solid var(--bd2); transition: background 0.2s; }
        .auto-item:last-child { border-bottom: none; }
        .auto-item:hover { background: var(--bg2); }
        .auto-item svg { color: var(--t3); width: 16px; height: 16px; flex-shrink: 0; }

        .smeta { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.75rem; color: var(--t3); padding: 0 1rem; opacity: 0; height: 0; overflow: hidden; transition: opacity 0.3s; }
        body.searched .smeta { opacity: 1; height: auto; overflow: visible; }

        .ctrls { display: flex; align-items: center; gap: 0.4rem; opacity: 0; pointer-events: none; max-width: 0; overflow: hidden; transition: opacity 0.4s ease; }
        body.searched .ctrls { opacity: 1; pointer-events: auto; max-width: 300px; overflow: visible; flex-shrink: 0; }

        .cb { background: var(--bg3); border: 1px solid var(--bd); border-radius: 999px; padding: 0.3rem 0.7rem; font-size: 0.75rem; color: var(--t2); cursor: pointer; font-family: var(--ff); font-weight: 600; white-space: nowrap; transition: all 0.2s; }
        .cb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
        .cb.on { background: var(--ac2); color: #fff; border-color: var(--ac2); box-shadow: 0 2px 8px rgba(99,102,241,.3); }

        .landing-hints { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 2rem; max-width: 650px; transition: opacity 0.4s, max-height 0.4s; overflow: hidden; }
        body.searched .landing-hints { opacity: 0; max-height: 0; margin: 0; pointer-events: none; }
        .lh { background: var(--bg2); border: 1px solid var(--bd); border-radius: 999px; padding: 0.4rem 0.9rem; font-size: 0.8rem; color: var(--t3); cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .lh:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); transform: translateY(-2px); }

        .results-area { max-width: 1160px; margin: 0 auto; padding: 0 1rem; opacity: 0; transform: translateY(40px); pointer-events: none; transition: opacity 0.6s ease 0.1s, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s; }
        body.searched .results-area { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .qf { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1.2rem 0 1rem; }
        .qb { background: var(--bg3); border: 1px solid var(--bd); border-radius: 999px; padding: 0.25rem 0.7rem; font-size: 0.7rem; color: var(--t3); cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .qb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }

        .rlist { display: flex; flex-direction: column; gap: 0.7rem; padding-bottom: 3rem; }

        .vc { background: var(--bg1); border: 1px solid var(--bd2); border-radius: 12px; box-shadow: var(--sh1); border-left: 5px solid var(--cbc, var(--bd2)); transition: box-shadow 0.3s, transform 0.2s; animation: cIn 0.3s ease both; }
        .vc:hover { box-shadow: var(--sh2); transform: translateY(-2px); }
        @keyframes cIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .vc-h { display: flex; align-items: center; gap: 0.6rem; padding: 0.8rem 1rem; background: var(--bg2); cursor: pointer; user-select: none; border-radius: 0 10px 10px 0; transition: background 0.2s; }
        .vc-h:hover { background: var(--acL); }
        .bc { font-family: var(--fm); font-weight: 700; font-size: 0.9rem; color: var(--ac); background: var(--acL); padding: 3px 8px; border-radius: 6px; }
        .vt { font-weight: 700; font-size: 0.9rem; color: var(--t1); }
        .bp { font-size: 0.65rem; color: var(--tPt); background: var(--tPb); padding: 3px 8px; border-radius: 5px; white-space: nowrap; font-weight: 600; }
        .bn { font-size: 0.65rem; color: var(--t3); background: var(--bg3); padding: 3px 8px; border-radius: 5px; font-weight: 700; }
        .tgl { margin-left: auto; color: var(--t3); font-size: 0.7rem; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .vc-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .vc.open .vc-cw { grid-template-rows: 1fr; }
        .vc.open .tgl { transform: rotate(180deg); }
        .vc-c { overflow: hidden; }

        .vs { padding: 0.7rem 1rem; border-top: 1px solid var(--bd3); }
        .tl { display: inline-flex; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 5px; margin-bottom: 0.4rem; }
        .tl-n { background: var(--tNb); color: var(--tNt); } .tl-e { background: var(--tEb); color: var(--tEt); } .tl-f { background: var(--tFb); color: var(--tFt); } .tl-s { background: var(--tSb); color: var(--tSt); }
        .ct { font-size: 0.85rem; color: var(--t2); line-height: 1.65; white-space: pre-line; word-break: keep-all; }

        .ss { background: var(--bg3); border-top: 1px solid var(--bd3); }
        .ss-t { padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 700; color: var(--t3); display: flex; align-items: center; gap: 0.4rem; }
        .ss-t b { background: var(--tSb); color: var(--tSt); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; }
        .su { border-top: 1px solid var(--bd3); }
        .su-h { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem 0.5rem 1.5rem; cursor: pointer; transition: background 0.2s; }
        .su-h:hover { background: var(--bg2); }
        .s-c { font-family: var(--fm); font-size: 0.8rem; font-weight: 700; color: var(--ac); min-width: 3.5rem; }
        .s-n { font-size: 0.8rem; font-weight: 600; color: var(--t1); }
        .su-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: var(--bg2); }
        .su.open .su-cw { grid-template-rows: 1fr; }
        .su.open .tgl { transform: rotate(180deg); }
        .su-c { overflow: hidden; border-left: 3px solid var(--ac); margin-left: 1.5rem; }
        .su-s { padding: 0.4rem 1rem; } .su-s + .su-s { border-top: 1px dashed var(--bd3); }

        mark.h { background: var(--hlB); color: var(--hlT); padding: 0.05em 0.2em; border-radius: 4px; font-weight: 700; }

        .es { text-align: center; padding: 4rem 1rem; }
        .es-t { font-weight: 800; font-size: 1.1rem; color: var(--t2); margin-bottom: 0.4rem; }
        .es-d { font-size: 0.9rem; color: var(--t3); line-height: 1.6; }

        .ft { text-align: center; padding: 2rem 1rem; font-size: 0.7rem; color: var(--t3); border-top: 1px solid var(--bd); max-width: 1160px; margin: 0 auto; opacity: 0; transition: opacity 0.5s 0.3s; }
        body.searched .ft { opacity: 1; }

    
    .skip-link {
      position:absolute;
      left:1rem;
      top:-50px;
      z-index:2000;
      background:var(--ac2);
      color:#fff;
      padding:.7rem .95rem;
      border-radius:10px;
      font-weight:800;
      text-decoration:none;
      transition:top .2s;
    }
    .skip-link:focus { top:1rem; }

    @media (max-width: 640px) {
            .logo-brand { font-size: 2.2rem; }
            body:not(.searched) #q { font-size: 1rem; padding: 1rem 0.5rem 1rem 2.8rem; }
            body.searched .logo-brand { font-size: 1.1rem; }
            body.searched .header-inner { padding: 0.6rem; gap: 0.5rem; }
            .ctrls { display: none; }
        }

        .ct a { color: var(--cy); text-decoration: none; }
        .ct a:hover { text-decoration: underline; }
        .bn.meta-eff { color: #0f766e; background: #ccfbf1; }
        .bn.meta-ver { color: #1d4ed8; background: #dbeafe; }
        .fc-wrap { display:flex; flex-wrap:wrap; gap:0.45rem; margin:0.2rem 0 1rem; }
        .fc { background: var(--bg2); border: 1px solid var(--bd); border-radius: 999px; padding: 0.35rem 0.8rem; font-size: 0.75rem; color: var(--t2); cursor: pointer; font-weight: 700; }
        .fc:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
        .fc.on { background: var(--ac2); color: #fff; border-color: var(--ac2); }
        [data-theme="dark"] .bn.meta-eff { color: #99f6e4; background: #134e4a; }
        [data-theme="dark"] .bn.meta-ver { color: #93c5fd; background: #1e3a8a; }

        .bn.meta-trust-off { color:#065f46; background:#d1fae5; }
        .bn.meta-trust-int { color:#92400e; background:#fef3c7; }
        .bn.meta-trust-rev { color:#991b1b; background:#fee2e2; }
        .bn.meta-stale { color:#7c2d12; background:#ffedd5; }
        .bn.meta-exp { color:#7f1d1d; background:#fecaca; }
        .db-wrap { margin:.2rem 0 .9rem; padding:.7rem .9rem; border:1px solid var(--bd); border-radius:1rem; background:linear-gradient(180deg,var(--bg2),transparent); color:var(--t2); font-size:.8rem; display:flex; flex-wrap:wrap; gap:.5rem .8rem; }
        .db-chip { display:inline-flex; align-items:center; gap:.35rem; padding:.25rem .55rem; border-radius:999px; background:var(--bg); border:1px solid var(--bd); font-weight:700; }
        [data-theme="dark"] .bn.meta-trust-off { color:#a7f3d0; background:#064e3b; }
        [data-theme="dark"] .bn.meta-trust-int { color:#fde68a; background:#78350f; }
        [data-theme="dark"] .bn.meta-trust-rev { color:#fecaca; background:#7f1d1d; }
        [data-theme="dark"] .bn.meta-stale { color:#fdba74; background:#7c2d12; }
        [data-theme="dark"] .bn.meta-exp { color:#fecaca; background:#7f1d1d; }



        .logo-brand {
            font-family:'Jua', sans-serif !important;
            font-weight:400 !important;
            letter-spacing:-0.02em !important;
        }


        .af-wrap { display:flex; flex-wrap:wrap; gap:0.45rem; margin:0 0 1rem; }
        .af-btn { background:var(--bg2); border:1px solid var(--bd); border-radius:999px; padding:0.45rem 0.85rem; font-size:0.78rem; color:var(--t2); cursor:pointer; font-weight:800; }
        .af-btn:hover { background:var(--acL); color:var(--ac); border-color:var(--ac); }
        .af-btn.on { background:var(--ac2); color:#fff; border-color:var(--ac2); }
        .ct a { color: var(--cy); text-decoration: none; }
        .ct a:hover { text-decoration: underline; }
        .logo-brand { font-family:'Jua', sans-serif !important; font-weight:400 !important; letter-spacing:-0.02em !important; }
        body.focus-mode .stars, body.focus-mode .exhaust { opacity:0 !important; animation:none !important; }
        body.focus-mode * { scroll-behavior:auto; }
        body.focus-mode .vc, body.focus-mode .sbar, body.focus-mode .db-wrap { box-shadow:none !important; }
        body.focus-mode .vc-h, body.focus-mode .su-h { background:var(--bg1) !important; }
        body.focus-mode .ct { font-size:0.95rem; line-height:1.9; }
        body.focus-mode .landing-hints { display:none !important; }
        body.plain-mode .ct { font-size:0.95rem; line-height:1.85; }
        body.plain-mode .vt { letter-spacing:-0.01em; }
        .mini-guide { margin:0.4rem 0 1rem; display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.6rem; }
        .mg-card { border:1px solid var(--bd); background:var(--bg1); border-radius:14px; padding:0.8rem 0.9rem; box-shadow:var(--sh1); }
        .mg-k { font-size:0.72rem; color:var(--t3); font-weight:800; text-transform:uppercase; letter-spacing:0.04em; }
        .mg-v { margin-top:0.2rem; font-size:0.88rem; color:var(--t1); font-weight:700; line-height:1.45; }
        .checklist { display:grid; gap:0.45rem; }
        .checkline { display:flex; gap:0.55rem; align-items:flex-start; padding:0.48rem 0.55rem; border:1px solid var(--bd3); border-radius:10px; background:var(--bg1); }
        .checkicon { width:1.1rem; flex:0 0 1.1rem; color:var(--ac); font-weight:900; }
        .rf-badge { display:inline-flex; margin-left:0.4rem; padding:2px 7px; font-size:0.63rem; border-radius:999px; background:var(--cyL); color:var(--cy); font-weight:800; }
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after { animation:none !important; transition:none !important; scroll-behavior:auto !important; }
        }
    
    </style>

<body class="landing" data-theme="dark">
  <a class="skip-link" href="#resultsArea">검색 결과로 건너뛰기</a>

<div class="stars" id="stars"></div>

<div class="hero-container" id="hero">
    <div class="header-inner">
        <div class="logo-area" onclick="if(document.body.classList.contains('searched')) resetToLanding()">
            <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="85" cy="25" r="1.5" fill="#cbd5e1" opacity=".5"><animate attributeName="opacity" values=".2;.6;.2" dur="3s" repeatCount="indefinite"/></circle>
                <circle cx="95" cy="50" r="1.2" fill="#94a3b8" opacity=".4"/>
                <circle cx="25" cy="40" r="2" fill="#cbd5e1" opacity=".3"/>
                <path d="M 30,90 A 45,45 0 1,0 90,30 A 55,55 0 1,1 30,90 Z" fill="url(#gMoon)" opacity=".95"/>
                <g class="rocket-flyer">
                    <g transform="translate(48, 72) rotate(45)">
                        <rect x="-8" y="-18" width="16" height="34" rx="8" fill="url(#gRocket)"/>

function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hl(t,k){if(!k.length)return escapeHtml(t);return escapeHtml(t).replace(new RegExp(`(${k.map(escapeRegExp).join('|')})`,'gi'),'<mark class="h">$1</mark>')}

function calculateScore(item,keywords){
    if(!keywords.length) return 1;
    let score=0;
    const cL=(item.code||'').toLowerCase(), nL=(item.name||'').toLowerCase();
    const content=normalizeForSearch(item);
    let isAnd=true;
    
    for(const kw of keywords){
        let m=false;
        if(cL.includes(kw)||nL.includes(kw)){score+=100; m=true;}
        if(item.subCodes){
            for(const s of item.subCodes){
                if((s.code||'').toLowerCase().includes(kw)||(s.name||'').toLowerCase().includes(kw)){score+=50; m=true;}
                const sc=`${s.addReq||''} ${s.note||''}`.toLowerCase();
                const n=(sc.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
                if(n>0){score+=n*10; m=true;}
            }
        }
        const cn=(content.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
        if(cn>0){score+=cn*10; m=true;}
        if(!m) isAnd=false;
    }
    return currentSearchMode==='and' ? (isAnd?score:0) : score;
}

    '동반비자':'F-3','동반':'F-3','배우자초청':'F-3','제주무비자':'B-2-2','무비자':'B-2',

};
function expandKeywords(keywords){
    const expanded = new Set(keywords);
    keywords.forEach(k => {
        const nk = k.replace(/\s+/g,'');
        if(ALIAS_MAP[nk]) expanded.add(ALIAS_MAP[nk].toLowerCase());
    });
    return [...expanded];
}

function showSuggestions(val) {
    const list = document.getElementById('auto-list');
    list.innerHTML = '';
    if(!val) { list.classList.remove('active'); return; }
    
    const lowerVal = val.toLowerCase();
    const matches = PREDEF_KEYWORDS.filter(k => k.toLowerCase().includes(lowerVal));
    
    ACTIVE_DATA.forEach(v => {
        if(v.code.toLowerCase().includes(lowerVal) || v.name.toLowerCase().includes(lowerVal)) {
            const str = `${v.code} ${v.name}`;
            if(!matches.includes(str)) matches.push(str);
        }
    });

    if(matches.length > 0) {
        matches.slice(0, 7).forEach(m => {
            const div = document.createElement('div');
            div.className = 'auto-item';
          div.setAttribute('role','option');
            div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg> <span>${hl(m, [val])}</span>`;
            div.onclick = () => {
                document.getElementById('q').value = m;
                list.classList.remove('active');
                executeSearch();
            };
            list.appendChild(div);
        });
        list.classList.add('active');
    } else {
        list.classList.remove('active');
    }
}

// ═══ STATE MACHINE ═══
function executeSearch(){
      document.getElementById('auto-list').classList.remove('active');
      activeCategory = 'all';
      renderCategoryFilters();
      const q=document.getElementById('q').value.trim();
      if(!q) return;

      if(document.body.classList.contains('landing')){
        document.body.classList.add('launching');
        setTimeout(()=>{
          document.body.classList.remove('landing', 'launching');
          document.body.classList.add('searched');
          renderResults(q);
          document.getElementById('resultsArea')?.focus();
          window.scrollTo({top:0, behavior:'smooth'});
        }, 300);
      } else {
        renderResults(q);
        document.getElementById('resultsArea')?.focus();
      }
    }

function resetToLanding(){
    document.body.classList.remove('searched');
    document.body.classList.add('landing');
    document.getElementById('q').value='';
    document.getElementById('xb').classList.remove('v');
    document.getElementById('rlist').innerHTML='';
    document.getElementById('rc').textContent='';
}

function getTrustBadge(v){
    if(v.trust_level==='official') return '<span class="bn meta-trust-off">공식</span>';
    if(v.trust_level==='internal') return '<span class="bn meta-trust-int">내부정리</span>';
    return '<span class="bn meta-trust-rev">검증필요</span>';
}
function getTimeBadge(v){
    if(v.expires_on) return `<span class="bn meta-exp">기한 ${escapeHtml(v.expires_on)}</span>`;
    if(v.time_sensitive) return '<span class="bn meta-stale">시한성</span>';
    return '';
}
function renderMetaBadges(v){
    return `${v.effective_date?`<span class="bn meta-eff">시행 ${escapeHtml(v.effective_date)}</span>`:''}${v.last_verified_at?`<span class="bn meta-ver">검증 ${escapeHtml(v.last_verified_at)}</span>`:''}${getTrustBadge(v)}${getTimeBadge(v)}${v.sources?.length?`<span class="bn">출처 ${v.sources.length}</span>`:''}`;
}

function renderCard(v, kw, kwL){
    const hs=v.subCodes&&v.subCodes.length>0;
    return `<article class="vc${kw.length&&hs?' open':''}" style="--cbc:${CC[v.cat]||CC.other}"><div class="vc-h" onclick="this.parentElement.classList.toggle('open')"><span class="bc">${hl(v.code,kw)}</span><span class="vt">${hl(v.name,kw)}</span>${v.period?`<span class="bp">${hl(v.period,kw)}</span>`:''}${renderMetaBadges(v)}${hs?`<span class="bn">+${v.subCodes.length}</span>`:''}<span class="tgl">▼</span></div><div class="vc-cw"><div class="vc-c">${renderInfoBlock('tl-n','개요/신규',v.newReq||'',kw)}${renderInfoBlock('tl-e','절차/연장',v.extReq||'',kw)}${renderInfoBlock('tl-f','FAQ/주의',v.faq||'',kw)}${renderV2Blocks(v,kw)}${renderSubCodes(v,kw,kwL)}</div></div></article>`;
}
function renderResults(query){
    const box=document.getElementById('rlist'), rc=document.getElementById('rc');
    const kw=query.trim().split(/\s+/).filter(Boolean), kwL=expandKeywords(kw.map(k=>k.toLowerCase()));
    
    let scored=ACTIVE_DATA
        .filter(v => activeCategory==='all' ? true : v.cat===activeCategory)
        .map(v=>({...v,_score:calculateScore(v,kwL)}));
    let filtered=scored.filter(v=>v._score>0).sort((a,b)=>b._score-a._score);
    
    let st=0; filtered.forEach(v=>{if(v.subCodes) st+=v.subCodes.length;});
    
    if(!filtered.length){
        box.innerHTML=`<div class="es"><div class="es-t">궤도에서 이탈했습니다</div><div class="es-d">'${escapeHtml(query)}'에 해당하는 정보가 없습니다.<br>키워드를 줄이거나 OR 모드로 전환해 보세요.</div></div>`;
        rc.textContent='0건'; return;
    }
    
    box.innerHTML = filtered.map(v=>renderCard(v,kw,kwL)).join('');
    const scopeLabel = activeCategory==='all' ? '전체' : activeCategory;
    rc.textContent=`결과 ${filtered.length}건${st?` · 세부 ${st}건`:''} · 범주 ${scopeLabel} · 데이터 ${DATA_META.version}`;
      const rh=document.getElementById('rh');
      if(rh) rh.textContent = focusMode ? '집중모드 켜짐' : '팁: 검색하면 필터가 자동으로 전체로 초기화됩니다';
}

function renderCategoryFilters(){
      const el = document.getElementById('fcWrap');
      if(!el) return;
      const labelMap = {
        all:'전체', faq:'FAQ', short:'단기', study:'유학', work:'취업', invest:'투자', family:'가족', other:'기타', diplo:'외교', nhis:'건보', scn:'시나리오'
      };
      const cats = [...new Set(ACTIVE_DATA.map(v => v.cat).filter(Boolean))];
      const ordered = ['all', ...Object.keys(labelMap).filter(k => k !== 'all' && cats.includes(k))];
      if(activeCategory !== 'all' && !ordered.includes(activeCategory)) activeCategory = 'all';
      el.innerHTML = '';
      ordered.forEach(key => {
        const b = document.createElement('button');
        b.className = `fc${activeCategory===key?' on':''}`;
        b.textContent = labelMap[key] || key;
        b.onclick = () => setCategoryFilter(key);
        el.appendChild(b);
      });
    }
function setCategoryFilter(cat){
    activeCategory = cat;
    renderCategoryFilters();
    if(document.body.classList.contains('searched')) renderResults(document.getElementById('q').value || '');
}

function syncAccessibilityButtons(){
    const fb = document.getElementById('focusModeBtn');
    const pb = document.getElementById('plainModeBtn');
    if(fb) fb.classList.toggle('on', focusMode);
    if(pb) pb.classList.toggle('on', plainMode);
}
function toggleFocusMode(){
    focusMode = !focusMode;
    document.body.classList.toggle('focus-mode', focusMode);
    syncAccessibilityButtons();
}
function togglePlainLanguage(){
    plainMode = !plainMode;
    document.body.classList.toggle('plain-mode', plainMode);
    syncAccessibilityButtons();
}

let dt;
function handleInput(){
    const v=document.getElementById('q').value;
    document.getElementById('xb').classList.toggle('v',v.length>0);
    showSuggestions(v);
    if(document.body.classList.contains('searched')){
        clearTimeout(dt);
        dt=setTimeout(()=>renderResults(v),150);
    }
}
function clearSearch(){
    const i=document.getElementById('q');
    i.value='';
    i.focus();
    document.getElementById('xb').classList.remove('v');
    document.getElementById('auto-list').classList.remove('active');
    if(document.body.classList.contains('searched'))renderResults('');
}
function setSearchMode(m){currentSearchMode=m;document.getElementById('ma').classList.toggle('on',m==='and');document.getElementById('mo').classList.toggle('on',m==='or');if(document.body.classList.contains('searched'))renderResults(document.getElementById('q').value);}
function toggleTheme(){currentTheme=currentTheme==='dark'?'light':'dark';document.body.setAttribute('data-theme',currentTheme);}
function toggleAccordions(c){document.querySelectorAll('.vc,.su').forEach(el=>{if(c)el.classList.remove('open');else el.classList.add('open');});}
