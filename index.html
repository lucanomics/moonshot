html{font-size:clamp(13px,1.4vw,15px);scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg-pri);color:var(--txt);line-height:1.6;min-height:100vh;transition:background .2s,color .2s}

.hd-in{max-width:1140px;margin:0 auto;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}

.cb{background:var(--bg-cs);border:1px solid var(--bdr);border-radius:var(--rs);padding:.2rem .5rem;font-size:.7rem;color:var(--txt2);cursor:pointer;transition:all .12s;font-family:var(--f);white-space:nowrap}
.cb:hover{background:var(--ac-lt);color:var(--ac);border-color:var(--ac)}

.sa{max-width:1140px;margin:1rem auto 0;padding:0 1rem}

.si{position:absolute;left:.7rem;color:var(--txt3);font-size:1rem;pointer-events:none}
#q{flex:1;border:none;outline:none;background:0;padding:.6rem .7rem .6rem 2.2rem;font-size:.88rem;color:var(--txt);font-family:var(--f)}
#q::placeholder{color:var(--txt3)}
.xb{background:0;border:0;color:var(--txt3);cursor:pointer;padding:.35rem .6rem;font-size:.9rem;display:none;transition:color .12s}
.xb:hover{color:var(--txt)}.xb.v{display:block}
.sm{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.25rem;margin-top:.4rem;font-size:.7rem;color:var(--txt3)}

.qf{max-width:1140px;margin:.5rem auto 0;padding:0 1rem;display:flex;flex-wrap:wrap;gap:.25rem}
.qb{background:var(--bg-cs);border:1px solid var(--bdr);border-radius:20px;padding:.15rem .5rem;font-size:.64rem;color:var(--txt3);cursor:pointer;transition:all .12s;font-family:var(--f);white-space:nowrap}

.rs{max-width:1140px;margin:.6rem auto 2rem;padding:0 1rem;display:flex;flex-direction:column;gap:.5rem}

.cd{background:var(--bg-card);border:1px solid var(--bdr-card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .2s;border-left:3px solid var(--cb,var(--bdr-card))}
.cd:hover{box-shadow:var(--sh2)}
.ch{display:flex;align-items:center;gap:.5rem;padding:.55rem .8rem;border-bottom:1px solid var(--bdr-card);background:var(--bg-cs);cursor:pointer;user-select:none;transition:background .12s}

.vc{font-family:var(--fm);font-weight:700;font-size:.82rem;color:var(--ac);background:var(--ac-lt);padding:.1rem .4rem;border-radius:4px;flex-shrink:0}

.sc{font-size:.58rem;color:var(--txt3);background:var(--bg-sub);padding:.06rem .28rem;border-radius:3px;flex-shrink:0}
.ct{margin-left:auto;font-size:.65rem;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.cd.x .ct{transform:rotate(-90deg)}.cd.x .cb2{display:none}

.cb2{padding:0}
.se{padding:.5rem .8rem;border-bottom:1px solid var(--bdr-card)}

.sx{font-size:.78rem;color:var(--txt2);line-height:1.65;white-space:pre-line;word-break:keep-all;overflow-wrap:break-word}

.ss{border-top:1px solid var(--bdr-sub);background:var(--bg-sub)}

.su{border-top:1px solid var(--bdr-sub)}

.s-c{font-family:var(--fm);font-size:.73rem;font-weight:600;color:var(--ac);flex-shrink:0;min-width:3rem}

mark.h{background:var(--hl-bg);color:var(--hl-txt);padding:.02em .1em;border-radius:2px;font-weight:600}

.es{text-align:center;padding:2rem 1rem;color:var(--txt3)}

.es .ed{font-size:.75rem;line-height:1.5}

.ft{text-align:center;padding:1rem;font-size:.62rem;color:var(--txt3);border-top:1px solid var(--bdr);max-width:1140px;margin:0 auto}

@media(max-width:640px){
  .hd{padding:.45rem .6rem}.sa,.rs,.qf{padding:0 .6rem}

@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.cd{animation:fi .15s ease both}
[data-theme="dark"]::-webkit-scrollbar{width:7px}

// ═══ UTILS ═══
function er(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function eh(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hl(t,k){if(!k.length)return eh(t);return eh(t).replace(new RegExp(`(${k.map(er).join('|')})`,'gi'),'<mark class="h">$1</mark>')}
function hs(v){let h=`${v.code} ${v.name} ${v.newReq} ${v.extReq} ${v.faq} ${v.period||''}`;if(v.subCodes)v.subCodes.forEach(s=>{h+=` ${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`});return h.toLowerCase()}
function sm2(s,k){const h=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase();return M==='and'?k.every(x=>h.includes(x)):k.some(x=>h.includes(x))}
function im(v,k){const h=hs(v);return M==='and'?k.every(x=>h.includes(x)):k.some(x=>h.includes(x))}

// ═══ RENDER ═══
function R(q){
  const b=document.getElementById('rs'),rc=document.getElementById('rc'),rh=document.getElementById('rh');
  const kw=q.trim().split(/\s+/).filter(Boolean),kl=kw.map(x=>x.toLowerCase());
  let ls=kw.length?V.filter(v=>im(v,kl)):V;
  let st=0;ls.forEach(v=>{if(v.subCodes)st+=v.subCodes.length});

  if(!ls.length){
    b.innerHTML=`<div class="es"><div class="ei">🔍</div><div class="et">검색 결과 없음</div><div class="ed">'${eh(q)}' 해당 정보 없음. 키워드를 줄이거나 OR 모드 전환.</div></div>`;
    rc.textContent='0건';rh.textContent=kw.length>1?`${M.toUpperCase()} · ${kw.length}개 키워드`:'';return;
  }

  const fg=document.createDocumentFragment();
  ls.forEach(v=>{
    const c=document.createElement('div');c.className='cd';
    c.style.setProperty('--cb',CC[v.cat]||CC.other);
    const sub=v.subCodes&&v.subCodes.length>0;
    let ms=sub&&kw.length?v.subCodes.filter(s=>sm2(s,kl)):[];

    let sh='';
    if(sub){
      sh=`<div class="ss"><div class="st"><b>소분류</b>${v.subCodes.length}개 세부코드</div>`;
      v.subCodes.forEach(s=>{
        const o=!kw.length||ms.includes(s);
        sh+=`<div class="su${o?'':' x'}"><div class="sh" onclick="this.parentElement.classList.toggle('x')"><span class="s-c">${hl(s.code,kw)}</span><span class="s-n">${hl(s.name,kw)}</span><span class="s-t">▼</span></div><div class="s-b">`;
        if(s.addReq)sh+=`<div class="se"><div class="sl n">추가요건</div><div class="sx">${hl(s.addReq,kw)}</div></div>`;
        if(s.note)sh+=`<div class="se"><div class="sl f">실무참고</div><div class="sx">${hl(s.note,kw)}</div></div>`;
        sh+=`</div></div>`;
      });
      sh+=`</div>`;
    }

    c.innerHTML=`<div class="ch" onclick="this.parentElement.classList.toggle('x')"><span class="vc">${hl(v.code,kw)}</span><span class="vn">${hl(v.name,kw)}</span>${v.period?`<span class="vp">${hl(v.period,kw)}</span>`:''}${sub?`<span class="sc">+${v.subCodes.length}</span>`:''}<span class="ct">▼</span></div><div class="cb2"><div class="se"><div class="sl n">신규발급</div><div class="sx">${hl(v.newReq,kw)}</div></div><div class="se"><div class="sl e">체류연장</div><div class="sx">${hl(v.extReq,kw)}</div></div><div class="se"><div class="sl f">FAQ</div><div class="sx">${hl(v.faq,kw)}</div></div>${sh}</div>`;
    fg.appendChild(c);
  });
  b.innerHTML='';b.appendChild(fg);
  rc.textContent=`${ls.length}건${kw.length?' 검색':''}${st?` (소분류 ${st}건)`:''} · 총 ${V.length}개 비자`;
  rh.textContent=kw.length>1?`${M.toUpperCase()} · ${kw.length}개 키워드`:'띄어쓰기 다중키워드 · AND/OR · 소분류코드 직접검색';
}

// ═══ CONTROLS ═══
let dt;
function oi(){const v=document.getElementById('q').value;document.getElementById('xb').classList.toggle('v',v.length>0);clearTimeout(dt);dt=setTimeout(()=>R(v),100)}
function cl(){const i=document.getElementById('q');i.value='';i.focus();document.getElementById('xb').classList.remove('v');R('')}
function sm(m){M=m;document.getElementById('ma').classList.toggle('on',m==='and');document.getElementById('mo').classList.toggle('on',m==='or');R(document.getElementById('q').value)}
function tt(){T=T==='dark'?'light':'dark';document.body.setAttribute('data-theme',T);document.getElementById('tb').textContent=T==='dark'?'☀️ 라이트':'🌙 다크'}
function ta(c){document.querySelectorAll('.cd,.su').forEach(e=>e.classList.toggle('x',c))}

// ═══ QUICK FILTERS ═══
(function(){
  const g=[
    {l:'B-2-2 제주무비자',q:'B-2-2 제주'},{l:'유학 D-2',q:'D-2'},{l:'E-7 특정활동',q:'E-7'},
    {l:'E-9 비전문',q:'E-9'},{l:'결혼이민 F-6',q:'F-6'},{l:'영주 F-5',q:'F-5'},
    {l:'난민 G-1',q:'G-1'},{l:'재외동포 F-4',q:'F-4'},{l:'방문취업 H-2',q:'H-2'},
    {l:'점수제',q:'점수'},{l:'가정폭력',q:'가정폭력'},{l:'결핵진단서',q:'결핵'},
    {l:'아포스티유',q:'아포스티유'},{l:'4대보험',q:'4대보험'},{l:'이직/변경',q:'이직 변경'},
    {l:'수수료',q:'수수료'},{l:'인신매매',q:'인신매매'},{l:'FTA',q:'FTA'}
  ];
  const c=document.getElementById('qf');
  g.forEach(x=>{const b=document.createElement('button');b.className='qb';b.textContent=x.l;b.onclick=()=>{const i=document.getElementById('q');i.value=x.q;i.focus();document.getElementById('xb').classList.add('v');R(x.q)};c.appendChild(b)});
})();

document.getElementById('q').addEventListener('input',oi);
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Escape')cl()});
R('');
</script>
</body>
