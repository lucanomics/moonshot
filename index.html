<html lang="ko">
<head>

    <title>Moonshot — 출입국 민원·비자 통합 검색</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌕</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ff: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
  --ff-logo: 'Jua', sans-serif;
  --fs: clamp(14px, 1.35vw, 16px);
  --bg0: #fafaf8; --bg1: #ffffff; --bg2: #f3f1ed; --bg3: #eae8e3;
  --bgI: #ffffff; --bd: #d8d5cf; --bd2: #e8e5e0; --bd3: #d8d5cf;
  --t1: #0d0d0c; --t2: #3a3835; --t3: #7a7772;
  --ac: #0a5c47; --ac2: #084d3b;
  --acG: rgba(10,92,71,0.08); --acL: #e8f5f1;
  --cy: #0a5c47; --cyL: #e8f5f1;
  --hlB: #fef9c3; --hlT: #713f12;
  --cSh: #94a3b8; --cSt: #0a5c47; --cWk: #b45309;
  --cIn: #0f766e; --cFm: #be185d; --cOt: #6d28d9;
  --cDp: #475569; --cNh: #0f766e; --cFq: #dc2626; --cSc: #7c3aed;
  --sh1: 0 1px 3px rgba(13,13,12,0.06);
  --sh2: 0 4px 16px rgba(13,13,12,0.10);
  --shG: 0 0 0 3px rgba(10,92,71,0.15);
  --shD: 0 4px 16px rgba(13,13,12,0.12);
}
[data-theme="dark"] {
  --bg0: #111110; --bg1: #1a1917; --bg2: #222120; --bg3: #1a1917;
  --bgI: #111110; --bd: #2e2d2b; --bd2: #252422; --bd3: #2e2d2b;
  --t1: #e8e6e1; --t2: #9a9895; --t3: #5a5855;
  --ac: #34d399; --ac2: #10b981;
  --acG: rgba(52,211,153,0.10); --acL: #0d2a20;
  --cy: #34d399; --cyL: #0d2a20;
  --hlB: #3a2a00; --hlT: #fbbf24;
  --cNh: #2dd4bf; --cFq: #fca5a5; --cSc: #c084fc;
  --sh1: 0 1px 4px rgba(0,0,0,0.3);
  --sh2: 0 8px 24px rgba(0,0,0,0.4);
  --shG: 0 0 0 3px rgba(52,211,153,0.2);
  --shD: 0 8px 24px rgba(0,0,0,0.5);
}
html { font-size: var(--fs); scroll-behavior: smooth; }
body, input, button { font-family: var(--ff) !important; }
body { background: transparent !important; color: var(--t1); line-height: 1.65; min-height: 100vh; overflow-x: hidden; transition: color 0.3s; }

/* 맹꽁이 레이아웃 붕괴 방지용 절대 계층 고정 */
#starCanvas { position: fixed; inset: 0; z-index: -1; background: var(--bg0); opacity: 1; transition: background 0.3s ease, opacity 2s ease; }
.hero-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; position: relative; z-index: 10; background: transparent; transition: all 0.7s cubic-bezier(0.4,0,0.2,1); }
body.searched .hero-container { min-height: 64px; padding: 0; position: sticky; top: 0; background: color-mix(in srgb, var(--bg1) 90%, transparent); border-bottom: 1px solid var(--bd); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: var(--sh1); }
.header-inner { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; max-width: 680px; transition: all 0.7s cubic-bezier(0.4,0,0.2,1); }
body.searched .header-inner { flex-direction: row; justify-content: space-between; max-width: 1160px; gap: 1rem; padding: 0.6rem 1.2rem; }
.logo-area { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; cursor: pointer; transition: all 0.7s ease; }
body.searched .logo-area { flex-direction: row; gap: 0.5rem; flex-shrink: 0; }
.logo-svg { width: 110px; height: 110px; transition: all 0.7s cubic-bezier(0.4,0,0.2,1); }
body.searched .logo-svg { width: 36px; height: 36px; }
.logo-text { display: flex; flex-direction: column; align-items: center; transition: all 0.7s ease; }
body.searched .logo-text { align-items: flex-start; }
.logo-brand { font-family: var(--ff-logo) !important; font-size: 3.4rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; color: var(--t1); transition: all 0.7s cubic-bezier(0.4,0,0.2,1); }
body.searched .logo-brand { font-size: 1.4rem; }
.logo-sub { font-size: 0.7rem; font-weight: 500; color: var(--t3); letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.4s ease; }
body.searched .logo-sub { font-size: 0; opacity: 0; height: 0; margin: 0; overflow: hidden; }
.rocket-flyer { transition: transform 0.1s; transform-origin: center; }
.exhaust { opacity: 0; transition: opacity 0.2s ease-in-out; }
body.launching .rocket-flyer { animation: moonshotLaunch 0.7s cubic-bezier(0.5,0,0.2,1) forwards; }
body.launching .exhaust { opacity: 1; animation: flicker 0.1s infinite alternate; }
@keyframes moonshotLaunch { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(150px,-150px) scale(0.5); opacity: 0; } }
@keyframes flicker { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }
.search-wrap { width: 100%; position: relative; transition: all 0.7s cubic-bezier(0.4,0,0.2,1); }
body.searched .search-wrap { max-width: 480px; flex: 1; min-width: 180px; }
.sbar { position: relative; display: flex; align-items: center; background: var(--bgI); border: 1.5px solid var(--bd); border-radius: 8px; box-shadow: var(--sh1); transition: all 0.2s ease; z-index: 20; }
.sbar:focus-within { border-color: var(--ac); box-shadow: var(--shG); }
.sbar-icon { position: absolute; left: 1rem; color: var(--t3); width: 18px; height: 18px; transition: color 0.2s; flex-shrink: 0; }
.sbar:focus-within .sbar-icon { color: var(--ac); }
#q { flex: 1; border: 0; outline: 0; background: 0; padding: 1rem 1rem 1rem 2.9rem; font-size: 1.05rem; color: var(--t1); transition: all 0.7s cubic-bezier(0.4,0,0.2,1); }
body.searched #q { padding: 0.7rem 0.7rem 0.7rem 2.6rem; font-size: 0.9rem; }
#q::placeholder { color: var(--t3); font-weight: 400; }
#q:disabled { cursor: not-allowed; }
.xb { background: 0; border: 0; color: var(--t3); cursor: pointer; padding: 0.5rem; font-size: 1.1rem; display: none; transition: color 0.2s; }
.xb:hover { color: var(--t1); }
.xb.v { display: block; }
.sbar-go { background: 0; border: 0; cursor: pointer; color: var(--t3); padding: 0 1rem 0 0.4rem; display: flex; align-items: center; transition: color 0.2s; }
.sbar-go:hover { color: var(--ac); }
.sbar-go:disabled { opacity: 0.4; cursor: not-allowed; }
.sbar-go svg { width: 20px; height: 20px; }
.auto-list { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--bg1); border: 1px solid var(--bd); border-radius: 8px; box-shadow: var(--shD); max-height: 280px; overflow-y: auto; z-index: 999; display: none; opacity: 0; transform: translateY(-8px); transition: all 0.2s ease; }
.auto-list.active { display: block; opacity: 1; transform: translateY(0); }
.auto-item { padding: 0.7rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--t1); border-bottom: 1px solid var(--bd2); transition: background 0.15s; }
.auto-item:last-child { border-bottom: none; }
.auto-item:hover { background: var(--bg2); }
.auto-item svg { color: var(--t3); width: 14px; height: 14px; flex-shrink: 0; }
.smeta { display: flex; justify-content: space-between; margin-top: 0.4rem; font-size: 0.72rem; color: var(--t3); padding: 0 0.5rem; opacity: 0; height: 0; overflow: hidden; transition: opacity 0.3s ease; }
body.searched .smeta { opacity: 1; height: auto; overflow: visible; }
.ctrls { display: flex; align-items: center; gap: 0.35rem; opacity: 0; pointer-events: none; max-width: 0; overflow: hidden; transition: all 0.4s ease; flex-shrink: 0; }
body.searched .ctrls { opacity: 1; pointer-events: auto; max-width: 300px; overflow: visible; }
.cb { background: var(--bg2); border: 1px solid var(--bd); border-radius: 6px; padding: 0.28rem 0.65rem; font-size: 0.72rem; color: var(--t2); cursor: pointer; font-weight: 600; white-space: nowrap; transition: all 0.15s ease; }
.cb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
.cb.on { background: var(--ac); color: #fff; border-color: var(--ac); }
.landing-hints { display: flex; flex-wrap: wrap; gap: 0.45rem; justify-content: center; margin-top: 1.8rem; max-width: 620px; transition: opacity 0.4s, max-height 0.4s; overflow: hidden; }
body.searched .landing-hints { opacity: 0; max-height: 0; margin: 0; pointer-events: none; }
.lh { background: var(--bg2); border: 1px solid var(--bd); border-radius: 6px; padding: 0.35rem 0.8rem; font-size: 0.78rem; color: var(--t2); cursor: pointer; font-weight: 500; transition: all 0.15s ease; }
.lh:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); transform: translateY(-1px); }
.results-area { max-width: 1160px; margin: 0 auto; padding: 0 1rem; opacity: 0; transform: translateY(24px); pointer-events: none; transition: opacity 0.5s ease 0.1s, transform 0.5s cubic-bezier(0.4,0,0.2,1) 0.1s; }
body.searched .results-area { opacity: 1; transform: translateY(0); pointer-events: auto; }
.qf { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 1rem 0 0.8rem; }
.qb { background: var(--bg2); border: 1px solid var(--bd); border-radius: 6px; padding: 0.22rem 0.65rem; font-size: 0.7rem; color: var(--t3); cursor: pointer; font-weight: 500; transition: all 0.15s ease; }
.qb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
.rlist { display: flex; flex-direction: column; gap: 0.6rem; padding-bottom: 3rem; }
.vc { background: var(--bg1); border: 1px solid var(--bd2); border-radius: 8px; box-shadow: var(--sh1); transition: box-shadow 0.2s; animation: cIn 0.25s ease both; }
.vc:hover { box-shadow: var(--sh2); }
@keyframes cIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.vc-h { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background: var(--bg2); cursor: pointer; user-select: none; border-radius: 8px 8px 0 0; transition: background 0.15s; flex-wrap: wrap; }
.vc-h:hover { background: color-mix(in srgb, var(--ac) 8%, var(--bg2)); }
.bc { font-family: var(--ff); font-weight: 700; font-size: 0.78rem; color: var(--ac); background: var(--acL); padding: 2px 7px; border-radius: 4px; letter-spacing: 0.03em; }
.vt { font-weight: 700; font-size: 0.88rem; color: var(--t1); }
.bp { font-size: 0.63rem; color: var(--tPt); background: var(--tPb); padding: 2px 7px; border-radius: 4px; white-space: nowrap; font-weight: 600; }
.bn { font-size: 0.63rem; color: var(--t3); background: var(--bg3); padding: 2px 7px; border-radius: 4px; font-weight: 700; }
.bd { font-size: 0.6rem; color: #065f46; background: #d1fae5; padding: 2px 7px; border-radius: 4px; font-weight: 700; white-space: nowrap; }
[data-theme="dark"] .bd { color: #6ee7b7; background: #064e3b; }
.tgl { margin-left: auto; color: var(--t3); font-size: 0.68rem; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
.vc.open .tgl { transform: rotate(180deg); }
.vc-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s cubic-bezier(0.4,0,0.2,1); }
.vc.open .vc-cw { grid-template-rows: 1fr; }
.vc-c { overflow: hidden; }
.vs { padding: 0.65rem 1rem; border-top: 1px solid var(--bd3); }
.tl { display: inline-flex; font-size: 0.63rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 4px; margin-bottom: 0.35rem; }
.tl-n { background: var(--tNb); color: var(--tNt); }
.tl-e { background: var(--tEb); color: var(--tEt); }
.tl-f { background: var(--tFb); color: var(--tFb); }
.tl-s { background: var(--tSb); color: var(--tSt); }
.ct { font-size: 0.84rem; color: var(--t2); line-height: 1.65; white-space: pre-line; word-break: keep-all; }
.data-date { font-size: 0.63rem; color: var(--t3); padding: 0.35rem 1rem; border-top: 1px dashed var(--bd3); text-align: right; }
.ss { background: var(--bg2); border-top: 1px solid var(--bd3); }
.ss-t { padding: 0.45rem 1rem; font-size: 0.68rem; font-weight: 700; color: var(--t3); display: flex; align-items: center; gap: 0.35rem; }
.ss-t b { background: var(--tSb); color: var(--tSt); padding: 2px 7px; border-radius: 4px; font-size: 0.63rem; }
.su { border-top: 1px solid var(--bd3); }
.su-h { display: flex; align-items: center; gap: 0.45rem; padding: 0.5rem 1rem 0.5rem 1.4rem; cursor: pointer; transition: background 0.15s; }
.su-h:hover { background: var(--bg2); }
.s-c { font-size: 0.78rem; font-weight: 700; color: var(--ac); min-width: 3.2rem; }
.s-n { font-size: 0.78rem; font-weight: 600; color: var(--t1); }
.su-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.25s cubic-bezier(0.4,0,0.2,1); background: var(--bg2); }
.su.open .su-cw { grid-template-rows: 1fr; }
.su.open .tgl { transform: rotate(180deg); }
.su-c { overflow: hidden; border-left: 2px solid var(--ac); margin-left: 1.4rem; }
.su-s { padding: 0.38rem 1rem; }
.su-s + .su-s { border-top: 1px dashed var(--bd3); }
mark.h { background: var(--hlB); color: var(--hlT); padding: 0.05em 0.2em; border-radius: 3px; font-weight: 700; }
.es { text-align: center; padding: 3.5rem 1rem; }
.es-t { font-weight: 800; font-size: 1.05rem; color: var(--t2); margin-bottom: 0.35rem; }
.es-d { font-size: 0.88rem; color: var(--t3); line-height: 1.6; }
.ft { text-align: center; padding: 1.5rem 1rem; font-size: 0.68rem; color: var(--t3); border-top: 1px solid var(--bd); max-width: 1160px; margin: 0 auto; opacity: 0; transition: opacity 0.4s ease 0.3s; }
body.searched .ft { opacity: 1; }
.ft-logo { font-family: var(--ff-logo) !important; font-size: 0.8rem; font-weight: 400; color: var(--t3); }
.ai-fab { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--ac); color: #fff; border: none; border-radius: 8px; padding: 0.7rem 1.1rem; font-size: 0.83rem; font-weight: 700; font-family: var(--ff) !important; box-shadow: var(--sh2); cursor: pointer; z-index: 1000; transition: background 0.2s, transform 0.2s; display: flex; align-items: center; gap: 0.4rem; text-decoration: none; }
.ai-fab:hover { background: var(--ac2); transform: translateY(-1px); }
@media (max-width: 640px) {
  .logo-brand { font-size: 2.6rem; }
  body.searched .logo-brand { font-size: 1.2rem; }
  body.searched #q { font-size: 0.88rem; }
  body.searched .header-inner { padding: 0.5rem 0.8rem; }
  .ctrls { display: none; }
  .ai-fab { bottom: 1rem; right: 1rem; padding: 0.65rem 0.95rem; font-size: 0.78rem; }
}
    </style>
</head>

<script>
// 1. 별자리 배경 시스템 (최적화 버전)
(async function initStars() {
    const canvas = document.getElementById('starCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let stars = [];
    let skyOpacity = 0.8;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function generateStars(count = 150) {
        stars = Array.from({ length: count }, () => ({
            x: Math.random(),
            y: Math.random(),
            r: Math.random() * 1.2 + 0.2,
            d: Math.random() * 4 + 2,
            phase: Math.random() * Math.PI * 2
        }));
    }
    generateStars();

    function draw(ts) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const theme = document.body.getAttribute('data-theme') || 'dark';
        const color = theme === 'dark' ? '232,230,225' : '30, 41, 59';
        const displayOpacity = Math.max(skyOpacity, theme === 'dark' ? 0.4 : 0.6);

        stars.forEach(s => {
            const twinkle = 0.6 + 0.4 * Math.sin(ts / 1000 / s.d * Math.PI * 2 + s.phase);
            ctx.beginPath();
            ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${color}, ${displayOpacity * twinkle})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
})();

let VISA_DATA = [];
let dataReady = false;

const qEl = document.getElementById('q');
const goBtn = document.querySelector('.sbar-go');
const rcEl = document.getElementById('rc');

function setSearchEnabled(enabled) {
    if (!qEl || !goBtn) return;
    qEl.disabled = !enabled;
    goBtn.disabled = !enabled;
    qEl.style.opacity = enabled ? '1' : '0.6';
}

async function loadVisaData() {
    try {
        rcEl.textContent = '데이터 동기화 중...';
        const res = await fetch(`/api/visas?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const raw = await res.json();
        const arr = Array.isArray(raw) ? raw : (raw.data || null);
        
        if (!arr || arr.length === 0) throw new Error('Invalid Data Format');

        VISA_DATA = arr;
        dataReady = true;
        rcEl.textContent = `데이터 로드 완료 (${VISA_DATA.length}개)`;
        setSearchEnabled(true);
        initUI();
        
        const PH_LIST=["제주 무사증, B-2-2, K-ETA 등 검색","사증면제협정국, B-1, 무비자 차이 검색","F-6 결혼이민, 가정폭력, 혼인단절 검색","E-7 특정활동, E-9 비전문취업 검색","D-2 유학, 아르바이트 활동허가 검색","건강보험 면제, NHIS, 국외체류 검색","난민신청 서류, G-1, RF-1 검색","F-5 영주권, 점수제, F-2-7 검색","오버스테이, 자진신고, 입국규제 검색","K-ETA 국가 목록, 116개국 검색","결핵 고위험국, TB-1, 진단서 검색","F-3 동반 소득요건, 25.7.1 개편 검색"];
        qEl.placeholder = PH_LIST[Math.floor(Math.random()*PH_LIST.length)];
    } catch (e) {
        console.error("Data Load Error:", e);
        dataReady = false;
        rcEl.textContent = '⚠ 서버 통신 실패 (데이터 로드 오류)';
        qEl.placeholder = '데이터 로드 실패 — 새로고침 후 다시 시도';

    }
}

let currentSearchMode='and', currentTheme='dark';
const CC={short:'var(--cSh)',study:'var(--cSt)',work:'var(--cWk)',invest:'var(--cIn)',family:'var(--cFm)',other:'var(--cOt)',diplo:'var(--cDp)',nhis:'var(--cNh)',faq:'var(--cFq)',scn:'var(--cSc)'};
const CL={short:['입국 요건','연장/제한','FAQ'],study:['신규 발급 요건','연장 구비서류','FAQ'],work:['신규 발급 요건','연장 구비서류','FAQ'],invest:['신규 발급 요건','연장 구비서류','FAQ'],family:['신규 발급 요건','연장 구비서류','FAQ'],other:['개요/요건','연장/절차','FAQ'],diplo:['부여 요건','유지','FAQ'],nhis:['적용 대상','신청 절차','FAQ'],faq:['개요','절차/유의','FAQ'],scn:['적용 기준','상세/대상','FAQ']};

function getLabels(v){return v.labels||CL[v.cat]||['개요','상세','FAQ'];}
function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s ?? '';return d.innerHTML}
function hl(t,k){
    const text = String(t ?? '');
    if(!k.length) return escapeHtml(text);
    return escapeHtml(text).replace(new RegExp(`(${k.map(escapeRegExp).join('|')})`,'gi'),'<mark class="h">$1</mark>')
}

function calculateScore(item,keywords){
    if(!keywords.length) return 1;
    let score=0;
    const cL=(item.code||'').toLowerCase(), nL=(item.name||'').toLowerCase();
    const aliasL=(item.aliases||[]).map(x=>String(x).toLowerCase());
    const content=`${item.newReq||''} ${item.extReq||''} ${item.faq||''} ${item.period||''}`.toLowerCase();
    let isAnd=true;
    for(const kw of keywords){
        let m=false;
        if(cL===kw||nL===kw){score+=220; m=true;}
        else if(cL.includes(kw)||nL.includes(kw)){score+=120; m=true;}
        aliasL.forEach(a=>{ if(a===kw){score+=180; m=true;} else if(a.includes(kw)||kw.includes(a)){score+=90; m=true;} });
        if(item.subCodes){
            for(const s of item.subCodes){
                const sCode=(s.code||'').toLowerCase(), sName=(s.name||'').toLowerCase();
                const sAliases=(s.aliases||[]).join(' ').toLowerCase();
                if(sCode===kw||sName===kw){score+=90; m=true;}
                else if(sCode.includes(kw)||sName.includes(kw)){score+=60; m=true;}
                const sc=`${s.addReq||''} ${s.note||''} ${sAliases}`.toLowerCase();
                const n=(sc.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
                if(n>0){score+=n*16; m=true;}
            }
        }
        const cn=(content.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
        if(cn>0){score+=cn*12; m=true;}
        if(!m) isAnd=false;
    }
    return currentSearchMode==='and' ? (isAnd?score:0) : score;
}

const ALIAS_MAP = {
    "제주무사증":"B-2-2","제주 무사증":"B-2-2","제주무비자":"B-2-2","제주 무비자":"B-2-2","제주직항":"B-2-2","제주입도":"B-2-2",
    "사증면제협정국":"B-1","사증면제협정":"B-1","비자면제협정":"B-1","무사증협정":"B-1","협정국":"B-1",
    "전자여행허가":"K-ETA","케이이티에이":"K-ETA","무사증":"B-2","무비자":"B-2","난민":"RF-1","난민신청":"RF-1","난민서류":"RF-1",
    "불법체류":"OVS-1","불체":"OVS-1","다발국가":"OVS-1","불법체류다발":"OVS-1","중점관리국가":"OVS-1",
    "동포비자통합":"H-2","H2폐지":"H-2","방문취업폐지":"H-2","동포통합":"F-4"
};

function expandKeywords(keywords){
    const expanded = new Set(keywords.map(k=>k.toLowerCase()));
    const joined = keywords.join('').toLowerCase();
    const joinedNoSpace = joined.replace(/\s+/g,'');
    if(ALIAS_MAP[joined]) expanded.add(ALIAS_MAP[joined].toLowerCase());
    if(ALIAS_MAP[joinedNoSpace]) expanded.add(ALIAS_MAP[joinedNoSpace].toLowerCase());
    keywords.forEach(k=>{
        const nk = k.replace(/\s+/g,'').toLowerCase();
        if(ALIAS_MAP[nk]) expanded.add(ALIAS_MAP[nk].toLowerCase());
        if(nk==='제주') expanded.add('b-2-2');
        if(nk==='협정') expanded.add('b-1');
    });
    return [...expanded];
}

const PREDEF_KEYWORDS = [
    "제주 무사증", "제주무사증 입국", "사증면제협정국", "비자면제협정", "K-ETA 제주", "B-2-2 제주 무사증", "B-1 사증면제협정",
    "F-3 소득요건 개편", "E-7-4 숙련기능", "건강보험 면제 및 감면", "K-ETA 면제조건", "K-ETA 국가 목록",
    "F-6-3 혼인단절", "B-2-2 제주무비자", "결핵 고위험 35개국", "오버스테이 자진신고",
    "D-2 유학 아르바이트", "D-10 구직활동", "F-5 영주권 점수제", "하이코리아 방문예약",
    "제주 무사증 제외국","난민신청 필요서류","중점관리국가 21개국","H-2 F-4 동포비자 통합"
];

function showSuggestions(val) {
    if(!dataReady) return;
    const list = document.getElementById('auto-list');
    list.innerHTML = '';
    if(!val) { list.classList.remove('active'); return; }
    const lowerVal = val.toLowerCase();
    const matches = PREDEF_KEYWORDS.filter(k => k.toLowerCase().includes(lowerVal));
    VISA_DATA.forEach(v => {
        if((v.code||'').toLowerCase().includes(lowerVal) || (v.name||'').toLowerCase().includes(lowerVal)) {
            const str = `${v.code} ${v.name}`;
            if(!matches.includes(str)) matches.push(str);
        }
    });
    if(matches.length > 0) {
        matches.slice(0, 7).forEach(m => {
            const div = document.createElement('div');
            div.className = 'auto-item';
            div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg> <span>${hl(m, [val])}</span>`;
            div.onclick = () => {
                document.getElementById('q').value = m;
                list.classList.remove('active');
                executeSearch();
            };
            list.appendChild(div);
        });
        list.classList.add('active');
    } else {
        list.classList.remove('active');
    }
}

document.addEventListener('click', function(e) {
    const wrap = document.getElementById('search-wrap');
    if(wrap && !wrap.contains(e.target)){
        document.getElementById('auto-list').classList.remove('active');
    }
});

function executeSearch() {
    if (!dataReady) return;
    document.getElementById('auto-list').classList.remove('active');
    const query = qEl.value.trim();
    if (!query) return;

    if(/scn/i.test(query)) {
        alert("⚠ [경고] 해당 시나리오 검색 결과는 실무자 사전 안내 및 단순 참고용입니다. 실제 행정 처리 및 최종 판단은 관할 출입국관서에 귀속됩니다.");
    }

    if (document.body.classList.contains('landing')) {
        document.body.classList.add('launching');
        setTimeout(() => {
            document.body.classList.remove('landing', 'launching');
            document.body.classList.add('searched');
            renderResults(query);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 600);
    } else {
        renderResults(query);
    }
}

function resetToLanding(){
    document.body.classList.remove('searched');
    document.body.classList.add('landing');
    qEl.value='';
    document.getElementById('xb').classList.remove('v');
    document.getElementById('rlist').innerHTML='';
    rcEl.textContent = dataReady ? `데이터 로드 완료 (${VISA_DATA.length}개)` : '데이터 로딩 중…';
}

function renderResults(query){
    if(!dataReady) return;
    const box=document.getElementById('rlist'), rc=document.getElementById('rc');
    const kw=query.trim().split(/\s+/).filter(Boolean), kwL=expandKeywords(kw.map(k=>k.toLowerCase()));
    
    let scored=VISA_DATA.map(v=>({...v,_score:calculateScore(v,kwL)}));
    let filtered=scored.filter(v=>v._score>0).sort((a,b)=>b._score-a._score);
    
    let st=0; filtered.forEach(v=>{if(v.subCodes) st+=v.subCodes.length;});
    
    if(!filtered.length){
        box.innerHTML=`<div class="es"><div class="es-t">궤도를 이탈했습니다</div><div class="es-d">'${escapeHtml(query)}'에 해당하는 정보가 없습니다.<br>키워드를 줄이거나 OR 모드로 전환해 보세요.</div></div>`;
        rc.textContent='0건'; return;
    }
    
    const fg=document.createDocumentFragment();
    filtered.forEach((v)=>{
        const c=document.createElement('article'); c.className='vc';
        c.style.setProperty('--cbc', CC[v.cat]||CC.other);
        
        const hs=v.subCodes&&v.subCodes.length>0;
        let ms=[];
        if(hs&&kw.length) ms=v.subCodes.filter(s=>{const x=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase(); return kwL.some(k=>x.includes(k));});
        if(kw.length&&(v._score>=50||ms.length)) c.classList.add('open');
        
        let sh='';
        if(hs){
            sh=`<div class="ss"><div class="ss-t"><b>세부항목</b>${v.subCodes.length}개</div>`;
            v.subCodes.forEach(s=>{
                const x=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase();
                const im=!kw.length||kwL.some(k=>x.includes(k));
                sh+=`<div class="su${kw.length&&im?' open':''}"><div class="su-h" onclick="this.parentElement.classList.toggle('open')"><span class="s-c">${hl(s.code,kw)}</span><span class="s-n">${hl(s.name,kw)}</span><span class="tgl">▼</span></div><div class="su-cw"><div class="su-c">`;
                if(s.addReq) sh+=`<div class="su-s"><div class="tl tl-n">안내/추가</div><div class="ct">${hl(s.addReq,kw)}</div></div>`;
                if(s.note) sh+=`<div class="su-s"><div class="tl tl-f">실무참고</div><div class="ct">${hl(s.note,kw)}</div></div>`;
                sh+=`</div></div></div>`;
            });
            sh+=`</div>`;
        }
        
        const dbHtml = v.dataBadge ? `<span class="bd">${escapeHtml(v.dataBadge)}</span>` : '';
        const ddHtml = v.dataDate ? `<div class="data-date">데이터 기준: ${escapeHtml(v.dataDate)}</div>` : '';
        
        const lb=getLabels(v);
        c.innerHTML=`<div class="vc-h" onclick="this.parentElement.classList.toggle('open')"><span class="bc">${hl(v.code,kw)}</span><span class="vt">${hl(v.name,kw)}</span>${v.period?`<span class="bp">${hl(v.period,kw)}</span>`:''}${dbHtml}${hs?`<span class="bn">+${v.subCodes.length}</span>`:''}<span class="tgl">▼</span></div><div class="vc-cw"><div class="vc-c"><div class="vs"><div class="tl tl-n">${lb[0]}</div><div class="ct">${hl(v.newReq,kw)}</div></div><div class="vs"><div class="tl tl-e">${lb[1]}</div><div class="ct">${hl(v.extReq,kw)}</div></div><div class="vs"><div class="tl tl-f">${lb[2]}</div><div class="ct">${hl(v.faq,kw)}</div></div>${sh}${ddHtml}</div></div>`;
        fg.appendChild(c);
    });
    
    box.innerHTML=''; box.appendChild(fg);
    rc.textContent=`${filtered.length}건${st?` (세부 ${st}건)`:''} · 총 ${VISA_DATA.length}개`;
    const rh=document.getElementById('rh');
    const modeStr=currentSearchMode==='and'?'AND(모두 포함)':'OR(하나 이상)';
    const topCats=[...new Set(filtered.slice(0,3).map(v=>({short:'단기',study:'유학/연수',work:'취업',invest:'투자',family:'가족/이민',other:'기타',diplo:'외교',nhis:'건강보험',faq:'안내',scn:'시나리오'}[v.cat]||v.cat)))];
    rh.textContent=`관련도 순 정렬 · ${modeStr} · 상위 분류: ${topCats.join(', ')}`;
}
