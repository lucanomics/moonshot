<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshot — 출입국 민원·비자 통합 검색</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌕</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --ff: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
            --ff-logo: 'Jua', sans-serif;
            --fs: clamp(14px, 1.35vw, 16px);
            
            --bg0: #f8fafc; --bg1: #ffffff; --bg2: #f1f5f9; --bg3: #e2e8f0; --bgI: #ffffff;
            --bd: #cbd5e1; --bd2: #e2e8f0; --bd3: #cbd5e1;
            --t1: #1e293b; --t2: #334155; --t3: #64748b;
            --ac: #4f46e5; --ac2: #6366f1; --acG: rgba(79, 70, 229, 0.15); --acL: #e0e7ff;
            --cy: #0ea5e9; --cyL: #e0f2fe;
            --hlB: #fef3c7; --hlT: #92400e;
            
            --cSh: #94a3b8; --cSt: #3b82f6; --cWk: #f59e0b; --cIn: #10b981;
            --cFm: #ec4899; --cOt: #8b5cf6; --cDp: #64748b; --cNh: #0d9488; 
            --cFq: #ef4444; --cSc: #d946ef;
            
            --sh1: 0 2px 6px rgba(15, 23, 41, 0.04); 
            --sh2: 0 8px 24px rgba(15, 23, 41, 0.08);
            --shG: 0 0 24px rgba(59, 130, 246, 0.15);
            --shD: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        [data-theme="dark"] {
            --bg0: #0f172a; --bg1: #1e293b; --bg2: #334155; --bg3: #1e293b; --bgI: #0f172a;
            --bd: #334155; --bd2: #475569; --bd3: #334155;
            --t1: #cbd5e1; --t2: #94a3b8; --t3: #64748b;
            --ac: #6366f1; --ac2: #818cf8; --acG: rgba(99, 102, 241, 0.15); --acL: #312e81;
            --cy: #38bdf8; --cyL: #0c4a6e;
            --hlB: #451a03; --hlT: #fbbf24;
            
            --cNh: #2dd4bf; --cFq: #fca5a5; --cSc: #e879f9;
            
            --sh1: 0 2px 8px rgba(0, 0, 0, 0.3); 
            --sh2: 0 12px 32px rgba(0, 0, 0, 0.4);
            --shG: 0 0 32px rgba(30, 58, 138, 0.5);
            --shD: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        html { font-size: var(--fs); scroll-behavior: smooth; }
        body, input, button { font-family: var(--ff) !important; }
        body { background: var(--bg0); color: var(--t1); line-height: 1.65; min-height: 100vh; overflow-x: hidden; transition: background 0.4s ease, color 0.4s ease; }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: opacity 0.8s ease; }
        .star { position: absolute; background: #cbd5e1; border-radius: 50%; animation: twk var(--d, 4s) infinite alternate; }
        @keyframes twk { 0% { opacity: 0.1; } 100% { opacity: 0.4; } }
        body.searched .stars { opacity: 0.05; }

        .hero-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; position: relative; z-index: 10; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .hero-container { min-height: 70px; padding: 0; position: sticky; top: 0; background: color-mix(in srgb, var(--bg1) 85%, transparent); border-bottom: 1px solid var(--bd); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: var(--sh1); }

        .header-inner { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; max-width: 700px; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .header-inner { flex-direction: row; justify-content: space-between; max-width: 1200px; gap: 1rem; padding: 0.6rem 1.2rem; }

        .logo-area { display: flex; flex-direction: column; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .logo-area { flex-direction: row; gap: 0.6rem; flex-shrink: 0; }

        .logo-svg { width: 130px; height: 130px; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched .logo-svg { width: 44px; height: 44px; }

        .logo-text { display: flex; flex-direction: column; align-items: center; transition: all 0.7s ease; }
        body.searched .logo-text { align-items: flex-start; }
        
        .logo-brand { 
            font-family: var(--ff-logo) !important; 
            font-size: 4.16rem; 
            font-weight: 400; 
            letter-spacing: -0.02em; 
            line-height: 1.1; 
            background: linear-gradient(135deg, var(--ac), var(--cy)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        body.searched .logo-brand { font-size: 1.82rem; }
        
        .logo-sub { font-size: 0.85rem; font-weight: 500; color: var(--t3); letter-spacing: 0.02em; transition: all 0.4s ease; }
        body.searched .logo-sub { font-size: 0; opacity: 0; height: 0; margin: 0; overflow: hidden; }

        .rocket-flyer { transition: transform 0.1s; transform-origin: center; }
        .exhaust { opacity: 0; transition: opacity 0.2s ease-in-out; }
        body.launching .rocket-flyer { animation: moonshotLaunch 0.7s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        body.launching .exhaust { opacity: 1; animation: flicker 0.1s infinite alternate; }
        
        @keyframes moonshotLaunch { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(150px, -150px) scale(0.5); opacity: 0; } }
        @keyframes flicker { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }

        .search-wrap { width: 100%; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        body.searched .search-wrap { max-width: 500px; flex: 1; min-width: 200px; }

        .sbar { position: relative; display: flex; align-items: center; background: var(--bgI); border: 2px solid var(--bd); border-radius: 999px; box-shadow: var(--sh1); transition: all 0.3s ease-in-out; z-index: 20; }
        .sbar:focus-within { border-color: var(--ac); box-shadow: var(--shG), 0 0 0 4px var(--acG); }

        .sbar-icon { position: absolute; left: 1.2rem; color: var(--t3); width: 22px; height: 22px; transition: all 0.3s ease-in-out; }
        .sbar:focus-within .sbar-icon { color: var(--ac); transform: scale(1.1); }

        #q { flex: 1; border: 0; outline: 0; background: 0; padding: 1.1rem 1rem 1.1rem 3.2rem; font-size: 1.1rem; color: var(--t1); transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        body.searched #q { padding: 0.75rem 0.8rem 0.75rem 2.8rem; font-size: 0.95rem; }
        #q::placeholder { color: var(--t3); font-weight: 400; }

        .xb { background: 0; border: 0; color: var(--t3); cursor: pointer; padding: 0.5rem; font-size: 1.2rem; display: none; transition: color 0.3s ease-in-out; }
        .xb:hover { color: var(--t1); } .xb.v { display: block; }

        .sbar-go { background: 0; border: 0; cursor: pointer; color: var(--t3); padding: 0 1.2rem 0 0.5rem; display: flex; align-items: center; transition: all 0.3s ease-in-out; }
        .sbar-go:hover { color: var(--ac); transform: scale(1.1); }
        .sbar-go svg { width: 22px; height: 22px; }

        .auto-list { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--bg1); border: 1px solid var(--bd); border-radius: 12px; box-shadow: var(--shD); max-height: 300px; overflow-y: auto; z-index: 999; display: none; opacity: 0; transform: translateY(-10px); transition: all 0.3s ease-in-out; }
        .auto-list.active { display: block; opacity: 1; transform: translateY(0); }
        .auto-item { padding: 0.75rem 1.2rem; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem; color: var(--t1); border-bottom: 1px solid var(--bd2); transition: background 0.3s ease-in-out; }
        .auto-item:last-child { border-bottom: none; }
        .auto-item:hover { background: var(--bg2); }
        .auto-item svg { color: var(--t3); width: 16px; height: 16px; flex-shrink: 0; }

        .smeta { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.75rem; color: var(--t3); padding: 0 1rem; opacity: 0; height: 0; overflow: hidden; transition: opacity 0.3s ease; }
        body.searched .smeta { opacity: 1; height: auto; overflow: visible; }

        .ctrls { display: flex; align-items: center; gap: 0.4rem; opacity: 0; pointer-events: none; max-width: 0; overflow: hidden; transition: all 0.4s ease-in-out; }
        body.searched .ctrls { opacity: 1; pointer-events: auto; max-width: 300px; overflow: visible; flex-shrink: 0; }

        .cb { background: var(--bg3); border: 1px solid var(--bd); border-radius: 999px; padding: 0.3rem 0.7rem; font-size: 0.75rem; color: var(--t2); cursor: pointer; font-weight: 600; white-space: nowrap; transition: all 0.3s ease-in-out; }
        .cb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }
        .cb.on { background: var(--ac2); color: #fff; border-color: var(--ac2); box-shadow: 0 2px 8px rgba(99,102,241,.3); }

        .landing-hints { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 2rem; max-width: 650px; transition: opacity 0.4s, max-height 0.4s; overflow: hidden; }
        body.searched .landing-hints { opacity: 0; max-height: 0; margin: 0; pointer-events: none; }
        .lh { background: var(--bg2); border: 1px solid var(--bd); border-radius: 999px; padding: 0.4rem 0.9rem; font-size: 0.8rem; color: var(--t3); cursor: pointer; transition: all 0.3s ease-in-out; font-weight: 500; }
        .lh:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); transform: translateY(-2px); }

        .results-area { 
            max-width: 1160px; margin: 0 auto; padding: 0 1rem; 
            opacity: 0; transform: translateY(40px); pointer-events: none; 
            transition: opacity 0.6s ease 0.1s, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s; 
        }
        body.searched .results-area { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .qf { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1.2rem 0 1rem; }
        .qb { background: var(--bg3); border: 1px solid var(--bd); border-radius: 999px; padding: 0.25rem 0.7rem; font-size: 0.7rem; color: var(--t3); cursor: pointer; transition: all 0.3s ease-in-out; font-weight: 500; }
        .qb:hover { background: var(--acL); color: var(--ac); border-color: var(--ac); }

        .rlist { display: flex; flex-direction: column; gap: 0.7rem; padding-bottom: 3rem; }

        .vc { background: var(--bg1); border: 1px solid var(--bd2); border-radius: 12px; box-shadow: var(--sh1); border-left: 5px solid var(--cbc, var(--bd2)); transition: box-shadow 0.3s, transform 0.2s; animation: cIn 0.3s ease both; }
        .vc:hover { box-shadow: var(--sh2); transform: translateY(-2px); }
        @keyframes cIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .vc-h { display: flex; align-items: center; gap: 0.6rem; padding: 0.8rem 1rem; background: var(--bg2); cursor: pointer; user-select: none; border-radius: 0 10px 10px 0; transition: background 0.3s ease-in-out; flex-wrap: wrap; }
        .vc-h:hover { background: var(--acL); }
        
        .bc { font-weight: 700; font-size: 0.9rem; color: var(--ac); background: var(--acL); padding: 3px 8px; border-radius: 6px; }
        .vt { font-weight: 700; font-size: 0.9rem; color: var(--t1); }
        .bp { font-size: 0.65rem; color: var(--tPt); background: var(--tPb); padding: 3px 8px; border-radius: 5px; white-space: nowrap; font-weight: 600; }
        .bn { font-size: 0.65rem; color: var(--t3); background: var(--bg3); padding: 3px 8px; border-radius: 5px; font-weight: 700; }
        .bd { font-size: 0.6rem; color: #065f46; background: #d1fae5; padding: 3px 8px; border-radius: 5px; font-weight: 700; white-space: nowrap; }
        [data-theme="dark"] .bd { color: #6ee7b7; background: #064e3b; }
        .tgl { margin-left: auto; color: var(--t3); font-size: 0.7rem; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .vc-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .vc.open .vc-cw { grid-template-rows: 1fr; }
        .vc.open .tgl { transform: rotate(180deg); }
        .vc-c { overflow: hidden; }

        .vs { padding: 0.7rem 1rem; border-top: 1px solid var(--bd3); }
        .tl { display: inline-flex; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 5px; margin-bottom: 0.4rem; }
        .tl-n { background: var(--tNb); color: var(--tNt); } .tl-e { background: var(--tEb); color: var(--tEt); } .tl-f { background: var(--tFb); color: var(--tFt); } .tl-s { background: var(--tSb); color: var(--tSt); }
        .ct { font-size: 0.85rem; color: var(--t2); line-height: 1.65; white-space: pre-line; word-break: keep-all; }

        .data-date { font-size: 0.65rem; color: var(--t3); padding: 0.4rem 1rem; border-top: 1px dashed var(--bd3); text-align: right; }

        .ss { background: var(--bg3); border-top: 1px solid var(--bd3); }
        .ss-t { padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 700; color: var(--t3); display: flex; align-items: center; gap: 0.4rem; }
        .ss-t b { background: var(--tSb); color: var(--tSt); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; }
        .su { border-top: 1px solid var(--bd3); }
        .su-h { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem 0.5rem 1.5rem; cursor: pointer; transition: background 0.3s ease-in-out; }
        .su-h:hover { background: var(--bg2); }
        .s-c { font-size: 0.8rem; font-weight: 700; color: var(--ac); min-width: 3.5rem; }
        .s-n { font-size: 0.8rem; font-weight: 600; color: var(--t1); }
        .su-cw { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: var(--bg2); }
        .su.open .su-cw { grid-template-rows: 1fr; }
        .su.open .tgl { transform: rotate(180deg); }
        .su-c { overflow: hidden; border-left: 3px solid var(--ac); margin-left: 1.5rem; }
        .su-s { padding: 0.4rem 1rem; } .su-s + .su-s { border-top: 1px dashed var(--bd3); }

        mark.h { background: var(--hlB); color: var(--hlT); padding: 0.05em 0.2em; border-radius: 4px; font-weight: 700; }

        .es { text-align: center; padding: 4rem 1rem; }
        .es-t { font-weight: 800; font-size: 1.1rem; color: var(--t2); margin-bottom: 0.4rem; }
        .es-d { font-size: 0.9rem; color: var(--t3); line-height: 1.6; }

        .ft { 
            text-align: center; padding: 2rem 1rem; font-size: 0.7rem; color: var(--t3); 
            border-top: 1px solid var(--bd); max-width: 1160px; margin: 0 auto; 
            opacity: 0; 
            transition: opacity 0.5s ease 0.3s; 
        }
        body.searched .ft { opacity: 1; }
        
        .ft-logo { 
            font-family: var(--ff-logo) !important; 
            font-size: 0.8rem; 
            font-weight: 400; 
            background: linear-gradient(90deg, var(--ac), var(--cy)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
        }

        @media (max-width: 640px) {
            .logo-brand { font-size: 2.86rem; }
            body:not(.searched) #q { font-size: 1rem; padding: 1rem 0.5rem 1rem 2.8rem; }
            body.searched .logo-brand { font-size: 1.43rem; }
            body.searched .header-inner { padding: 0.6rem; gap: 0.5rem; }
            .ctrls { display: none; }
        }

        /* ═══ AI LINK BUTTON ═══ */
        .ai-fab { position: fixed; bottom: 1.5rem; right: 1.5rem; background: linear-gradient(135deg, var(--ac), var(--cy)); color: #fff; border: none; border-radius: 999px; padding: 0.8rem 1.2rem; font-size: 0.85rem; font-weight: 700; font-family: var(--ff) !important; box-shadow: var(--shD); cursor: pointer; z-index: 1000; transition: transform 0.2s; display: flex; align-items: center; gap: 0.4rem; text-decoration: none; }
        .ai-fab:hover { transform: scale(1.05); }
        @media (max-width: 480px) { .ai-fab { bottom: 1rem; right: 1rem; padding: 0.7rem 1rem; font-size: 0.8rem; } }
    </style>
</head>
<body class="landing" data-theme="dark">

<div class="stars" id="stars"></div>

<div class="hero-container" id="hero">
    <div class="header-inner">
        <div class="logo-area" onclick="if(document.body.classList.contains('searched')) resetToLanding()">
            <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="85" cy="25" r="1.5" fill="#cbd5e1" opacity=".5"><animate attributeName="opacity" values=".2;.6;.2" dur="3s" repeatCount="indefinite"/></circle>
                <circle cx="95" cy="50" r="1.2" fill="#94a3b8" opacity=".4"/>
                <circle cx="25" cy="40" r="2" fill="#cbd5e1" opacity=".3"/>
                <path d="M 30,90 A 45,45 0 1,0 90,30 A 55,55 0 1,1 30,90 Z" fill="url(#gMoon)" opacity=".95"/>
                <g class="rocket-flyer">
                    <g transform="translate(48, 72) rotate(45)">
                        <rect x="-8" y="-18" width="16" height="34" rx="8" fill="url(#gRocket)"/>
                        <path d="M -8,-10 L 0,-28 L 8,-10 Z" fill="#3b82f6"/>
                        <path d="M -8,5 L -16,20 L -8,12 Z" fill="#6366f1"/>
                        <path d="M 8,5 L 16,20 L 8,12 Z" fill="#6366f1"/>
                        <circle cx="0" cy="-2" r="3.5" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
                        <g class="exhaust">
                            <path d="M -5,16 L 0,35 L 5,16 Z" fill="#f59e0b"/>
                            <path d="M -2.5,16 L 0,26 L 2.5,16 Z" fill="#fef08a"/>
                        </g>
                    </g>
                </g>
                <defs>
                    <linearGradient id="gMoon" x1="20" y1="20" x2="100" y2="100">
                        <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1e3a8a"/>
                    </linearGradient>
                    <linearGradient id="gRocket" x1="0" y1="-20" x2="0" y2="20">
                        <stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#94a3b8"/>
                    </linearGradient>
                </defs>
            </svg>
            <div class="logo-text">
                <span class="logo-brand">Moonshot</span>
                <span class="logo-sub">출입국 민원·비자 통합 검색 플랫폼</span>
            </div>
        </div>

        <div class="search-wrap" id="search-wrap">
            <div class="sbar">
                <svg class="sbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
                <input type="text" id="q" placeholder="제주 무사증, 사증면제협정국, B-2-2, K-ETA, D-2 서류 등 검색" autocomplete="off" spellcheck="false">
                <button class="xb" id="xb" onclick="clearSearch()">✕</button>
                <button class="sbar-go" onclick="executeSearch()" title="검색">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
            
            <div class="auto-list" id="auto-list"></div>

            <div class="smeta"><span id="rc"></span><span id="rh"></span></div>
        </div>

        <div class="ctrls">
            <button class="cb on" id="ma" onclick="setSearchMode('and')">AND</button>
            <button class="cb" id="mo" onclick="setSearchMode('or')">OR</button>
            <button class="cb" onclick="toggleAccordions(true)">접기</button>
            <button class="cb" onclick="toggleAccordions(false)">펼치기</button>
            <button class="cb" onclick="toggleTheme()" title="테마 변경">🌗</button>
        </div>
    </div>
    <div class="landing-hints" id="landingHints"></div>
</div>

<div class="results-area" id="resultsArea">
    <div class="qf" id="qf"></div>
    <div class="rlist" id="rlist"></div>
</div>

<footer class="ft">
    <span class="ft-logo">Moonshot</span> v24 · Moonshot/Moonshot.ai의 검색 및 답변 결과는 사전 안내 목적이므로, 법적 근거로 활용될 수 없습니다. 최종 결정 전 반드시 관할 출입국관서의 확인을 거치시기 바랍니다.
</footer>

{code:"FAQ-1",name:"외국인등록 및 체류지 변경",cat:"faq",period:"체류기간 내",newReq:"입국일로부터 90일 초과 체류 예정 시 외국인등록 의무 발생.",extReq:"체류지(주소지) 변경 시 14일 이내 관할 시·군·구청 또는 출입국관서에 전입신고 필수.",faq:"Q: 체류지 미신고 시 제재?\nA: 출입국관리법 제100조에 따른 범칙금 부과 대상.",subCodes:[{code:"FAQ-1-1",name:"하이코리아 예약",addReq:"출입국관서 방문 전 하이코리아 웹사이트 사전예약 필수.",note:"hikorea.go.kr"}]},
{code:"FAQ-2",name:"체류기간 연장·자격 변경",cat:"faq",period:"자격별 상이",newReq:"체류기간 만료일 4개월 전부터 만료일 당일까지 연장 허가 신청 가능.",extReq:"체류자격 변경 시 해당 자격의 구비 요건을 완비하여 서류 제출.",faq:"Q: 체류기간 만료 후 신청 시?\nA: 체류기간 초과(불법체류)로 간주되어 범칙금 부과 및 심사 불이익 발생.",subCodes:[{code:"FAQ-2-1",name:"전자민원",addReq:"하이코리아 전자민원 시스템 이용.",note:"전자민원 신청 시 수수료 할인 혜택 제공."}]},
{code:"FAQ-3",name:"재입국허가",cat:"faq",period:"허가 기간 내",newReq:"등록외국인 출국 후 1년 이내 재입국 시 원칙적 재입국허가 면제. 면제 기간 초과 예정 시 사전 재입국허가 신청 필수.",extReq:"출국 전 하이코리아 또는 공항 출입국민원센터에서 신청.",faq:"Q: 해외 체류 중 연장 가능 여부?\nA: 질병 등 부득이한 사유 발생 시 본국 관할 재외공관을 통해 기간연장 신청 가능.",subCodes:[]},
{code:"FAQ-4",name:"전자팩스·오버스테이·국적",cat:"faq",period:"상시",newReq:"[전자팩스 민원] 1577-1346 이용. [국적 및 영주] F-4, F-5 체류자격 취득 요건 확인, 국적 취득 및 이탈 증명서 발급.",extReq:"[오버스테이] 자진신고 시 제재 규정 안내, 입국규제 해제를 위한 사전심사 절차.",faq:"Q: 다국어 상담 지원?\nA: 1345 외국인종합안내센터를 통해 지원.",subCodes:[]},
{code:"VW-1",name:"무사증·사증면제 구분",cat:"faq",period:"입국 전 확인",newReq:"1) 해당 국가 확인 → 2) 사증면제협정, 상호주의, 일방면제 적용 여부 확인 → 3) 제주특별자치도 무사증 특례와 일반 무사증 구분 → 4) K-ETA 신청 의무 확인 → 5) 취업 및 영리활동 수반 여부 점검.",extReq:"국적, 입국 공항/항만, 제주도 한정 여부, 체류 목적에 따라 법적 적용 체계가 상이함.",faq:"Q: 민원인의 무비자 문의 시 확인 순서?\nA: 사증면제협정국 여부 파악, 제주 무사증 적용 여부 점검, K-ETA 대상 여부를 순차적으로 대조.",aliases:["사증면제협정국","무사증 차이","제주 무사증 차이","B-1 B-2-2 차이","K-ETA 무사증","무비자 차이"],subCodes:[{code:"VW-1-1",name:"B-1 사증면제협정",addReq:"국가 간 협정, 상호주의, 일방면제 해당 여부 검토.",note:"단기 비영리 방문 체계의 기준점."},{code:"VW-1-2",name:"B-2-1 일반 무사증",addReq:"일반 무사증 입국 허용 여부 및 K-ETA 의무 적용 여부 점검.",note:"제주 무사증 특례와 엄격히 분리하여 해석."},{code:"VW-1-3",name:"B-2-2 제주 무사증",addReq:"제주 직항 또는 선박 입도 경로 확인, 타 지역 이동 제한 조항 안내.",note:"민원 혼동이 빈번하므로 주의 요망."},{code:"VW-1-4",name:"K-ETA",addReq:"무사증 입국 전 전자여행허가 승인 여부 검토.",note:"무사증 제도를 대체하는 개념이 아님을 고지."}]},
{code:"COM-1",name:"비자 공통 구비서류·팁",cat:"faq",period:"공통",newReq:"[재외공관] 사증발급신청서, 여권 원본, 표준규격사진(3.5x4.5), 수수료, 체류자격별 입증서류. [비자포털] 전자신청 및 결제 시스템 이용.",extReq:"[사증발급인정서] 국내 초청인이 대리 신청 가능, 발급 후 유효기간 3개월 적용.",faq:"Q: 민원 응대 프로토콜?\nA: 상황 파악 → 해당 제도 대조 → 구비서류 목록 확인 → 접수 기관 매칭 → 제출처 안내.",subCodes:[]},
{code:"B-1",name:"사증면제협정",cat:"short",period:"최대 90일 (국가별 상이), 연장불가",dataBadge:"67개국 협정 (일시정지 3개국 제외)",dataDate:"2026-04-14 (immigration.go.kr 공식 수치)",newReq:"사증면제협정국, 상호주의, 일방면제 대상국 확인 및 유효 여권, K-ETA 승인 내역 점검. 대상국은 총 67개국(일시정지국 제외).",extReq:"체류기간 연장 불가 원칙. 특수한 체류 목적 및 국적별 예외 조항은 개별 지침 확인.",faq:"Q: 사증면제협정국 국민의 취업 활동 여부?\nA: 불가. 단기 비영리 방문에 국한되며, 영리활동 수반 시 해당 E계열 체류자격 사증 사전 취득 필수.\nQ: B-1과 B-2의 법적 차이?\nA: B-1은 국가 간 조약에 의한 사증면제 체계이며, B-2는 상호주의, 국가이익, 제주 특례 등에 따른 관광통과(45개국 및 지역) 제도임.",aliases:["사증면제협정국","사증면제협정","비자면제협정","무사증협정","협정국","상호주의","일방면제","비자면제국"],subCodes:[{code:"B-1-1",name:"B-1 일반여권 유효 67개국",addReq:"말레이시아(3개월), 싱가포르(90일), 아랍에미리트(90일), 이스라엘(90일), 카자흐스탄(30일/180일 내 60일), 태국(90일), 튀르키예(90일), 카타르(90일), 과테말라(90일), 그레나다(90일), 니카라과(90일), 도미니카공화국(90일), 도미니카연방(90일), 멕시코(3개월), 바베이도스(90일), 바하마(90일), 베네수엘라(90일), 브라질(90일), 세인트루시아(90일), 세인트빈센트그레나딘(90일), 세인트키츠네비스(90일), 수리남(3개월), 아이티(90일), 앤티가바부다(90일), 엘살바도르(90일), 우루과이(90일), 자메이카(90일), 칠레(90일), 코스타리카(90일), 콜롬비아(90일), 트리니다드토바고(90일), 파나마(90일), 페루(90일), 그리스(3개월), 네덜란드(3개월), 노르웨이(90일), 덴마크(90일), 독일(90일), 라트비아(90일), 러시아(60일/180일 내 90일), 루마니아(90일), 룩셈부르크(3개월), 리투아니아(90일), 리히텐슈타인(3개월), 몰타(90일), 벨기에(3개월), 불가리아(90일), 스웨덴(90일), 스위스(3개월), 스페인(90일), 슬로바키아(90일), 아이슬란드(90일), 아일랜드(90일), 에스토니아(90일), 영국(90일), 오스트리아(90일), 이탈리아(90일), 체코(90일), 포르투갈(90일), 폴란드(90일), 프랑스(90일), 핀란드(90일), 헝가리(90일), 레소토(60일), 모로코(90일), 튀니지(30일), 뉴질랜드(3개월).",note:"법무부 사증면제협정체결국가 고시 기준. 일시정지 3개국(방글라데시, 파키스탄, 라이베리아) 적용 제외."},{code:"B-1-2",name:"B-1 일시정지 3개국",addReq:"방글라데시(90일), 파키스탄(3개월), 라이베리아(90일).",note:"협정은 체결되어 있으나 불법체류 급증 등의 사유로 일반여권 소지자 대상 사증면제 조치 일시정지."}]},
{code:"B-2",name:"관광통과·무사증",cat:"short",period:"90일 이내",dataBadge:"45개국·지역 (B-2-1/B-2-2)",dataDate:"2026-04-14 (immigration.go.kr 공식 수치)",newReq:"일반 무사증(B-2-1)과 제주특별자치도 무사증(B-2-2)을 명확히 구분. K-ETA 승인 내역, 항공기·선박 탑승 규정, 국가별 제한 조치 점검.",extReq:"체류기간 연장 불허 원칙. 출국 지연 시 출입국관리법 위반에 따른 불법체류 제재 발생.",faq:"Q: 제주 무사증과 일반 사증면제협정 제도는 동일한가?\nA: 상이함. 제주 무사증은 제주특별자치도 설치 및 국제자유도시 조성을 위한 특별법에 근거한 지역 한정 특례임.\nQ: B-2-2 제주 무사증 제외 국가 목록?\nA: 시리아, 수단, 이란, 쿠바, 코소보, 팔레스타인, 아프가니스탄, 이라크, 나이지리아, 가나, 예멘, 감비아, 세네갈, 방글라데시, 키르기스스탄, 파키스탄, 소말리아, 우즈베키스탄, 네팔, 카메룬, 스리랑카, 미얀마, 이집트 (총 23개국).",aliases:["무사증","무비자","제주무사증","제주 무사증","제주무비자","제주 무비자","제주 직항","제주 입도","B-2-2","제주 무사증 입국"],subCodes:[{code:"B-2-1",name:"일반 무사증 (45개국·지역)",addReq:"상호주의 및 국가이익에 따른 무사증 입국. [30일] 바레인, 브루나이, 사우디아라비아, 오만, 가이아나, 온두라스, 파라과이, 모나코, 몬테네그로, 교황청, 보스니아-헤르체고비나, 사이프러스, 산마리노, 안도라, 알바니아, 나우루, 뉴칼레도니아, 마셜제도, 마이크로네시아연방, 사모아, 솔로몬제도, 키리바시, 통가, 투발루, 팔라우, 피지, 남아프리카공화국, 모리셔스, 세이셸, 에스와티니. [90일] 마카오, 일본, 쿠웨이트, 대만, 홍콩, 미국, 아르헨티나, 에콰도르, 세르비아, 슬로베니아, 크로아티아, 호주, 보츠와나. [6개월] 캐나다.",note:"제주 무사증과 분리 적용. K-ETA 의무 국가 확인 요망.",aliases:["일반무비자","일반 무비자","일반 무사증"]},{code:"B-2-2",name:"제주 무사증 입국",addReq:"법무부장관 지정 제주 무사증 제외국(23개국) 여부 점검. 제주 직항 항공기 또는 선박을 통한 직접 입도 시 체류기간 30일 부여.",note:"제주특별자치도 이외 지역 이동 시 체류지역 확대 허가 필수. 미허가 이동 시 형사처벌 및 강제퇴거 대상.",aliases:["제주무사증","제주 무사증","제주무비자","제주 무비자","제주 직항","제주도 무사증"]}]},
{code:"C-3",name:"단기방문",cat:"short",period:"90일 이내",newReq:"사증발급신청서, 여권, 표준규격사진, 입국 목적 입증서류, 왕복항공권, 숙소 제공 확인서, 체류 일정표, 재정능력 입증서류.",extReq:"체류기간 연장 불허 원칙. 출국할 항공기·선박 부재, 불의의 질병 등 예외적 사유 발생 시 출입국관리법 시행규칙 제32조에 의거 심사 후 제한적 연장 허가.",faq:"Q: C-3 자격 연장 가능 여부?\nA: 불가. 원칙적으로 출국 후 해당 관할 공관에서 사증 재발급 요구됨.",subCodes:[{code:"C-3-1",name:"단기일반(친족)",addReq:"초청장, 초청인 신분증 사본 및 주민등록등본, 가족관계 입증서류.",note:""},{code:"C-3-2",name:"단체관광",addReq:"지정 전담여행사 발행 확인서.",note:""},{code:"C-3-3",name:"의료관광",addReq:"지정 유치의료기관 발급 초청장, 체류경비 지불능력 입증서류.",note:""},{code:"C-3-4",name:"일반상용",addReq:"거래처 초청장, 신청인 재직증명서.",note:""},{code:"C-3-5",name:"협정단기상용",addReq:"국가 간 협정 적용 입증서류.",note:""},{code:"C-3-6",name:"단기상용",addReq:"거래관계 및 상용목적 입증서류.",note:""},{code:"C-3-8",name:"동포방문",addReq:"외국국적동포 입증서류, 가족관계 입증서류.",note:""},{code:"C-3-9",name:"일반관광",addReq:"은행 잔고증명서 등 재정입증서류.",note:""},{code:"C-3-10",name:"순수환승",addReq:"제3국 목적지행 확정 항공권.",note:""}]},
{code:"C-4",name:"단기취업",cat:"short",period:"90일 이내",newReq:"사증발급신청서, 여권, 표준규격사진, 고용계약서, 관련 분야 전문성 입증서류.",extReq:"체류기간 연장 원칙적 불허.",faq:"Q: 국내 단기 공연 목적 입국 시 체류자격?\nA: 영리 목적 수익 활동이므로 C-3가 아닌 C-4 사증 취득 필수."},
{code:"D-1",name:"문화예술",cat:"study",period:"2년, 연장가능",newReq:"초청장 또는 연수계획서, 학력 및 경력 증명서, 체류경비 입증서류.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료, 소속 기관 연수 계속 입증서류, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 영리활동 가능 여부?\nA: 수익을 목적으로 하는 활동 엄격히 금지됨.",subCodes:[{code:"D-1-00",name:"문화예술연수",addReq:"비영리 문화예술 단체 연수 입증서류 제출.",note:""}]},
{code:"D-2",name:"유학",cat:"study",period:"2년 단위 부여, 연장가능",newReq:"표준입학허가서, 아포스티유 또는 영사확인 최종학력증명서, 재정능력 입증서류, 결핵 고위험 국가 소속 시 결핵진단서.",extReq:"[체류기간 연장] ① 통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료 ② 수료증명서, 지도교수 및 유학담당자 확인서 ③ 재학증명서, 성적증명서, 출석확인서 등 학업 계속 입증서류 ④ 재정능력 입증서류(우수인증대학 등 조건부 면제) ⑤ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능). [학사일정 기준] D-2-1~D-2-4, D-2-7: 3월말 및 9월말 기준 2년 이내 부여. D-2-5: 1회 1년 상한 부여, 총 2년 제한. D-2-6, D-2-8: 학업 과정 종료일+1개월 이내 부여.",faq:"Q: 아르바이트 관련 규정?\nA: 출입국관서의 시간제취업 사전 허가 득한 후 가능. D-2-1~D-2-4, D-2-6, D-2-7은 자격 소지 시 신청 가능. D-2-8, D-4-1, D-4-7은 입국일로부터 6개월 경과 후 신청 허용.\nQ: 학업 종료 후 구직 활동?\nA: D-10(구직) 자격으로 변경 신청.\nQ: 소속 대학 변경?\nA: 원칙적으로 동등 학위과정 이동만 허용(TOPIK 3급 이상 등 요건 충족). 제적 처리자, 하위 학위과정 이동, 비자심사강화대학으로의 편입은 엄격 제한.\nQ: 총 체류 상한 기간?\nA: 전문학사 3년, 학사 6년, 석사 5년, 박사 8년 (입학일 기준 산정).",subCodes:[{code:"D-2-1",name:"전문학사유학",addReq:"전문대학 표준입학허가서.",note:"최대 체류 상한: 입학 후 3년(3년제는 4년)."},{code:"D-2-2",name:"학사유학",addReq:"4년제 대학 표준입학허가서.",note:"가장 일반적 유학 형태. 최대 체류 상한: 입학 후 6년."},{code:"D-2-3",name:"석사유학",addReq:"대학원 석사과정 표준입학허가서.",note:"최대 체류 상한: 입학 후 5년(3년제는 6년)."},{code:"D-2-4",name:"박사유학",addReq:"대학원 박사과정 표준입학허가서.",note:"최대 체류 상한: 입학 후 8년(2년제는 7년)."},{code:"D-2-5",name:"연구유학",addReq:"연구기관 연구과정 소속 증명서.",note:"1회 심사 시 상한 1년. 누적 체류기간 총 2년 초과 불가."},{code:"D-2-6",name:"교환학생",addReq:"대학 간 교환 협정서, 본국 대학 재학증명서.",note:"체류기간은 교환 과정 종료일+1개월 이내 부여."},{code:"D-2-7",name:"일-학습연계 유학",addReq:"지정 일-학습연계 프로그램 참여 입증서류.",note:""},{code:"D-2-8",name:"방문학생",addReq:"국내 대학 방문학생 표준입학허가서.",note:"체류기간은 과정 종료일+1개월 이내. 시간제취업 허가는 입국 6개월 후 신청 가능."},{code:"D-2-R",name:"유학 자격 외국인등록",addReq:"① 통합신청서(별지 제34호 서식), 여권 사본, 표준규격사진 1장, 수수료(외국인등록+연장 동시 신청 시 연장 수수료 면제) ② 재학(연구생)증명서(인증대학 이상: 등록금납입증명서로 대체 가능) ③ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능). 재정능력 입증서류 제출 불요.",note:"출입국 체류민원 매뉴얼 2026.3월 기준."}]},

{code:"D-8",name:"기업투자",cat:"invest",period:"5년 이내 부여, 연장가능",newReq:"해당 법인등기부등본, 사업자등록증, 외국인투자기업 등록증명서, 최소 1억 원 이상 투자 입증서류, 사업계획서 및 내국인 고용계획서.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 법인등기부등본, 외국인투자기업 등록증명서, 납세증명서, 부가가치세 과세표준증명원, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능). (수수료 면제 대상)",faq:"Q: 제주도 콘도 등 부동산 5억 원 이상 투자 시 D-8 발급 여부?\nA: 기업투자가 아니므로 불가. 지정 부동산 투자 시 거주(F-2) 체류자격에 해당하는 부동산투자이민제 적용 대상임.",subCodes:[{code:"D-8-1",name:"국내 법인 투자",addReq:"외국인투자촉진법에 따른 법인 등록, 투자금액 및 지분보유율 입증.",note:""},{code:"D-8-2",name:"벤처기업 설립",addReq:"벤처기업 확인서, 투자금 반입 및 유지 명세.",note:""},{code:"D-8-3",name:"국민 영위 개인기업 투자",addReq:"대한민국 국민이 운영하는 기업에의 자본 투자 입증.",note:""},{code:"D-8-4",name:"기술창업",addReq:"점수제 요건 충족 표, 투자금 입증, 학사 이상 학위증명서.",note:""},{code:"D-8-91",name:"FTA 체결국 투자자",addReq:"관련 자유무역협정 규정에 의거한 전근 증명.",note:""}]},
{code:"D-9",name:"무역경영",cat:"work",period:"2년 이내 부여, 연장가능",newReq:"사업자등록증, 무역업 고유번호 부여증, 자본금 및 납세 증빙서류, 사업계획서.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료 6만원. 사업자등록증, 국세 및 지방세 납세증명서, 부가가치세 과세표준증명원, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 기업투자(D-8)와의 행정적 차이점?\nA: D-8은 외국인투자촉진법의 적용을 받아 수수료가 면제되며 외투기업 등록이 필수임. D-9는 일반 외환 및 무역 규정을 따르며 수수료(6만원)가 부과됨.",subCodes:[{code:"D-9-1",name:"무역업 등 경영",addReq:"한국무역협회 발행 무역업 고유번호.",note:""},{code:"D-9-2",name:"수출설비 설치 및 보수",addReq:"국내 도입되는 기계·설비의 수입 계약서.",note:""},{code:"D-9-3",name:"선박설비 파견",addReq:"국내 조선소와의 선박건조 및 설비 계약서.",note:""},{code:"D-9-4",name:"개인 경영 영리사업",addReq:"사업자등록증, 상세 사업계획서 및 자본금 입증.",note:""}]},
{code:"D-10",name:"구직",cat:"work",period:"6개월 단위 부여, 연장가능",newReq:"아포스티유 또는 영사확인 거친 최종 학위증명서, 관련 경력증명서, 구직활동 또는 창업계획서, 체류 중 재정능력 입증서류.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 구체적 구직활동 내역 입증서류, 재정능력 입증서류, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 체류 허용 최장 상한 기간?\nA: D-10-1(일반구직) 기준 일반 학사 취득자는 최대 1년, 석사 이상 학위 취득자 및 전문인력은 최대 2년.",subCodes:[{code:"D-10-1",name:"일반 구직활동",addReq:"학사 이상 학위 소지자, 전문 직종(E-1~E-7) 구직 및 연수 계획서.",note:""},{code:"D-10-2",name:"기술창업 준비활동",addReq:"학사 이상 학위 소지자, 창업 관련 지식재산권, 기술 기반 창업 계획서.",note:""}]},
{code:"E-1",name:"교수",cat:"work",period:"5년, 연장가능",newReq:"소속 대학 고용계약서, 학사 이상 학위증명서, 교수 경력증명서, 해당 대학 사업자등록증.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 소속 대학 재직증명서, 갱신된 고용계약서, 납세증명서, 건강보험 등 4대사회보험 가입내역 확인서, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 대학 내 강의를 수반하지 않는 순수 연구원 직렬의 체류자격?\nA: E-1 교수가 아닌 E-3(연구) 자격 요건 검토 필요."},
{code:"E-2",name:"회화지도",cat:"work",period:"2년, 연장가능",newReq:"관할 교육청 등 고용계약서, 자국 정부 발행 범죄경력증명서 및 학사 이상 학위증명서(아포스티유 필수), 법무부 지정병원 마약검사 포함 건강진단서, 사업자등록증, 교육청 인가 서류.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 재직증명서, 고용계약서, 소득금액증명원 및 납세증명서, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 어학원 등 근무처 변경 및 퇴직 시 절차?\nA: 퇴직 등 사유 발생일로부터 15일 이내 신고, 타 기관 취업 시 근무처 변경 허가 또는 추가 허가 절차 30일 이내 진행 필수.",subCodes:[{code:"E-2-1",name:"일반 외국어회화 강사",addReq:"법무부 등록 외국어학원 등 고용계약서, 해당 언어 모국어 국가 국적의 학사 이상 학위.",note:""},{code:"E-2-2",name:"초중고 학교 보조교사",addReq:"시도 교육청 또는 정부 주관 초청 확인서 (EPIK 등).",note:""},{code:"E-2-91",name:"FTA 적용 영어 강사",addReq:"대한민국이 체결한 자유무역협정 특례 요건 입증 서류.",note:""}]},
{code:"E-3",name:"연구",cat:"work",period:"5년, 연장가능",newReq:"연구기관 고용계약서, 학위 및 경력증명서, 해당 기관 사업자등록증.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 재직증명서, 고용계약서, 납세증명서, 4대사회보험 가입내역 확인서, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: E-1(교수) 자격과의 분별 기준?\nA: E-1은 고등교육법에 따른 교육기관에서의 강의 및 연구를 병행, E-3는 연구소 등에서의 자연과학 및 산업기술 순수 연구개발에 종사."},
{code:"E-4",name:"기술지도",cat:"work",period:"5년, 연장가능",newReq:"해당 분야 고도 기술 및 경력 입증 서류, 기술 도입 관련 고용계약서 또는 파견명령서.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 재직증명서, 갱신된 고용계약서, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 주요 허용 대상?\nA: 국내에서 제공하기 어려운 산업상의 특수 지식 및 고도 기술을 국내 기업에 지도하기 위해 파견된 자."},
{code:"E-5",name:"전문직업",cat:"work",period:"5년, 연장가능",newReq:"대한민국 정부 공인 해당 분야 국가자격증(항공조종, 의사 등), 고용계약서.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 국내 자격증 유지 확인, 재직증명서, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 허용 직종 범위?\nA: 법률, 회계, 의료 등 대한민국의 법률에 의하여 공인된 자격을 소지해야만 수행 가능한 전문 직종."},
{code:"E-6",name:"예술흥행",cat:"work",period:"2년, 연장가능",newReq:"국내 공연 기획사 등 고용계약서, 예술/체육 분야 경력증명서, 사업자등록증, 공연법 등에 따른 추천서 또는 인가 서류.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 재직증명서, 고용계약서, 소속 기관 세금 납부 증명, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 유흥업소 및 관광호텔 공연 종사자 심사 기준?\nA: E-6-2 자격은 인신매매 및 불법 고용 방지를 위해 관할 지자체장 추천서, 기획사 등록증명, 전용 숙소 확보 여부 등 엄격한 심사 대상.",subCodes:[{code:"E-6-1",name:"예술 및 연예 종사",addReq:"예술 활동 경력 증빙, 공연 기획사와의 정식 계약서, 소관 부처 추천서.",note:""},{code:"E-6-2",name:"호텔 및 유흥업소 공연",addReq:"관할 지자체장 발급 고용추천서, 공연 장소 및 숙소 상태 점검 확인서.",note:"인신매매 등 피해 방지 심사 대상. 사증 발급 엄격 제한 적용."},{code:"E-6-3",name:"운동선수 및 지도자",addReq:"프로스포츠 구단 고용계약서, 해당 종목 중앙협회 추천서.",note:""}]},
{code:"E-7",name:"특정활동",cat:"work",period:"3년, 연장가능",newReq:"고용계약서, 직종별 학력 및 경력 입증서류, 필요 시 중앙부처 고용추천서, 전년도 국민총소득(GNI) 대비 일정 비율 이상의 임금 요건 충족 증빙. 체류민원 매뉴얼 기준 총 91개 직종(E-7-1 전문인력 67개, E-7-2 준전문 10개, E-7-3 일반기능 14개, E-7-4 숙련기능점수제 3개 등).",extReq:"[체류기간 연장] ① 통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료 ② 갱신된 고용계약서 ③ 개인 소득금액증명원 또는 근로소득원천징수부 ④ 사업자등록증 또는 법인등기부등본 ⑤ 지정 직종(해외영업, 디자이너, 주방장 등)에 대한 신원보증서 원본 ⑥ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능) ⑦ 고용주의 4대보험 및 납세증명서(국세 및 지방세 체납분 확인).",faq:"Q: 근무처 변경 및 퇴직 시 의무?\nA: 이직 등 사유 발생 시 사유 발생일로부터 15일 이내 관할 출입국관서에 근무처 변경 및 추가 신고 절차를 진행해야 함.\nQ: E-9(비전문취업) 자격 소지자의 E-7 변경 허용 범위?\nA: E-7-4(숙련기능점수제)에 한하여 쿼터 내 선발 변경 허용.\nQ: 체류 허가 기간 상한?\nA: 1회 심사 시 통상 3년 부여. 우수인재 및 특구 소속 연구원의 경우 예외적으로 5년 부여 가능.",subCodes:[{code:"E-7-1",name:"전문인력 (67개 직종)",addReq:"학사 학위 이상 또는 일정 수준 경력 보유, 관리자 및 관련 전문가 직렬. 임금기준 GNI 80% 이상 등 충족.",note:""},{code:"E-7-2",name:"준전문인력 (10개 직종)",addReq:"사무종사자 및 특정 서비스종사자. 내국인 고용보호 직종 등 심사 강화.",note:""},{code:"E-7-3",name:"일반기능인력 (14개 직종)",addReq:"동물사육사, 할랄도축원, 양식기술자 등. 직종별 고용추천서 요건 엄격 적용.",note:""},{code:"E-7-4",name:"숙련기능인력 (점수제)",addReq:"E-9, H-2 등 단순노무 자격으로 4년 이상 합법 체류, 법무부 산정 점수 60점 이상 획득, 농림축산어업 및 제조/건설 직종 종사.",note:"비전문에서 전문인력으로 상향. 연간 선발 쿼터 제한."},{code:"E-7-S",name:"네거티브 방식 첨단분야",addReq:"초고소득자 또는 정부 지정 첨단산업분야 종사(예정) 외국인 인재.",note:""},{code:"E-7-Y",name:"국내성장 우수인재",addReq:"국내 정규 대학 석사 이상 학위 취득자 중 첨단분야 취업 확정자.",note:"직종코드 9999(국내성장취업) 적용."},{code:"E-7-T",name:"최우수 인재 특정활동",addReq:"[연장 제출서류] ① 통합신청서, 사진, 여권, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능), 수수료 ② 재직증명서(첨단분야 업무 연관성 확인) ③ 소속 기관 사업자등록증 및 법인등기부등본 ④ 개인 소득금액증명원 ⑤ 해외 범죄경력증명서(해외 6개월 이상 체류 시) ⑥ 사회통합프로그램 1단계 이수확인서 또는 TOPIK 1급 성적표.",note:"전년도 GNI 2배 이상 연봉, 중앙행정기관장 추천서 필수. 체류민원 매뉴얼 2026.3월 기준 적용."},{code:"E-7-91",name:"FTA 독립전문가",addReq:"자유무역협정 체결국 국적 소지, 서비스 공급 계약 입증서류. 최대 1년 단수사증 발급.",note:"타 근무처 변경, 체류자격 변경, 자격 외 활동 일체 불허."}]},
{code:"E-8",name:"계절근로",cat:"work",period:"최대 5개월",newReq:"지자체 발급 고용허가서, 농어업 고용주와의 표준근로계약서, 결핵 및 마약검사 포함 건강진단서.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증(대상자). 지자체 연장 고용허가서, 표준근로계약서, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 고용주와 합의 시 타 농가 파견 및 이직 가능 여부?\nA: 사전에 승인된 고용주의 사업장 이탈 시 즉시 출입국관리법 위반에 따른 불법체류로 간주됨."},
{code:"E-9",name:"비전문취업",cat:"work",period:"최초 3년 (요건 충족 시 최대 4년 10개월)",newReq:"고용노동부 고용허가서(EPS), 표준근로계약서, 사업자등록증, 자국 사전교육 수료증 및 건강진단서.",extReq:"[체류기간 연장] ① 통합신청서(별지 제34호 서식), 여권 원본, 외국인등록증, 수수료(6만원) ② 고용허가서 사본 ③ 표준근로계약서 사본 ④ 고용주 사업자등록증 ⑤ 재고용 대상자: 고용노동부 발급 취업활동기간 연장확인서 ⑥ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능). [근무처 변경 허가] ① 통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료 ② 신규 고용허가서 및 근로계약서 ③ 새 사업장 사업자등록증 ④ 건설업의 경우 원도급업체 작성 외국인력 현황표.",faq:"Q: 임금체불 등 고용주 귀책 사유 발생 시 이직 가능 여부?\nA: 관할 지방고용노동관서에 진정 접수 및 구제 절차 진행 후 고용부의 근무처 변경 인정 확인에 따라 타 사업장 변경 허가 절차 진행.\nQ: E-9 자격의 최대 체류 허용 한도?\nA: 1회 입국 시 취업활동기간(3년) 및 재고용에 따른 연장기간(1년 10개월)을 합산하여 최장 4년 10개월 허용.",subCodes:[{code:"E-9-1",name:"제조업 종사",addReq:"고용노동부 발급 제조업 분야 고용허가서.",note:""},{code:"E-9-2",name:"건설업 종사",addReq:"건설업 분야 고용허가서 및 현장 투입 명세.",note:""},{code:"E-9-3",name:"농업 종사",addReq:"농산물 재배 및 축산업 고용허가서.",note:"제주 감귤 등 계절성 강한 영농 형태 다수."},{code:"E-9-4",name:"어업 종사",addReq:"연근해 어업 및 양식장 고용허가서.",note:"제주 넙치 양식장 및 선원 보조 인력 등."},{code:"E-9-5",name:"서비스업 종사",addReq:"재활용 수거 및 특정 서비스 분야 고용허가서.",note:""},{code:"E-9-9",name:"임업 종사",addReq:"조림 및 벌목 등 임업 분야 고용허가서.",note:""},{code:"E-9-10",name:"광업 종사",addReq:"광물 채굴 현장 고용허가서.",note:""},{code:"E-9-R",name:"외국인등록 및 지문 채취",addReq:"① 통합신청서(별지 제34호 서식), 여권 원본, 표준규격사진 1장, 수수료 ② 사업자등록증 사본 ③ 고용허가서 및 표준근로계약서 사본 ④ 법무부 지정병원 마약검사확인서(3개월 이내 발급, 밀봉 제출) ⑤ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",note:"체류민원 매뉴얼 2026.3월 기준 적용."},{code:"E-9-JS",name:"사업장 변경 구직신청자 특례",addReq:"① 통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료 면제 ② 구직기간 도과 시 출국에 동의하는 자진출국 각서 ③ 고용노동부 발급 구직등록필증 ④ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",note:"이직 과정 중 임시 체류 인정 조치. 체류민원 매뉴얼 2026.3월 기준."}]},
{code:"E-10",name:"선원취업",cat:"work",period:"최초 3년, 연장가능",newReq:"선원근로계약서, 해양수산부 승인 선원 자격증명, 법무부 지정병원 결핵 및 마약검사 포함 건강진단서.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 갱신된 선원근로계약서, 선원수첩, 선박소유주가 작성한 고용 확인서, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 계약 종료 전 무단 하선 시 행정 조치?\nA: 지정 근무처 이탈에 따른 출입국관리법 위반으로 즉각적인 불법체류 신분 전환 및 고용주의 관할 출입국관서 신고 의무 발생.",subCodes:[{code:"E-10-1",name:"내항선원",addReq:"내항 여객선 및 화물선 근로계약서.",note:""},{code:"E-10-2",name:"어선원",addReq:"20톤 이상 연근해 어선 승선 근로계약서.",note:"제주 근해 어업 집중 고용 인력."},{code:"E-10-3",name:"순항선원",addReq:"크루즈 등 순항 여객선 근로계약서.",note:""}]},
{code:"F-1",name:"방문동거",cat:"family",period:"최대 2년 부여, 연장가능",newReq:"국내 체류 초청인의 여권 및 신분증 사본, 해당 국가에서 발행된 가족관계 입증서류, 초청인의 합법 체류자격 입증서류.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 대한민국 발행 가족관계기록사항에 관한 증명서 또는 외국 발행 가족관계 서류, 주민등록등본, 초청인의 체류경비 지불 능력 소명 서류, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 내국인과 이혼 시 F-1 자격 유지 여부?\nA: 재산분할, 자녀 면접교섭권 행사 등의 권리구제 목적인 경우 출입국 심사를 거쳐 F-1-6 체류자격으로 6개월 단위 제한적 체류 변경 허가 가능.",subCodes:[{code:"F-1-3",name:"외교 및 공무원 동거",addReq:"A-1, A-2 자격 소지자의 동반 가족임을 증명하는 서류.",note:""},{code:"F-1-5",name:"결혼이민자의 부모 초청",addReq:"초청장, 신원보증서, 국내에서의 취업 활동 금지 서약서.",note:"관할 재외공관 사전 사증 발급 필수 (단기 비자 입국 후 체류자격 변경 불허 원칙)."},{code:"F-1-9",name:"재외동포 배우자 동거",addReq:"F-4, H-2 자격 소지자의 배우자 및 미성년 자녀 입증서류.",note:""},{code:"F-1-13",name:"미성년 유학생 부모",addReq:"국내 고등학교 이하 교육기관에 재학 중인 외국인 유학생의 재학증명서, 부모 관계 입증서류.",note:"자녀의 체류 경비에 대한 강화된 재정 입증 요구됨."},{code:"F-1-21",name:"외교관 가사보조인",addReq:"해당 외교 공관의 정식 파견 요청 공문.",note:""},{code:"F-1-22",name:"고액투자자 가사보조인",addReq:"미화 50만불 이상 D-8 자격 소지자와의 고용계약서.",note:""},{code:"F-1-23",name:"우수인재 가사보조인",addReq:"소관 부처 추천 우수인재 고용주와의 근로계약서.",note:""},{code:"F-1-24",name:"전문인력 가사보조인",addReq:"특정 E계열 전문직 고용주와의 근로계약서 및 소득 입증서류.",note:""}]},
{code:"F-2",name:"거주",cat:"family",period:"최대 5년 부여, 연장가능",newReq:"세부 자격(국민배우자, 영주권자 가족, 점수제 등)에 부합하는 소득, 투자금액 반입 및 획득 점수표 입증 서류 일체.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 소분류별 자격 부여 요건의 지속적 충족을 입증하는 객관적 서류(납세, 갱신된 가족관계, 고용 유지 등), 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 전문인력 점수제 거주(F-2-7) 연장 시 점수 미달 대응 방안?\nA: 소득 감소 등으로 인해 총점 80점 미달 시, 관할 출입국 사회통합프로그램 단계 이수 가점 확보 또는 상위 TOPIK 성적 취득을 통한 점수 보완 필요.",subCodes:[{code:"F-2-2",name:"국민의 미성년 자녀",addReq:"대한민국 국민인 부 또는 모의 가족관계증명서, 외국 발행 출생증명서 원본.",note:""},{code:"F-2-3",name:"영주권자의 배우자 및 자녀",addReq:"국내 영주(F-5) 체류자격 소지자의 외국인등록증 사본, 혼인 및 가족관계 입증 서류.",note:""},{code:"F-2-7",name:"우수인재 점수제 거주",addReq:"학력, 연령, 한국어, 소득 산정 점수표 합산 80점 이상, TOPIK 4급 또는 사회통합프로그램 5단계 이상 필수.",note:"전문인력 체류 안정을 위한 빈출 자격. 매년 정부 선발 쿼터 적용."},{code:"F-2-99",name:"기타 사유 거주",addReq:"장기 체류 및 국내 기반 형성에 따른 인도적 사유 입증 등 개별 검토.",note:"국내 체류 필요성 및 생계유지능력 입증 서류 제출 필수."}]},
{code:"F-3",name:"동반",cat:"family",period:"주체류자의 허가 기간과 동일",newReq:"초청인(주체류자)의 여권 및 외국인등록증 사본, 아포스티유 또는 영사확인을 득한 가족관계 입증서류, 초청자의 소득요건(2025.7.1 개편 지침) 입증을 위한 소득금액증명원.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료. 주체류자의 외국인등록증 사본, 변동 없는 가족관계 입증서류, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 동반 가족의 국내 시간제 취업 허용 여부?\nA: 원칙적 취업 금지. 체류자격 외 활동허가를 사전 취득한 경우에 한해 예외적 아르바이트 허용.",subCodes:[{code:"F-3-1",name:"동반 기본",addReq:"D-1, D-5~D-9, E-1~E-7 체류자격 소지자의 합법적 배우자 및 미성년 자녀 초청.",note:""},{code:"F-3-2",name:"가족초청 소득요건(25.7.1 개편)",addReq:"E-2, E-6, E-7(1~4), D-8, D-9 자격 소지자 대상. 전년도 소득 기준 12개월 이상 체류자: 2인 가구 23,595,948원, 3인 가구 30,152,118원.",note:"기존 E-7-4 배우자 초청 시 적용되던 2천만원 자산 요건 전면 폐지. 12개월 미만 체류 시 월할 계산(2인 기준 월 1,996,329원). 기준 소득의 10% 미만 부족분은 부족액의 5배 이상을 국내 예금 잔고로 입증 시 보완 허용."},{code:"F-3-3",name:"소득요건 입증 면제 대상",addReq:"E-1(교수), E-3(연구), E-4(기술지도), E-5(전문직업), D-8(미화 50만불 이상 고액투자 법인대표).",note:"상기 고도 전문인력은 동반가족 사증발급 시 소득 및 체류경비 요건에 대한 물리적 서류 입증 면제."}]},
{code:"F-4",name:"재외동포",cat:"family",period:"최대 3년 부여, 연장가능",dataBadge:"2026.2.12~ H-2 통합, 동포 일원화",dataDate:"2026-02-12 (법무부 동포체류자격 통합 시행)",newReq:"[2026.2.12 제도 전면 개편] 기존 H-2(방문취업) 신규 사증 발급 중단, 대한민국 동포 체류자격을 F-4로 완전 일원화. 출신 국적과 무관하게 법적 동포 입증 시 F-4 자격 부여. [공통 구비서류] ① TOPIK 등 한국어능력 입증서류 ② 해외 범죄경력증명서(아포스티유/영사확인) ③ 거민증, 제적등본 등 해당 국가 발행 외국국적동포 입증서류 ④ 법무부 주관 조기적응프로그램(약 5시간) 이수확인서. 지정 21개국(중국, 베트남 등) 국적자는 장관 고시에 따른 보완 서류 기준 별도 적용.",extReq:"[체류기간 연장] 통합신청서(별지 제34호 서식), 수수료, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능). 심사 후 1회 최대 3년 이내 부여. [한국어능력 기반 체류기간 차등 부여] 한국어능력 입증 시 3년, 관할 기관 사회통합프로그램 등록자 2년, 미등록자 1년 허가. [한국어능력 입증 면제] ① 과거 대한민국 국적 보유 이력자 ② 만 60세 이상자 ③ 만 13세 이하 미성년자 ④ 기존 F-4 자격으로 국내 3년 이상 체류자. [국내 거소신고 의무] 국내 90일 이상 체류 목적인 경우 입국일로부터 90일 이내 거소신고 의무 부과. [H-2 체류자의 자격변경 특례 수수료] 기존 H-2에서 F-4로의 체류자격 변경 시 2027.12.31까지 수수료 한시적 면제.",faq:"Q: F-4 자격 취득 후 취업 가능 범위?\nA: 단순노무를 제외한 포괄적 취업 활동 허용. 기존 H-2 자격 대비 직종 선택의 폭이 대폭 확대됨. 단, 국내법상 특정 자격증을 요구하는 직종(의료, 미용 등)은 해당 면허 소지 필수.\nQ: 기존 H-2 체류자의 행정 조치 요령?\nA: 정책 변경에 따라 F-4로 자동 전환되지 않으므로, 본인이 직접 동포 입증서류 및 한국어능력 증빙을 구비하여 체류자격 변경 신청을 완료해야 함.\nQ: 병역 미이행 남성 동포에 대한 제재 조항?\nA: 개정 재외동포법 시행일(2018.5.1.) 이후 국적이탈 또는 상실한 대한민국 남성은 병역의무 해소 전까지 만 40세가 되는 해의 12월 31일까지 F-4 자격 부여가 법적으로 제한됨.\nQ: 법적 자격부여 제한 기준?\nA: 출입국관리법 위반 불법체류 이력, 동포 입증서류 조작 여부, 살인·강간·보이스피싱 등 중대 범죄 이력, 최근 5년 이내 금고 이상 형 선고, 최근 3년 이내 벌금 누적 합산 700만 원 이상인 자에 대하여 발급 불허.",subCodes:[{code:"F-4-11",name:"재외동포(본인 국적상실자)",addReq:"과거 대한민국 국적 보유자의 국적 상실 및 이탈 입증. 가족관계기록사항증명서, 제적등본, 외국국적 취득 원인 서류.",note:""},{code:"F-4-12",name:"직계비속 동포",addReq:"대한민국 국민이었던 조부모/부모와의 직계존비속 관계를 입증하는 공적 서류 및 본인의 외국국적 취득 증빙.",note:""},{code:"F-4-13",name:"전문 자격 합법 체류 이력",addReq:"과거 D-1, D-5~D-9, E-1~E-7 체류자격으로 6개월 이상 국내 합법 체류한 이력 확인.",note:"전산 조회 기반 확인."},{code:"F-4-14",name:"국내외 대학 졸업자",addReq:"해당 대학 재학증명서 또는 학위증명서. 국외 전문학사 소지자의 경우 TOPIK 3급 이상 성적 증명 추가 요구.",note:""},{code:"F-4-15",name:"선진국 영주자",addReq:"OECD 가입국의 영주권명세 및 증서.",note:""},{code:"F-4-16",name:"법인 대표 및 임원",addReq:"외국 등록 법인의 대표 임명장 및 재직 입증 서류.",note:""},{code:"F-4-17",name:"외국인 투자자",addReq:"투자촉진법에 따른 10만 불 이상 국내 자본 투자 증명 서류.",note:""},{code:"F-4-25",name:"만 60세 이상 동포",addReq:"출생 연월일을 입증할 수 있는 공적 신분증 및 여권.",note:"사회통합 등 한국어 요건 평가에서 원천 면제됨."},{code:"F-4-30",name:"초·중·고 재학 특례",addReq:"국내 교육기관 재학증명서, 부모의 거소신고증 등 국내 체류 확인 서류.",note:"초회 허가 시 최대 2년(학사일정 기준), 연장 시 2년 단위 심사 부여."}]},
{code:"F-5",name:"영주",cat:"family",period:"영구 (단, 영주증 10년 단위 갱신)",newReq:"출입국관리법상 영주자격 요건 충족 증빙, 신청 시점 기준 본국 발행 범죄경력증명서, 생계유지능력 및 기본소양(사회통합프로그램 5단계 이수) 입증 서류.",extReq:"체류기간에 대한 연장 허가 불필요. 단, 구 여권 정보 갱신 및 신분증 기능 유지를 위해 영주증 발급일로부터 10년 만료 전 관할 관서에서 재발급 절차(수수료 3만원) 이행 필수.",faq:"Q: 영주권자의 강제퇴거 기준?\nA: 출입국관리법 제46조 제1항에 따른 내란, 외환, 5년 이상의 징역형 등 국익을 훼손하는 중대 범죄를 제외하고는 강제퇴거 대상에서 제외됨.",subCodes:[{code:"F-5-3",name:"국민의 배우자 영주",addReq:"F-6 자격으로 국내 2년 이상 계속 체류, 한국인 배우자의 소득 등 생계유지능력, 한국어 소양(사회통합프로그램 5단계 또는 TOPIK 4급).",note:"결혼이민자의 빈출 체류자격 전환 유형."},{code:"F-5-5",name:"고액투자자 영주",addReq:"미화 50만 불 이상 자본 유치 입증 서류, 국민 5인 이상 정규직 고용 확인 서류.",note:""},{code:"F-5-11",name:"특정능력 보유자 영주",addReq:"법무부장관 고시에 따른 과학, 경영, 교육, 문화예술 분야 탁월한 능력 및 국익 기여 입증.",note:""},{code:"F-5-16",name:"점수제 우수인재 영주",addReq:"F-2-7(점수제 거주) 자격으로 3년 이상 유지, 영주 점수제 산정 기준 충족표 및 증빙.",note:"전문인력 체류 안정화 트랙(F-2-7 → F-5-16)."}]},
{code:"F-6",name:"결혼이민",cat:"family",period:"1~3년, 심사 후 연장",newReq:"[한국인 초청자] 상세 혼인관계증명서, 가족관계증명서, 주민등록등본, 초청장, 부동산 임대차계약서 등 주거 입증서류, 전년도 소득금액증명원 등 소득 입증서류. [외국인 신청자] 본국 발행 혼인/출생증명서(공증 득), 범죄경력증명서, 지정병원 건강진단서, TOPIK 등 한국어 구사 능력 입증 서류.",extReq:"[F-6-1 국민배우자 정상 유지 시 연장] ① 통합신청서(별지 제34호 서식), 여권, 외국인등록증, 표준규격사진 1장, 수수료 3만원 ② 한국인 배우자 명의의 상세 혼인관계증명서·기본증명서·가족관계증명서·주민등록등본 ③ 개인 소득금액증명원 등 소득 입증서류 ④ 임대차계약서 등 주거지 입증서류 ⑤ 신원보증서(보증기간 도과 시 갱신 제출) ⑥ 외국인 직업 신고서 ⑦ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",faq:"Q: 가정폭력 발생 시 체류 연장 및 불이익 가능성?\nA: 출입국관리법 제25조의2 규정에 따라, 수사, 재판, 피해 회복 등 권리구제 절차가 종료될 때까지 당사자의 체류기간 연장이 합법적으로 허가됨.\nQ: F-6 자격 유지 중 영주권 취득?\nA: 혼인 상태를 유지하며 국내에 2년 이상 체류하고 생계 요건을 충족한 경우 F-5-3(결혼이민 영주) 체류자격으로 변경 가능.",subCodes:[{code:"F-6-1",name:"국민의 배우자",addReq:"[실질적 혼인관계 유지 시] 가족관계 등록서류(한국인), 소득 및 주거 입증, 신원보증서, 직업신고서. [별거·소송·가출 시 추가 요건] 상세 혼인관계증명서 유지 확인, 자녀 존재 시 자녀 가족관계증명서. 별거: 상해진단서, 피해 증거사진, 보호시설 입소확인서, 형사판결문, 공인단체 확인서 등 귀책사유 입증. 이혼소송: 법원 소제기증명원. 실종: 실종선고심판청구서 등.",note:"위장 결혼 방지를 위한 혼인 진정성 및 파탄 귀책사유 심사 강화. 체류민원 매뉴얼 2026.3월 기준."},{code:"F-6-2",name:"자녀양육자",addReq:"① 통합신청서(별지 제34호 서식), 여권, 수수료 ② 국민 자녀의 기본증명서 및 가족관계증명서 ③ 국내 자녀 양육 사실을 증명하는 서류(학비 영수증, 보육 시설 재원 증명, 병원 진료 기록 등) ④ 외국인 직업 신고서 ⑤ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",note:"실제 양육 지속 여부 현장 실사 가능. 체류민원 매뉴얼 2026.3월 기준."},{code:"F-6-3",name:"배우자 사망 등 혼인단절자",addReq:"① 통합신청서(별지 제34호 서식), 여권, 외국인등록증, 수수료 ② 한국인 배우자의 사망진단서 또는 사망 사실이 기재된 기본증명서 ③ 상세 혼인관계증명서 ④ 자녀 존재 시 해당 자녀 명의의 가족관계증명서 ⑤ 외국인 직업 신고서 ⑥ 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능).",note:"법 제25조의2에 근거. 가정폭력으로 인한 혼인 단절 시 고소장, 법원 보호명령서, 상담소 발급 확인서 필수. 체류민원 매뉴얼 2026.3월 기준."}]},
{code:"G-1",name:"기타(난민 등)",cat:"other",period:"심사 후 1년 이내, 갱신 가능",newReq:"난민인정신청서 접수증, 산재/질병 입증 지정병원 의료진단서, 임금체불 관련 노동청 접수증, 구체적인 체류 사유서, 체류경비 지불능력 서류.",extReq:"통합신청서(별지 제34호 서식), 여권, 외국인등록증, 기존 체류자격 부여 사유에 대한 계속성 입증서류, 체류지 입증서류(임대차계약서, 숙소제공 확인서, 체류기간 만료예고 통지우편물, 공공요금 납부영수증, 기숙사비 영수증 등 대체 가능), 수수료(인도적 사유 시 감면 가능).",faq:"Q: 출입국관서에서 난민인정 신청서 접수를 반려할 수 있는가?\nA: 난민법에 의거, 접수 단계에서의 임의적 거부는 법적으로 원천 불가하며 접수 후 즉각 심사과로 이관되어야 함.",subCodes:[{code:"G-1-1",name:"난민인정 신청 대기자",addReq:"관할 관서 발행 난민인정신청 접수증 원본.",note:"접수일 기준 6개월 경과 시 생계유지를 위한 체류자격 외 활동허가(취업) 신청 가능."},{code:"G-1-5",name:"난민 가족결합",addReq:"국내 난민 인정자와의 본국 가족관계 입증서류, 초청장.",note:"난민 인정자의 법적 배우자 및 미성년 자녀에 한정됨."},{code:"G-1-6",name:"인도적 체류 허가자",addReq:"법무부 통보 인도적 체류 허가 통지서.",note:"체류는 허용되나, 근로를 위해서는 별도의 취업 활동 허가를 반드시 득해야 함."},{code:"G-1-10",name:"장기 치료 및 요양자",addReq:"국내 의료기관 병원장 발급 상세 진단서, 재정 입증 서류.",note:"산업재해 및 중증 질병 장기 요양 대상."},{code:"G-1-11",name:"국내 출생 외국국적 아동",addReq:"출생증명서, 체류 중인 부모의 외국인등록증 및 여권 사본.",note:""},{code:"G-1-12",name:"긴급구제 및 소송 중인 자",addReq:"인신매매, 산업재해, 임금체불 관련 형사 고소장, 소송 증명원, 노동청 체불 확인서.",note:"민·형사 수사 및 사법부 재판 최종 종료 시까지 한시적 체류 보장."}]},

function getLabels(v){return v.labels||CL[v.cat]||['개요','상세','FAQ'];}

function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hl(t,k){if(!k.length)return escapeHtml(t);return escapeHtml(t).replace(new RegExp(`(${k.map(escapeRegExp).join('|')})`,'gi'),'<mark class="h">$1</mark>')}

function calculateScore(item,keywords){
    if(!keywords.length) return 1;
    let score=0;
    const cL=(item.code||'').toLowerCase(), nL=(item.name||'').toLowerCase();
    const aliasL=(item.aliases||[]).map(x=>String(x).toLowerCase());
    const content=`${item.newReq||''} ${item.extReq||''} ${item.faq||''} ${item.period||''}`.toLowerCase();
    let isAnd=true;
    for(const kw of keywords){
        let m=false;
        if(cL===kw||nL===kw){score+=220; m=true;}
        else if(cL.includes(kw)||nL.includes(kw)){score+=120; m=true;}
        aliasL.forEach(a=>{ if(a===kw){score+=180; m=true;} else if(a.includes(kw)||kw.includes(a)){score+=90; m=true;} });
        if(item.subCodes){
            for(const s of item.subCodes){
                const sCode=(s.code||'').toLowerCase(), sName=(s.name||'').toLowerCase();
                const sAliases=(s.aliases||[]).join(' ').toLowerCase();
                if(sCode===kw||sName===kw){score+=90; m=true;}
                else if(sCode.includes(kw)||sName.includes(kw)){score+=60; m=true;}
                const sc=`${s.addReq||''} ${s.note||''} ${sAliases}`.toLowerCase();
                const n=(sc.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
                if(n>0){score+=n*16; m=true;}
            }
        }
        const cn=(content.match(new RegExp(escapeRegExp(kw),'g'))||[]).length;
        if(cn>0){score+=cn*12; m=true;}
        if(!m) isAnd=false;
    }
    return currentSearchMode==='and' ? (isAnd?score:0) : score;
}

function expandKeywords(keywords){
    const expanded = new Set(keywords.map(k=>k.toLowerCase()));
    const joined = keywords.join('').toLowerCase();
    const joinedNoSpace = joined.replace(/\s+/g,'');
    if(ALIAS_MAP[joined]) expanded.add(ALIAS_MAP[joined].toLowerCase());
    if(ALIAS_MAP[joinedNoSpace]) expanded.add(ALIAS_MAP[joinedNoSpace].toLowerCase());
    keywords.forEach(k=>{
        const nk = k.replace(/\s+/g,'').toLowerCase();
        if(ALIAS_MAP[nk]) expanded.add(ALIAS_MAP[nk].toLowerCase());
        if(nk==='제주') expanded.add('b-2-2');
        if(nk==='협정') expanded.add('b-1');
    });
    return [...expanded];
}

function showSuggestions(val) {

        if(v.code.toLowerCase().includes(lowerVal) || v.name.toLowerCase().includes(lowerVal)) {
            const str = `${v.code} ${v.name}`;
            if(!matches.includes(str)) matches.push(str);
        }
    });

        matches.slice(0, 7).forEach(m => {
            const div = document.createElement('div');
            div.className = 'auto-item';
            div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg> <span>${hl(m, [val])}</span>`;
            div.onclick = () => {
                document.getElementById('q').value = m;
                list.classList.remove('active');
                executeSearch();
            };
            list.appendChild(div);
        });
        list.classList.add('active');
    } else {
        list.classList.remove('active');
    }
}
document.addEventListener('click', function(e) {
    if(!document.getElementById('search-wrap').contains(e.target)){
        document.getElementById('auto-list').classList.remove('active');
    }
});

function executeSearch(){
    document.getElementById('auto-list').classList.remove('active');
    const q=document.getElementById('q').value.trim();
    if(!q) return;

    // SCN 패턴 감지 및 법적 면책 경고 팝업 강제 호출
    if(/scn/i.test(q)) {
        alert("⚠ [경고] 해당 시나리오 검색 결과는 실무자 사전 안내 및 단순 참고용입니다. 어떠한 법적 효력도 갖지 않으며, 실제 행정 처리 및 최종 판단은 관할 출입국관서에 귀속됩니다.");
    }

    if(document.body.classList.contains('landing')){
        document.body.classList.add('launching');
        setTimeout(()=>{
            document.body.classList.remove('landing', 'launching');
            document.body.classList.add('searched');
            renderResults(q);
            window.scrollTo({top:0, behavior:'smooth'});
        }, 600);
    } else {
        renderResults(q);
    }
}

function resetToLanding(){
    document.body.classList.remove('searched');
    document.body.classList.add('landing');
    document.getElementById('q').value='';
    document.getElementById('xb').classList.remove('v');
    document.getElementById('rlist').innerHTML='';
    document.getElementById('rc').textContent='';
}

function renderResults(query){
    const box=document.getElementById('rlist'), rc=document.getElementById('rc');
    const kw=query.trim().split(/\s+/).filter(Boolean), kwL=expandKeywords(kw.map(k=>k.toLowerCase()));
    
    let scored=VISA_DATA.map(v=>({...v,_score:calculateScore(v,kwL)}));
    let filtered=scored.filter(v=>v._score>0).sort((a,b)=>b._score-a._score);
    
    let st=0; filtered.forEach(v=>{if(v.subCodes) st+=v.subCodes.length;});
    
    if(!filtered.length){
        box.innerHTML=`<div class="es"><div class="es-t">궤도에서 이탈했습니다</div><div class="es-d">'${escapeHtml(query)}'에 해당하는 정보가 없습니다.<br>키워드를 줄이거나 OR 모드로 전환해 보세요.</div></div>`;
        rc.textContent='0건'; return;
    }
    
    const fg=document.createDocumentFragment();
    filtered.forEach((v)=>{
        const c=document.createElement('article'); c.className='vc';
        c.style.setProperty('--cbc', CC[v.cat]||CC.other);
        
        const hs=v.subCodes&&v.subCodes.length>0;
        let ms=[];
        if(hs&&kw.length) ms=v.subCodes.filter(s=>{const x=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase(); return kwL.some(k=>x.includes(k));});
        if(kw.length&&(v._score>=50||ms.length)) c.classList.add('open');
        
        let sh='';
        if(hs){
            sh=`<div class="ss"><div class="ss-t"><b>세부항목</b>${v.subCodes.length}개</div>`;
            v.subCodes.forEach(s=>{
                const x=`${s.code} ${s.name} ${s.addReq||''} ${s.note||''}`.toLowerCase();
                const im=!kw.length||kwL.some(k=>x.includes(k));
                sh+=`<div class="su${kw.length&&im?' open':''}"><div class="su-h" onclick="this.parentElement.classList.toggle('open')"><span class="s-c">${hl(s.code,kw)}</span><span class="s-n">${hl(s.name,kw)}</span><span class="tgl">▼</span></div><div class="su-cw"><div class="su-c">`;
                if(s.addReq) sh+=`<div class="su-s"><div class="tl tl-n">안내/추가</div><div class="ct">${hl(s.addReq,kw)}</div></div>`;
                if(s.note) sh+=`<div class="su-s"><div class="tl tl-f">실무참고</div><div class="ct">${hl(s.note,kw)}</div></div>`;
                sh+=`</div></div></div>`;
            });
            sh+=`</div>`;
        }
        
        const dbHtml = v.dataBadge ? `<span class="bd">${escapeHtml(v.dataBadge)}</span>` : '';
        const ddHtml = v.dataDate ? `<div class="data-date">데이터 기준: ${escapeHtml(v.dataDate)}</div>` : '';
        
        const lb=getLabels(v);
        c.innerHTML=`<div class="vc-h" onclick="this.parentElement.classList.toggle('open')"><span class="bc">${hl(v.code,kw)}</span><span class="vt">${hl(v.name,kw)}</span>${v.period?`<span class="bp">${hl(v.period,kw)}</span>`:''}${dbHtml}${hs?`<span class="bn">+${v.subCodes.length}</span>`:''}<span class="tgl">▼</span></div><div class="vc-cw"><div class="vc-c"><div class="vs"><div class="tl tl-n">${lb[0]}</div><div class="ct">${hl(v.newReq,kw)}</div></div><div class="vs"><div class="tl tl-e">${lb[1]}</div><div class="ct">${hl(v.extReq,kw)}</div></div><div class="vs"><div class="tl tl-f">${lb[2]}</div><div class="ct">${hl(v.faq,kw)}</div></div>${sh}${ddHtml}</div></div>`;
        fg.appendChild(c);
    });
    
    box.innerHTML=''; box.appendChild(fg);
    rc.textContent=`${filtered.length}건${st?` (세부 ${st}건)`:''} · 총 ${VISA_DATA.length}개`;
    const rh=document.getElementById('rh');
    const modeStr=currentSearchMode==='and'?'AND(모두 포함)':'OR(하나 이상)';
    const topCats=[...new Set(filtered.slice(0,3).map(v=>({short:'단기',study:'유학/연수',work:'취업',invest:'투자',family:'가족/이민',other:'기타',diplo:'외교',nhis:'건강보험',faq:'안내',scn:'시나리오'}[v.cat]||v.cat)))];
    rh.textContent=`관련도 순 정렬 · ${modeStr} · 상위 분류: ${topCats.join(', ')}`;
}

let dt;
function handleInput(){
    const v=document.getElementById('q').value;
    document.getElementById('xb').classList.toggle('v',v.length>0);
    showSuggestions(v);
    if(document.body.classList.contains('searched')){
        clearTimeout(dt);
        dt=setTimeout(()=>renderResults(v),150);
    }
}
function clearSearch(){
    const i=document.getElementById('q');
    i.value='';
    i.focus();
    document.getElementById('xb').classList.remove('v');
    document.getElementById('auto-list').classList.remove('active');
    if(document.body.classList.contains('searched'))renderResults('');
}
function setSearchMode(m){currentSearchMode=m;document.getElementById('ma').classList.toggle('on',m==='and');document.getElementById('mo').classList.toggle('on',m==='or');if(document.body.classList.contains('searched'))renderResults(document.getElementById('q').value);}
function toggleTheme(){currentTheme=currentTheme==='dark'?'light':'dark';document.body.setAttribute('data-theme',currentTheme);}
function toggleAccordions(c){document.querySelectorAll('.vc,.su').forEach(el=>{if(c)el.classList.remove('open');else el.classList.add('open');});}
